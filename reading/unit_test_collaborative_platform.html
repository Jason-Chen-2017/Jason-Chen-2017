<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单元测试人机协同优化平台 | Unit Test Collaborative Platform</title>
    <style>
        :root {
            --primary-color: #00f5ff;
            --secondary-color: #7b2cbf;
            --accent-color: #ff006e;
            --bg-dark: #0a0e1a;
            --bg-card: #131829;
            --bg-panel: #1a2035;
            --text-primary: #e0e6ed;
            --text-secondary: #94a3b8;
            --success-color: #00ff88;
            --warning-color: #ffaa00;
            --error-color: #ff4444;
            --border-glow: 0 0 20px rgba(0, 245, 255, 0.3);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(255, 0, 110, 0.08) 0%, transparent 40%);
            animation: bgRotate 30s linear infinite;
        }

        @keyframes bgRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            border-bottom: 2px solid var(--primary-color);
            box-shadow: var(--border-glow);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 245, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 245, 255, 0.8); }
        }

        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 245, 255, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(0, 245, 255, 0.3);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 主容器 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 工作流步骤 */
        .workflow-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .step-card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .step-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .step-card:hover::before {
            transform: scaleX(1);
        }

        .step-card.active {
            border-color: var(--primary-color);
            box-shadow: var(--border-glow);
            transform: translateY(-5px);
        }

        .step-card.completed {
            border-color: var(--success-color);
        }

        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .step-card.completed .step-number {
            background: linear-gradient(135deg, var(--success-color), #00cc6a);
        }

        .step-title {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .step-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 内容面板 */
        .panels-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
        }

        .panel-title {
            font-size: 1.3rem;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* 测试用例卡片 */
        .test-cases-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .test-case-card {
            background: var(--bg-panel);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 8px;
            padding: 1.2rem;
            transition: all 0.3s ease;
        }

        .test-case-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 4px 20px rgba(0, 245, 255, 0.2);
            transform: translateX(5px);
        }

        .test-case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .test-case-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .test-case-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning-color);
            border: 1px solid var(--warning-color);
        }

        .status-approved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .status-rejected {
            background: rgba(255, 68, 68, 0.2);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        .status-edited {
            background: rgba(0, 245, 255, 0.2);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .test-case-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .test-case-code {
            background: var(--bg-dark);
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            color: var(--text-primary);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(0, 245, 255, 0.1);
        }

        .test-case-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 245, 255, 0.1);
        }

        /* 按钮样式 */
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-approve {
            background: linear-gradient(135deg, var(--success-color), #00cc6a);
            color: var(--bg-dark);
        }

        .btn-approve:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        .btn-edit {
            background: linear-gradient(135deg, var(--primary-color), #00c4cc);
            color: var(--bg-dark);
        }

        .btn-edit:hover {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-reject {
            background: linear-gradient(135deg, var(--error-color), #cc0000);
            color: white;
        }

        .btn-reject:hover {
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        /* 覆盖率面板 */
        .coverage-gauge {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 2rem auto;
        }

        .coverage-svg {
            transform: rotate(-90deg);
        }

        .coverage-circle-bg {
            fill: none;
            stroke: var(--bg-panel);
            stroke-width: 20;
        }

        .coverage-circle-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 20;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .coverage-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .coverage-percentage {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--success-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .coverage-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 覆盖率缺口列表 */
        .coverage-gaps-list {
            margin-top: 1.5rem;
        }

        .gap-item {
            background: var(--bg-dark);
            border-left: 3px solid var(--warning-color);
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-radius: 0 6px 6px 0;
        }

        .gap-file {
            font-family: monospace;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .gap-line {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        /* 决策对话框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.3rem;
            color: var(--primary-color);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-close:hover {
            color: var(--error-color);
        }

        .feedback-textarea {
            width: 100%;
            min-height: 100px;
            background: var(--bg-dark);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 6px;
            padding: 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            margin: 1rem 0;
        }

        .feedback-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        /* 执行结果 */
        .execution-results {
            margin-top: 1rem;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: var(--bg-dark);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }

        .result-passed {
            border-left: 3px solid var(--success-color);
        }

        .result-failed {
            border-left: 3px solid var(--error-color);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .panels-container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header-stats {
                display: none;
            }
            
            .workflow-steps {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 245, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 通知提示 */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--primary-color);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 3000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            border-color: var(--success-color);
        }

        .toast-error {
            border-color: var(--error-color);
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation"></div>

    <!-- 头部 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🧪</div>
                <h1>单元测试人机协同优化平台</h1>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalTests">0</div>
                    <div class="stat-label">总测试数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pendingReview">0</div>
                    <div class="stat-label">待审核</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="approvedCount">0</div>
                    <div class="stat-label">已批准</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="coveragePercent">0%</div>
                    <div class="stat-label">覆盖率</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="container">
        <!-- 工作流步骤 -->
        <div class="workflow-steps">
            <div class="step-card active" data-step="1">
                <div class="step-number">1</div>
                <div class="step-title">AI 生成测试</div>
                <div class="step-status" id="step1Status">进行中</div>
            </div>
            <div class="step-card" data-step="2">
                <div class="step-number">2</div>
                <div class="step-title">人工审核</div>
                <div class="step-status" id="step2Status">等待中</div>
            </div>
            <div class="step-card" data-step="3">
                <div class="step-number">3</div>
                <div class="step-title">执行测试</div>
                <div class="step-status" id="step3Status">等待中</div>
            </div>
            <div class="step-card" data-step="4">
                <div class="step-number">4</div>
                <div class="step-title">覆盖率分析</div>
                <div class="step-status" id="step4Status">等待中</div>
            </div>
            <div class="step-card" data-step="5">
                <div class="step-number">5</div>
                <div class="step-title">智能补充</div>
                <div class="step-status" id="step5Status">等待中</div>
            </div>
        </div>

        <!-- 内容面板 -->
        <div class="panels-container">
            <!-- 左侧：测试用例列表 -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <span>📝</span> 待审核测试用例
                    </h2>
                    <div class="panel-actions">
                        <button class="btn btn-primary" onclick="approveAll()">
                            <span>✓</span> 全部批准
                        </button>
                        <button class="btn btn-primary" onclick="refreshTests()">
                            <span>🔄</span> 刷新
                        </button>
                    </div>
                </div>
                <div class="test-cases-list" id="testCasesList">
                    <!-- 测试用例会动态插入到这里 -->
                </div>
            </div>

            <!-- 右侧：覆盖率和执行结果 -->
            <div class="panel">
                <div class="panel-header">
                    <h2 class="panel-title">
                        <span>📊</span> 代码覆盖率分析
                    </h2>
                    <button class="btn btn-primary" onclick="analyzeCoverage()">
                        <span>🔍</span> 分析
                    </button>
                </div>
                
                <!-- 覆盖率仪表盘 -->
                <div class="coverage-gauge">
                    <svg class="coverage-svg" viewBox="0 0 200 200">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color: var(--primary-color)" />
                                <stop offset="100%" style="stop-color: var(--success-color)" />
                            </linearGradient>
                        </defs>
                        <circle class="coverage-circle-bg" cx="100" cy="100" r="80" />
                        <circle class="coverage-circle-progress" cx="100" cy="100" r="80" 
                                stroke-dasharray="502" stroke-dashoffset="502" id="coverageCircle" />
                    </svg>
                    <div class="coverage-value">
                        <div class="coverage-percentage" id="coveragePercentage">0%</div>
                        <div class="coverage-label">目标：80%</div>
                    </div>
                </div>

                <!-- 覆盖率缺口 -->
                <div class="coverage-gaps-list" id="coverageGapsList">
                    <h3 style="color: var(--warning-color); margin-bottom: 1rem;">⚠️ 覆盖率缺口</h3>
                    <!-- 缺口会动态插入 -->
                </div>

                <!-- 执行结果 -->
                <div class="execution-results" id="executionResults" style="margin-top: 2rem;">
                    <h3 style="color: var(--primary-color); margin-bottom: 1rem;">▶️ 执行结果</h3>
                    <div id="resultsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 决策对话框 -->
    <div class="modal-overlay" id="decisionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">测试用例审核</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody">
                <p id="testCaseDetail"></p>
                <textarea class="feedback-textarea" id="feedbackText" 
                          placeholder="请输入反馈意见（可选）..."></textarea>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1rem;">
                    <button class="btn btn-reject" onclick="submitDecision('reject')">
                        <span>✗</span> 拒绝
                    </button>
                    <button class="btn btn-edit" onclick="submitDecision('edit')">
                        <span>✏️</span> 编辑
                    </button>
                    <button class="btn btn-approve" onclick="submitDecision('approve')">
                        <span>✓</span> 批准
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局状态
        let appState = {
            currentStep: 1,
            testCases: [],
            pendingRequest: null,
            coverageData: {
                percentage: 0,
                gaps: []
            },
            executionResults: []
        };

        // 初始化示例数据
        function initializeDemoData() {
            appState.testCases = [
                {
                    id: 'test_001',
                    name: 'test_add',
                    description: "Auto-generated test for function 'add' at line 3",
                    code: `def test_add():

    result = add(1, 2)

    assert result == 3, "1 + 2 should equal 3"
    print("✓ test_add executed successfully")`,
                    status: 'pending',
                    generatedBy: 'Claude Code AI',
                    createdAt: new Date().toISOString()
                },
                {
                    id: 'test_002',
                    name: 'test_divide',
                    description: "Auto-generated test for function 'divide' at line 7",
                    code: `def test_divide():

    Docstring: Divide a by b with error handling
    """
    # Arrange
    result = divide(10, 2)
    
    # Assert
    assert result == 5, "10 / 2 should equal 5"
    print("✓ test_divide executed successfully")`,
                    status: 'pending',
                    generatedBy: 'Claude Code AI',
                    createdAt: new Date().toISOString()
                },
                {
                    id: 'test_003',
                    name: 'test_divide_by_zero',
                    description: "Edge case test for division by zero",
                    code: `def test_divide_by_zero():
    """Test edge case: division by zero"""

    try:

        assert False, "Should raise ValueError"
    except ValueError as e:
        assert str(e) == "Cannot divide by zero"
    print("✓ test_divide_by_zero executed successfully")`,
                    status: 'pending',
                    generatedBy: 'Coverage Gap Analyzer',
                    createdAt: new Date().toISOString()
                },
                {
                    id: 'test_004',
                    name: 'test_process_list',
                    description: "Auto-generated test for function 'process_list'",
                    code: `def test_process_list():
    """Test case for process_list"""
    # Arrange
    items = [1, 2, 3, "hello", None]
    
    # Act

    # Assert

    assert result[0] == 2
    assert result[3] == "HELLO"
    print("✓ test_process_list executed successfully")`,
                    status: 'pending',
                    generatedBy: 'Claude Code AI',
                    createdAt: new Date().toISOString()
                },
                {
                    id: 'test_005',
                    name: 'test_Calculator_add',
                    description: "Auto-generated test for method 'Calculator.add'",
                    code: `def test_Calculator_add():
    """Test Calculator.add method"""
    # Arrange
    calc = Calculator(initial_value=10)
    
    # Act
    result = calc.add(5)
    
    # Assert
    assert result == 15
    assert calc.value == 15
    print("✓ test_Calculator_add executed successfully")`,
                    status: 'pending',
                    generatedBy: 'Claude Code AI',
                    createdAt: new Date().toISOString()
                }
            ];

            appState.coverageData.gaps = [
                {
                    file: 'calculator.py',
                    line: 9,
                    function: 'divide',
                    description: 'Missing test for negative numbers'
                },
                {
                    file: 'calculator.py',
                    line: 15,
                    function: 'process_list',
                    description: 'Missing test for empty list edge case'
                }
            ];

            renderTestCases();
            updateStats();
        }

        // 渲染测试用例列表
        function renderTestCases() {
            const container = document.getElementById('testCasesList');
            container.innerHTML = '';

            appState.testCases.forEach(test => {
                const card = document.createElement('div');
                card.className = 'test-case-card';
                card.innerHTML = `
                    <div class="test-case-header">
                        <div class="test-case-name">${test.name}</div>
                        <div class="test-case-status status-${test.status}">${getStatusText(test.status)}</div>
                    </div>
                    <div class="test-case-description">${test.description}</div>
                    <div class="test-case-code">${escapeHtml(test.code)}</div>
                    ${test.status === 'pending' ? `
                        <div class="test-case-actions">
                            <button class="btn btn-approve" onclick="openDecisionModal('${test.id}', 'approve')">
                                <span>✓</span> 批准
                            </button>
                            <button class="btn btn-edit" onclick="openDecisionModal('${test.id}', 'edit')">
                                <span>✏️</span> 编辑
                            </button>
                            <button class="btn btn-reject" onclick="openDecisionModal('${test.id}', 'reject')">
                                <span>✗</span> 拒绝
                            </button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'pending': '待审核',
                'approved': '已批准',
                'edited': '已编辑',
                'rejected': '已拒绝',
                'executed': '已执行',
                'passed': '通过',
                'failed': '失败'
            };
            return statusMap[status] || status;
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('totalTests').textContent = appState.testCases.length;
            document.getElementById('pendingReview').textContent = 
                appState.testCases.filter(t => t.status === 'pending').length;
            document.getElementById('approvedCount').textContent = 
                appState.testCases.filter(t => t.status === 'approved' || t.status === 'edited').length;
        }

        // 打开决策对话框
        let currentTestId = null;
        function openDecisionModal(testId, defaultAction) {
            currentTestId = testId;
            const test = appState.testCases.find(t => t.id === testId);
            
            if (!test) return;

            document.getElementById('testCaseDetail').innerHTML = `
                <strong>测试名称:</strong> ${test.name}<br>
                <strong>描述:</strong> ${test.description}<br>
                <strong>生成者:</strong> ${test.generatedBy}
            `;
            
            document.getElementById('decisionModal').classList.add('active');
        }

        // 关闭对话框
        function closeModal() {
            document.getElementById('decisionModal').classList.remove('active');
            document.getElementById('feedbackText').value = '';
            currentTestId = null;
        }

        // 提交决策
        function submitDecision(decisionType) {
            if (!currentTestId) return;

            const test = appState.testCases.find(t => t.id === currentTestId);
            if (test) {
                test.status = decisionType;
                if (decisionType === 'reject') {
                    test.feedback = document.getElementById('feedbackText').value;
                }
            }

            showToast(`已${getDecisionText(decisionType)}测试用例`, 'success');
            closeModal();
            renderTestCases();
            updateStats();
            updateWorkflowStep(2, 'completed');
        }

        // 获取决策文本
        function getDecisionText(type) {
            const map = {
                'approve': '批准',
                'edit': '编辑',
                'reject': '拒绝'
            };
            return map[type] || type;
        }

        // 全部批准
        function approveAll() {
            appState.testCases.forEach(test => {
                if (test.status === 'pending') {
                    test.status = 'approved';
                }
            });
            showToast('已批准所有待审核测试用例', 'success');
            renderTestCases();
            updateStats();
            updateWorkflowStep(2, 'completed');
        }

        // 刷新测试
        function refreshTests() {
            showToast('正在刷新测试用例...', 'info');
            setTimeout(() => {
                renderTestCases();
                showToast('测试用例已刷新', 'success');
            }, 500);
        }

        // 分析覆盖率
        function analyzeCoverage() {
            showToast('正在分析代码覆盖率...', 'info');
            
            setTimeout(() => {
                // 模拟覆盖率计算
                const approvedCount = appState.testCases.filter(t => 
                    t.status === 'approved' || t.status === 'edited'
                ).length;
                
                const simulatedCoverage = Math.min(80, approvedCount * 15);
                appState.coverageData.percentage = simulatedCoverage;
                
                updateCoverageGauge(simulatedCoverage);
                renderCoverageGaps();
                
                showToast(`覆盖率分析完成：${simulatedCoverage}%`, 'success');
                updateWorkflowStep(4, 'completed');
            }, 1000);
        }

        // 更新覆盖率仪表盘
        function updateCoverageGauge(percentage) {
            const circle = document.getElementById('coverageCircle');
            const circumference = 2 * Math.PI * 80; // 502
            const offset = circumference - (percentage / 100) * circumference;
            
            circle.style.strokeDashoffset = offset;
            document.getElementById('coveragePercentage').textContent = `${Math.round(percentage)}%`;
            document.getElementById('coveragePercent').textContent = `${Math.round(percentage)}%`;
        }

        // 渲染覆盖率缺口
        function renderCoverageGaps() {
            const container = document.getElementById('coverageGapsList');
            
            if (appState.coverageData.gaps.length === 0) {
                container.innerHTML = '<p style="color: var(--success-color);">✓ 无覆盖率缺口</p>';
                return;
            }

            container.innerHTML = `
                <h3 style="color: var(--warning-color); margin-bottom: 1rem;">⚠️ 覆盖率缺口 (${appState.coverageData.gaps.length})</h3>
                ${appState.coverageData.gaps.map(gap => `
                    <div class="gap-item">
                        <div class="gap-file">${gap.file} - ${gap.function}</div>
                        <div class="gap-line">行 ${gap.line}: ${gap.description}</div>
                    </div>
                `).join('')}
            `;
        }

        // 更新工作流步骤
        function updateWorkflowStep(stepNumber, status) {
            const stepCard = document.querySelector(`.step-card[data-step="${stepNumber}"]`);
            if (!stepCard) return;

            const statusEl = stepCard.querySelector('.step-status');
            
            if (status === 'completed') {
                stepCard.classList.add('completed');
                stepCard.classList.remove('active');
                statusEl.textContent = '已完成';
                statusEl.style.color = 'var(--success-color)';
                
                // 激活下一步
                const nextStep = document.querySelector(`.step-card[data-step="${stepNumber + 1}"]`);
                if (nextStep) {
                    nextStep.classList.add('active');
                    nextStep.querySelector('.step-status').textContent = '进行中';
                }
            } else if (status === 'active') {
                stepCard.classList.add('active');
                statusEl.textContent = '进行中';
            }
        }

        // 显示通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            
            if (type === 'success') toast.classList.add('toast-success');
            if (type === 'error') toast.classList.add('toast-error');
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 执行测试
        function executeTests() {
            showToast('正在执行已批准的测试...', 'info');
            updateWorkflowStep(3, 'active');

            setTimeout(() => {
                const approvedTests = appState.testCases.filter(t => 
                    t.status === 'approved' || t.status === 'edited'
                );

                appState.executionResults = approvedTests.map(test => ({
                    name: test.name,
                    success: Math.random() > 0.2, // 模拟 80% 通过率
                    duration: (Math.random() * 100 + 10).toFixed(2)
                }));

                test.status = 'executed';

                renderExecutionResults();
                showToast(`测试执行完成：${appState.executionResults.filter(r => r.success).length}/${appState.executionResults.length} 通过`, 'success');
                updateWorkflowStep(3, 'completed');
            }, 1500);
        }

        // 渲染执行结果
        function renderExecutionResults() {
            const container = document.getElementById('resultsList');
            
            if (appState.executionResults.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">暂无执行结果</p>';
                return;
            }

            container.innerHTML = appState.executionResults.map(result => `
                <div class="result-item ${result.success ? 'result-passed' : 'result-failed'}">
                    <span>${result.name}</span>
                    <span style="color: ${result.success ? 'var(--success-color)' : 'var(--error-color)'}">
                        ${result.success ? '✓ 通过' : '✗ 失败'} (${result.duration}ms)
                    </span>
                </div>
            `).join('');
        }

        // 生成补充测试
        function generateSupplementaryTests() {
            showToast('正在生成补充测试用例...', 'info');
            updateWorkflowStep(5, 'active');

            setTimeout(() => {
                const supplementaryTests = appState.coverageData.gaps.map((gap, index) => ({
                    id: `test_supp_${index}`,
                    name: `test_${gap.function}_edge_case`,
                    description: `Supplementary test for coverage gap at line ${gap.line}`,
                    code: `def test_${gap.function}_edge_case():\n    """Edge case test for ${gap.function}"""\n    # TODO: Implement edge case test\n    pass`,
                    status: 'pending',
                    generatedBy: 'Coverage Gap Analyzer',
                    createdAt: new Date().toISOString()
                }));

                appState.testCases.push(...supplementaryTests);
                
                showToast(`已生成 ${supplementaryTests.length} 个补充测试用例`, 'success');
                renderTestCases();
                updateStats();
                updateWorkflowStep(5, 'completed');
            }, 1000);
        }

        // 运行完整工作流演示
        function runWorkflowDemo() {
            initializeDemoData();
            
            // 自动执行工作流演示
            setTimeout(() => {
                showToast('开始工作流演示...', 'info');
            }, 500);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            runWorkflowDemo();
        });

        // 导出功能
        window.exportReport = function() {
            const reportData = {
                timestamp: new Date().toISOString(),
                totalTests: appState.testCases.length,
                coverage: appState.coverageData.percentage,
                testCases: appState.testCases,
                executionResults: appState.executionResults,
                gaps: appState.coverageData.gaps
            };

            const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `unit_test_report_${new Date().getTime()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('报告已导出', 'success');
        };
    </script>
</body>
</html>
