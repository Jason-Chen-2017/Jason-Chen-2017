<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端技术方案评审系统 - AI 科幻量子炫彩风格</title>
    <style>
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #7b2cbf;
            --accent-color: #ff006e;
            --bg-dark: #0a0e1a;
            --bg-medium: #1a1f3a;
            --bg-light: #2a2f5a;
            --text-primary: #e0e0ff;
            --text-secondary: #a0a0c0;
            --success-color: #00ff88;
            --warning-color: #ffaa00;
            --error-color: #ff4444;
            --quantum-glow: 0 0 20px rgba(0, 240, 255, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 50%, var(--bg-dark) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景动画效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(123, 44, 191, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 0, 110, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: quantumShift 20s ease-in-out infinite;
        }

        @keyframes quantumShift {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* 粒子效果 */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* 头部导航 */
        .header {
            background: rgba(26, 31, 58, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--quantum-glow);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        .nav-tabs {
            display: flex;
            gap: 1rem;
        }

        .nav-tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-tab:hover,
        .nav-tab.active {
            background: var(--primary-color);
            color: var(--bg-dark);
            box-shadow: var(--quantum-glow);
            transform: translateY(-2px);
        }

        /* 主容器 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* 卡片样式 */
        .card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 240, 255, 0.2);
            border-color: var(--primary-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .card-badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-pending {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning-color);
            border: 1px solid var(--warning-color);
        }

        .badge-in_progress {
            background: rgba(0, 240, 255, 0.2);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .badge-approved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .badge-revision_required {
            background: rgba(255, 0, 110, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        /* 按钮样式 */
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--quantum-glow);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #00cc6a);
            color: var(--bg-dark);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--error-color), #cc0000);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #cc8800);
            color: var(--bg-dark);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(10, 14, 26, 0.8);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: var(--quantum-glow);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        select.form-control {
            cursor: pointer;
        }

        /* 评论列表 */
        .comment-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .comment-item {
            background: rgba(10, 14, 26, 0.5);
            border-left: 3px solid var(--primary-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .comment-item:hover {
            background: rgba(10, 14, 26, 0.8);
            transform: translateX(5px);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .comment-author {
            font-weight: 600;
            color: var(--primary-color);
        }

        .comment-role {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 0.5rem;
        }

        .comment-status {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-open {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning-color);
        }

        .status-resolved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success-color);
        }

        .status-dismissed {
            background: rgba(160, 160, 192, 0.2);
            color: var(--text-secondary);
        }

        .comment-content {
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .comment-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .comment-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .comment-actions .btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        /* 版本历史 */
        .version-timeline {
            position: relative;
            padding-left: 2rem;
        }

        .version-timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
        }

        .version-item {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .version-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 0.5rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-color);
            box-shadow: var(--quantum-glow);
        }

        .version-number {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .version-summary {
            color: var(--text-secondary);
            margin: 0.5rem 0;
        }

        .version-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 统计面板 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--quantum-glow);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        /* AI 评审结果 */
        .ai-review-result {
            background: rgba(10, 14, 26, 0.5);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid;
        }

        .ai-review-pass {
            border-left-color: var(--success-color);
        }

        .ai-review-warning {
            border-left-color: var(--warning-color);
        }

        .ai-review-error {
            border-left-color: var(--error-color);
        }

        .ai-review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .ai-review-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .ai-review-status {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-pass {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success-color);
        }

        .status-warning {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning-color);
        }

        .status-error {
            background: rgba(255, 68, 68, 0.2);
            color: var(--error-color);
        }

        .ai-review-message {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .ai-review-suggestions {
            list-style: none;
            padding-left: 0;
        }

        .ai-review-suggestions li {
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 0.25rem 0;
            padding-left: 1.5rem;
            position: relative;
        }

        .ai-review-suggestions li::before {
            content: '💡';
            position: absolute;
            left: 0;
        }

        /* 审批记录 */
        .approval-item {
            background: rgba(10, 14, 26, 0.5);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid;
        }

        .approval-approved {
            border-left-color: var(--success-color);
        }

        .approval-rejected {
            border-left-color: var(--error-color);
        }

        .approval-conditional {
            border-left-color: var(--warning-color);
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-medium);
            border: 2px solid var(--primary-color);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--quantum-glow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--error-color);
            transform: rotate(90deg);
        }

        /* 代码块 */
        .code-block {
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(10, 14, 26, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                flex-wrap: wrap;
                justify-content: center;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
            cursor: pointer;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 1px solid var(--primary-color);
            z-index: 1000;
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
            bottom: calc(100% + 10px);
        }

        /* 设计内容展示区 */
        .design-viewer {
            background: rgba(10, 14, 26, 0.5);
            border-radius: 8px;
            padding: 1.5rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .design-section {
            margin-bottom: 2rem;
        }

        .design-section-title {
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        .design-content {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .design-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        .design-content ul,
        .design-content ol {
            padding-left: 2rem;
        }

        .design-content li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- 粒子效果 -->
    <div id="particles"></div>

    <!-- 头部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">🚀 前端技术方案评审系统</div>
            <nav class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('overview')">概览</button>
                <button class="nav-tab" onclick="switchTab('design')">设计方案</button>
                <button class="nav-tab" onclick="switchTab('comments')">评审意见</button>
                <button class="nav-tab" onclick="switchTab('versions')">版本历史</button>
                <button class="nav-tab" onclick="switchTab('ai-review')">AI 评审</button>
                <button class="nav-tab" onclick="switchTab('approvals')">审批记录</button>
            </nav>
        </div>
    </header>

    <!-- 主容器 -->
    <main class="container">
        <!-- 统计面板 -->
        <div class="stats-grid" id="statsPanel">
            <div class="stat-card">
                <div class="stat-value" id="statVersions">0</div>
                <div class="stat-label">版本数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statComments">0</div>
                <div class="stat-label">评审意见</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statOpenComments">0</div>
                <div class="stat-label">待处理意见</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statApprovals">0</div>
                <div class="stat-label">审批记录</div>
            </div>
        </div>

        <!-- 概览标签页 -->
        <div id="tab-overview" class="tab-content">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">项目信息</h2>
                        <span class="card-badge badge-pending" id="projectStatus">待评审</span>
                    </div>
                    <div class="design-content">
                        <p><strong>项目名称:</strong> <span id="projectName">-</span></p>
                        <p><strong>评审 ID:</strong> <span id="sessionId">-</span></p>
                        <p><strong>创建时间:</strong> <span id="createdAt">-</span></p>
                        <p><strong>最后更新:</strong> <span id="updatedAt">-</span></p>
                        <p><strong>创建人:</strong> <span id="createdBy">-</span></p>
                    </div>
                    <div class="btn-group" style="margin-top: 1.5rem;">
                        <button class="btn btn-primary" onclick="startReview()">开始评审</button>
                        <button class="btn btn-success" onclick="showApprovalModal('approved')">批准</button>
                        <button class="btn btn-danger" onclick="showApprovalModal('rejected')">拒绝</button>
                        <button class="btn btn-warning" onclick="requestRevision()">请求修改</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">需求描述</h2>
                    </div>
                    <div class="design-content">
                        <p id="requirementText">暂无需求描述</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">快速操作</h2>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="addComment()">➕ 添加评论</button>
                    <button class="btn btn-outline" onclick="runAIReview()">🤖 运行 AI 评审</button>
                    <button class="btn btn-outline" onclick="exportMarkdown()">📄 导出 Markdown</button>
                    <button class="btn btn-outline" onclick="createNewVersion()">📝 创建新版本</button>
                </div>
            </div>
        </div>

        <!-- 设计方案标签页 -->
        <div id="tab-design" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">前端架构设计方案</h2>
                    <div class="btn-group">
                        <button class="btn btn-outline" onclick="toggleDesignView('json')">JSON</button>
                        <button class="btn btn-outline" onclick="toggleDesignView('markdown')">Markdown</button>
                    </div>
                </div>
                <div class="design-viewer">
                    <div id="designContent" class="design-content">
                        <!-- 动态加载设计内容 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 评审意见标签页 -->
        <div id="tab-comments" class="tab-content" style="display: none;">
            <div class="grid">
                <div class="card" style="grid-column: 1 / -1;">
                    <div class="card-header">
                        <h2 class="card-title">添加新评论</h2>
                    </div>
                    <form onsubmit="submitComment(event)">
                        <div class="form-group">
                            <label class="form-label">评审者姓名</label>
                            <input type="text" class="form-control" id="commentReviewerName" required placeholder="请输入您的姓名">
                        </div>
                        <div class="form-group">
                            <label class="form-label">角色</label>
                            <select class="form-control" id="commentReviewerRole" required>
                                <option value="human_reviewer">人工评审员</option>
                                <option value="tech_lead">技术负责人</option>
                                <option value="architect">架构师</option>
                                <option value="project_manager">项目经理</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">评论类型</label>
                            <select class="form-control" id="commentType">
                                <option value="general">整体评论</option>
                                <option value="line_comment">行级评论</option>
                                <option value="section_comment">章节评论</option>
                                <option value="suggestion">建议</option>
                                <option value="question">问题</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">目标章节（可选）</label>
                            <input type="text" class="form-control" id="commentTargetSection" placeholder="例如：component_tree">
                        </div>
                        <div class="form-group">
                            <label class="form-label">评论内容</label>
                            <textarea class="form-control" id="commentContent" required placeholder="请输入您的评论或建议..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">提交评论</button>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">评论列表</h2>
                    <div class="btn-group">
                        <button class="btn btn-outline" onclick="filterComments('all')">全部</button>
                        <button class="btn btn-outline" onclick="filterComments('open')">待处理</button>
                        <button class="btn btn-outline" onclick="filterComments('resolved')">已解决</button>
                    </div>
                </div>
                <div class="comment-list" id="commentList">
                    <!-- 动态加载评论 -->
                </div>
            </div>
        </div>

        <!-- 版本历史标签页 -->
        <div id="tab-versions" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">版本历史</h2>
                </div>
                <div class="version-timeline" id="versionTimeline">
                    <!-- 动态加载版本历史 -->
                </div>
            </div>
        </div>

        <!-- AI 评审标签页 -->
        <div id="tab-ai-review" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">AI 自动评审结果</h2>
                    <button class="btn btn-primary" onclick="runAIReview()">🔄 重新运行</button>
                </div>
                <div id="aiReviewResults">
                    <!-- 动态加载 AI 评审结果 -->
                </div>
            </div>
        </div>

        <!-- 审批记录标签页 -->
        <div id="tab-approvals" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">审批记录</h2>
                </div>
                <div id="approvalList">
                    <!-- 动态加载审批记录 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 审批模态框 -->
    <div class="modal-overlay" id="approvalModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="approvalModalTitle">提交审批</h3>
                <button class="modal-close" onclick="closeApprovalModal()">&times;</button>
            </div>
            <form onsubmit="submitApproval(event)">
                <input type="hidden" id="approvalDecision">
                <div class="form-group">
                    <label class="form-label">您的姓名</label>
                    <input type="text" class="form-control" id="approvalReviewerName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">您的角色</label>
                    <select class="form-control" id="approvalReviewerRole" required>
                        <option value="tech_lead">技术负责人</option>
                        <option value="architect">架构师</option>
                        <option value="project_manager">项目经理</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">审批意见</label>
                    <textarea class="form-control" id="approvalComments" required placeholder="请说明您的审批意见..."></textarea>
                </div>
                <div class="form-group" id="approvalConditionsGroup" style="display: none;">
                    <label class="form-label">批准条件（多个用逗号分隔）</label>
                    <input type="text" class="form-control" id="approvalConditions" placeholder="例如：修复所有严重问题，补充测试用例">
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">提交审批</button>
                    <button type="button" class="btn btn-outline" onclick="closeApprovalModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript 逻辑 -->
    <script>
        // ==================== 全局状态 ====================
        let currentSession = null;
        let reviewId = null;

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            loadSessionFromStorage();
            
            // 如果没有现有会话，创建示例会话
            if (!currentSession) {
                createDemoSession();
            }
        });

        // ==================== 粒子效果 ====================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // ==================== 标签页切换 ====================
        function switchTab(tabName) {
            // 隐藏所有标签页
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            
            // 移除所有激活状态
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示目标标签页
            document.getElementById('tab-' + tabName).style.display = 'block';
            
            // 激活对应按钮
            event.target.classList.add('active');
            
            // 刷新数据
            refreshCurrentTab(tabName);
        }

        function refreshCurrentTab(tabName) {
            switch(tabName) {
                case 'overview':
                    updateOverview();
                    break;
                case 'design':
                    renderDesignContent();
                    break;
                case 'comments':
                    renderComments();
                    break;
                case 'versions':
                    renderVersionHistory();
                    break;
                case 'ai-review':
                    renderAIReviewResults();
                    break;
                case 'approvals':
                    renderApprovals();
                    break;
            }
        }

        // ==================== 数据加载 ====================
        function loadSessionFromStorage() {
            const savedSession = localStorage.getItem('currentReviewSession');
            if (savedSession) {
                currentSession = JSON.parse(savedSession);
                reviewId = currentSession.id;
                updateUI();
            }
        }

        function saveSessionToStorage() {
            if (currentSession) {
                localStorage.setItem('currentReviewSession', JSON.stringify(currentSession));
            }
        }

        function createDemoSession() {
            const demoDesign = {
                "project_name": "电商后台管理系统",
                "tech_stack_selection": {
                    "frontend_framework": "React 18",
                    "state_management": "Redux Toolkit",
                    "build_tool": "Vite",
                    "ui_library": "Ant Design",
                    "css_solution": "Tailwind CSS"
                },
                "component_tree": [
                    {
                        "name": "App",
                        "type": "container",
                        "children": [
                            {
                                "name": "Layout",
                                "type": "layout",
                                "children": [
                                    {"name": "Header", "type": "component", "children": []},
                                    {"name": "Sidebar", "type": "component", "children": []},
                                    {"name": "Main", "type": "component", "children": []}
                                ]
                            }
                        ]
                    }
                ],
                "routing_design": {
                    "routes": [
                        {"path": "/dashboard", "component": "DashboardPage"},
                        {"path": "/products", "component": "ProductListPage"},
                        {"path": "/orders", "component": "OrderListPage"}
                    ]
                },
                "performance_optimization": [
                    "代码分割",
                    "懒加载",
                    "图片优化",
                    "虚拟列表"
                ],
                "security_considerations": [
                    "XSS 防护",
                    "CSRF 令牌",
                    "输入验证"
                ],
                "directory_structure": {
                    "src": {
                        "components": {},
                        "pages": {},
                        "utils": {},
                        "store": {}
                    }
                }
            };

            const now = new Date().toISOString();
            
            currentSession = {
                id: 'demo_' + Date.now(),
                project_name: '电商后台管理系统',
                requirement_text: '创建一个电商后台管理系统，包含登录、仪表盘、商品管理、订单管理等功能模块',
                design_content: demoDesign,
                status: 'pending',
                created_by: 'system',
                created_at: now,
                updated_at: now,
                versions: [{
                    version_number: 1,
                    change_summary: 'Initial design creation',
                    changed_by: 'system',
                    changed_at: now,
                    changes: []
                }],
                comments: [],
                approvals: [],
                ai_review_results: []
            };

            reviewId = currentSession.id;
            saveSessionToStorage();
            updateUI();
        }

        // ==================== UI 更新 ====================
        function updateUI() {
            if (!currentSession) return;

            // 更新概览信息
            document.getElementById('projectName').textContent = currentSession.project_name;
            document.getElementById('sessionId').textContent = currentSession.id;
            document.getElementById('createdAt').textContent = currentSession.created_at;
            document.getElementById('updatedAt').textContent = currentSession.updated_at;
            document.getElementById('createdBy').textContent = currentSession.created_by;
            document.getElementById('requirementText').textContent = currentSession.requirement_text;

            // 更新状态徽章
            const statusBadge = document.getElementById('projectStatus');
            statusBadge.className = 'card-badge badge-' + currentSession.status;
            statusBadge.textContent = getStatusText(currentSession.status);

            // 更新统计
            updateStats();

            // 刷新当前标签页
            const activeTab = document.querySelector('.nav-tab.active');
            if (activeTab) {
                const tabName = activeTab.getAttribute('onclick').match(/'(\w+)'/)[1];
                refreshCurrentTab(tabName);
            }
        }

        function getStatusText(status) {
            const statusMap = {
                'pending': '待评审',
                'in_progress': '评审中',
                'approved': '已批准',
                'revision_required': '需修改',
                'rejected': '已拒绝'
            };
            return statusMap[status] || status;
        }

        function updateStats() {
            document.getElementById('statVersions').textContent = currentSession.versions.length;
            document.getElementById('statComments').textContent = currentSession.comments.length;
            document.getElementById('statOpenComments').textContent = currentSession.comments.filter(c => c.status === 'open').length;
            document.getElementById('statApprovals').textContent = currentSession.approvals.length;
        }

        function updateOverview() {
            updateUI();
        }

        // ==================== 设计内容渲染 ====================
        function renderDesignContent() {
            const container = document.getElementById('designContent');
            if (!currentSession || !currentSession.design_content) {
                container.innerHTML = '<p>暂无设计内容</p>';
                return;
            }

            const design = currentSession.design_content;
            let html = '';

            // 项目概述
            html += '<div class="design-section">';
            html += '<h3 class="design-section-title">📋 项目概述</h3>';
            html += '<div class="design-content">';
            html += `<p><strong>项目名称:</strong> ${design.project_name || '未命名'}</p>`;
            html += '</div></div>';

            // 技术栈选型
            if (design.tech_stack_selection) {
                html += '<div class="design-section">';
                html += '<h3 class="design-section-title">🛠️ 技术栈选型</h3>';
                html += '<div class="design-content"><ul>';
                for (const [key, value] of Object.entries(design.tech_stack_selection)) {
                    html += `<li><strong>${formatKey(key)}:</strong> ${value}</li>`;
                }
                html += '</ul></div></div>';
            }

            // 组件树
            if (design.component_tree && design.component_tree.length > 0) {
                html += '<div class="design-section">';
                html += '<h3 class="design-section-title">🌳 组件树结构</h3>';
                html += '<div class="design-content">';
                html += '<pre>' + renderComponentTree(design.component_tree, 0) + '</pre>';
                html += '</div></div>';
            }

            // 路由设计
            if (design.routing_design && design.routing_design.routes) {
                html += '<div class="design-section">';
                html += '<h3 class="design-section-title">🗺️ 路由设计</h3>';
                html += '<div class="design-content"><ul>';
                design.routing_design.routes.forEach(route => {
                    html += `<li><code>${route.path}</code> → ${route.component}</li>`;
                });
                html += '</ul></div></div>';
            }

            // 性能优化
            if (design.performance_optimization && design.performance_optimization.length > 0) {
                html += '<div class="design-section">';
                html += '<h3 class="design-section-title">⚡ 性能优化策略</h3>';
                html += '<div class="design-content"><ul>';
                design.performance_optimization.forEach(item => {
                    html += `<li>${item}</li>`;
                });
                html += '</ul></div></div>';
            }

            // 安全考虑
            if (design.security_considerations && design.security_considerations.length > 0) {
                html += '<div class="design-section">';
                html += '<h3 class="design-section-title">🔒 安全考虑事项</h3>';
                html += '<div class="design-content"><ul>';
                design.security_considerations.forEach(item => {
                    html += `<li>${item}</li>`;
                });
                html += '</ul></div></div>';
            }

            container.innerHTML = html;
        }

        function formatKey(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function renderComponentTree(components, depth) {
            let result = '';
            components.forEach(comp => {
                const indent = '  '.repeat(depth);
                result += `${indent}${comp.name} (${comp.type})\n`;
                if (comp.children && comp.children.length > 0) {
                    result += renderComponentTree(comp.children, depth + 1);
                }
            });
            return result;
        }

        function toggleDesignView(viewType) {
            const container = document.getElementById('designContent');
            if (!currentSession || !currentSession.design_content) return;

            if (viewType === 'json') {
                container.innerHTML = '<pre>' + JSON.stringify(currentSession.design_content, null, 2) + '</pre>';
            } else {
                renderDesignContent();
            }
        }

        // ==================== 评论管理 ====================
        function renderComments(filter = 'all') {
            const container = document.getElementById('commentList');
            if (!currentSession || currentSession.comments.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">暂无评论</p>';
                return;
            }

            let comments = currentSession.comments;
            if (filter !== 'all') {
                comments = comments.filter(c => c.status === filter);
            }

            let html = '';
            comments.forEach(comment => {
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <div>
                                <span class="comment-author">${escapeHtml(comment.reviewer_name)}</span>
                                <span class="comment-role">${getRoleText(comment.reviewer_role)}</span>
                            </div>
                            <span class="comment-status status-${comment.status}">${getStatusText(comment.status)}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.content)}</div>
                        <div class="comment-meta">
                            ${comment.target_section ? '📍 ' + escapeHtml(comment.target_section) + ' | ' : ''}
                            🕐 ${new Date(comment.created_at).toLocaleString('zh-CN')}
                        </div>
                        ${comment.status === 'open' ? `
                        <div class="comment-actions">
                            <button class="btn btn-success" onclick="resolveComment('${comment.id}')">✓ 解决</button>
                            <button class="btn btn-outline" onclick="dismissComment('${comment.id}')">✗ 驳回</button>
                        </div>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function filterComments(filter) {
            renderComments(filter);
        }

        function submitComment(event) {
            event.preventDefault();

            const reviewerName = document.getElementById('commentReviewerName').value;
            const reviewerRole = document.getElementById('commentReviewerRole').value;
            const commentType = document.getElementById('commentType').value;
            const targetSection = document.getElementById('commentTargetSection').value;
            const content = document.getElementById('commentContent').value;

            const newComment = {
                id: 'comment_' + Date.now(),
                session_id: reviewId,
                reviewer_id: 'user_' + Date.now(),
                reviewer_name: reviewerName,
                reviewer_role: reviewerRole,
                comment_type: commentType,
                content: content,
                target_section: targetSection || null,
                target_line: null,
                parent_comment_id: null,
                status: 'open',
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString()
            };

            if (!currentSession.comments) {
                currentSession.comments = [];
            }
            currentSession.comments.push(newComment);
            currentSession.updated_at = new Date().toISOString();
            saveSessionToStorage();

            // 重置表单
            event.target.reset();

            // 刷新评论列表
            renderComments();
            updateStats();

            alert('✅ 评论已提交！');
        }

        function resolveComment(commentId) {
            const comment = currentSession.comments.find(c => c.id === commentId);
            if (comment) {
                comment.status = 'resolved';
                comment.resolved_at = new Date().toISOString();
                comment.resolved_by = 'current_user';
                currentSession.updated_at = new Date().toISOString();
                saveSessionToStorage();
                renderComments();
                updateStats();
            }
        }

        function dismissComment(commentId) {
            const comment = currentSession.comments.find(c => c.id === commentId);
            if (comment) {
                comment.status = 'dismissed';
                comment.updated_at = new Date().toISOString();
                currentSession.updated_at = new Date().toISOString();
                saveSessionToStorage();
                renderComments();
                updateStats();
            }
        }

        function addComment() {
            switchTab('comments');
            document.getElementById('commentContent').focus();
        }

        // ==================== 版本历史 ====================
        function renderVersionHistory() {
            const container = document.getElementById('versionTimeline');
            if (!currentSession || currentSession.versions.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary);">暂无版本历史</p>';
                return;
            }

            let html = '';
            currentSession.versions.forEach(version => {
                html += `
                    <div class="version-item">
                        <div class="version-number">版本 ${version.version_number}</div>
                        <div class="version-summary">${escapeHtml(version.change_summary)}</div>
                        <div class="version-meta">
                            👤 ${escapeHtml(version.changed_by)} | 
                            🕐 ${new Date(version.changed_at).toLocaleString('zh-CN')} |
                            📝 ${version.changes ? version.changes.length : 0} 项变更
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function createNewVersion() {
            const changeSummary = prompt('请输入变更摘要:');
            if (!changeSummary) return;

            const newVersionNumber = currentSession.versions.length + 1;
            const newVersion = {
                version_number: newVersionNumber,
                session_id: reviewId,
                design_content: JSON.parse(JSON.stringify(currentSession.design_content)),
                change_summary: changeSummary,
                changed_by: 'current_user',
                changed_at: new Date().toISOString(),
                changes: [{
                    type: 'manual_update',
                    description: changeSummary
                }]
            };

            currentSession.versions.push(newVersion);
            currentSession.updated_at = new Date().toISOString();
            saveSessionToStorage();

            alert(`✅ 版本 ${newVersionNumber} 已创建！`);
            renderVersionHistory();
            updateStats();
        }

        // ==================== AI 评审 ====================
        function renderAIReviewResults() {
            const container = document.getElementById('aiReviewResults');
            
            if (!currentSession || !currentSession.ai_review_results || currentSession.ai_review_results.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                        <p style="font-size: 1.2rem; margin-bottom: 1rem;">暂无 AI 评审结果</p>
                        <button class="btn btn-primary" onclick="runAIReview()">🤖 运行 AI 评审</button>
                    </div>
                `;
                return;
            }

            let html = '';
            currentSession.ai_review_results.forEach(result => {
                const statusClass = 'ai-review-' + result.status;
                const statusText = result.status === 'pass' ? '通过' : result.status === 'warning' ? '警告' : '错误';
                
                html += `
                    <div class="ai-review-result ${statusClass}">
                        <div class="ai-review-header">
                            <span class="ai-review-name">${escapeHtml(result.rule_name)}</span>
                            <span class="ai-review-status status-${result.status}">${statusText}</span>
                        </div>
                        <div class="ai-review-message">${escapeHtml(result.message)}</div>
                        ${result.suggestions && result.suggestions.length > 0 ? `
                            <ul class="ai-review-suggestions">
                                ${result.suggestions.map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                            </ul>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function runAIReview() {
            if (!currentSession || !currentSession.design_content) {
                alert('❌ 没有可评审的设计内容');
                return;
            }

            // 模拟 AI 评审（实际应该调用后端 API）
            const design = currentSession.design_content;
            const results = [];

            // 技术栈完整性检查
            const techStack = design.tech_stack_selection || {};
            if (techStack.frontend_framework && techStack.state_management && techStack.build_tool) {
                results.push({
                    rule_id: 'check_001',
                    rule_name: '技术栈完整性检查',
                    status: 'pass',
                    message: '技术栈选型完整',
                    suggestions: []
                });
            } else {
                results.push({
                    rule_id: 'check_001',
                    rule_name: '技术栈完整性检查',
                    status: 'warning',
                    message: '缺少部分技术栈配置',
                    suggestions: ['请补充完整的技术栈选型']
                });
            }

            // 组件深度检查
            const maxDepth = calculateComponentDepth(design.component_tree || []);
            if (maxDepth <= 5) {
                results.push({
                    rule_id: 'check_002',
                    rule_name: '组件层次深度检查',
                    status: 'pass',
                    message: `组件树深度合理（最大深度：${maxDepth}）`,
                    suggestions: []
                });
            } else {
                results.push({
                    rule_id: 'check_002',
                    rule_name: '组件层次深度检查',
                    status: 'warning',
                    message: `组件树深度过大（最大深度：${maxDepth}）`,
                    suggestions: ['建议重构组件结构，减少嵌套层次']
                });
            }

            // 性能优化检查
            const perfStrategies = design.performance_optimization || [];
            if (perfStrategies.length >= 3) {
                results.push({
                    rule_id: 'check_004',
                    rule_name: '性能优化策略检查',
                    status: 'pass',
                    message: `包含${perfStrategies.length}项性能优化策略`,
                    suggestions: []
                });
            } else {
                results.push({
                    rule_id: 'check_004',
                    rule_name: '性能优化策略检查',
                    status: 'warning',
                    message: `性能优化策略较少（${perfStrategies.length}项）`,
                    suggestions: ['建议补充更多性能优化措施']
                });
            }

            // 安全检查
            const security = design.security_considerations || [];
            if (security.length > 0) {
                results.push({
                    rule_id: 'check_005',
                    rule_name: '安全考虑检查',
                    status: 'pass',
                    message: `包含${security.length}项安全考虑`,
                    suggestions: []
                });
            } else {
                results.push({
                    rule_id: 'check_005',
                    rule_name: '安全考虑检查',
                    status: 'warning',
                    message: '缺少安全考虑事项',
                    suggestions: ['建议添加 XSS 防护措施', '建议添加 CSRF 防护方案']
                });
            }

            currentSession.ai_review_results = results;
            currentSession.updated_at = new Date().toISOString();
            saveSessionToStorage();

            renderAIReviewResults();
            alert('✅ AI 评审完成！共检查 ' + results.length + ' 项');
        }

        function calculateComponentDepth(components, currentDepth = 0) {
            if (!components || components.length === 0) return currentDepth;
            
            let maxDepth = currentDepth;
            components.forEach(comp => {
                const childDepth = calculateComponentDepth(comp.children || [], currentDepth + 1);
                maxDepth = Math.max(maxDepth, childDepth);
            });
            
            return maxDepth;
        }

        // ==================== 审批管理 ====================
        function renderApprovals() {
            const container = document.getElementById('approvalList');
            
            if (!currentSession || currentSession.approvals.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
                        <p style="font-size: 1.2rem; margin-bottom: 1rem;">暂无审批记录</p>
                    </div>
                `;
                return;
            }

            let html = '';
            currentSession.approvals.forEach(approval => {
                const approvalClass = 'approval-' + approval.decision;
                const decisionText = approval.decision === 'approved' ? '✅ 已批准' : 
                                    approval.decision === 'rejected' ? '❌ 已拒绝' : '⚠️ 条件批准';
                
                html += `
                    <div class="approval-item ${approvalClass}">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                            <strong>${escapeHtml(approval.reviewer_name)}</strong>
                            <span>${decisionText}</span>
                        </div>
                        <div style="color: var(--text-secondary); margin-bottom: 0.5rem;">
                            ${escapeHtml(approval.reviewer_role)} | 
                            ${new Date(approval.created_at).toLocaleString('zh-CN')}
                        </div>
                        <div style="color: var(--text-primary);">${escapeHtml(approval.comments)}</div>
                        ${approval.conditions && approval.conditions.length > 0 ? `
                            <div style="margin-top: 0.5rem; color: var(--warning-color);">
                                <strong>条件:</strong> ${approval.conditions.join(', ')}
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function showApprovalModal(decision) {
            document.getElementById('approvalDecision').value = decision;
            document.getElementById('approvalModalTitle').textContent = 
                decision === 'approved' ? '批准设计方案' : 
                decision === 'rejected' ? '拒绝设计方案' : '条件批准';
            
            const conditionsGroup = document.getElementById('approvalConditionsGroup');
            conditionsGroup.style.display = decision === 'conditional_approved' ? 'block' : 'none';
            
            document.getElementById('approvalModal').classList.add('active');
        }

        function closeApprovalModal() {
            document.getElementById('approvalModal').classList.remove('active');
        }

        function submitApproval(event) {
            event.preventDefault();

            const decision = document.getElementById('approvalDecision').value;
            const reviewerName = document.getElementById('approvalReviewerName').value;
            const reviewerRole = document.getElementById('approvalReviewerRole').value;
            const comments = document.getElementById('approvalComments').value;
            const conditionsStr = document.getElementById('approvalConditions').value;
            
            const conditions = conditionsStr ? conditionsStr.split(',').map(s => s.trim()) : [];

            const newApproval = {
                id: 'approval_' + Date.now(),
                session_id: reviewId,
                reviewer_id: 'user_' + Date.now(),
                reviewer_name: reviewerName,
                reviewer_role: reviewerRole,
                decision: decision,
                comments: comments,
                conditions: conditions,
                created_at: new Date().toISOString()
            };

            if (!currentSession.approvals) {
                currentSession.approvals = [];
            }
            currentSession.approvals.push(newApproval);

            // 根据审批更新状态
            if (decision === 'rejected') {
                currentSession.status = 'rejected';
            } else if (decision === 'approved' && currentSession.approvals.every(a => a.decision === 'approved')) {
                currentSession.status = 'approved';
            } else if (conditions.length > 0 || decision === 'conditional_approved') {
                currentSession.status = 'revision_required';
            }

            currentSession.updated_at = new Date().toISOString();
            saveSessionToStorage();

            closeApprovalModal();
            event.target.reset();

            renderApprovals();
            updateUI();

            alert('✅ 审批已提交！');
        }

        // ==================== 工作流操作 ====================
        function startReview() {
            if (!currentSession) return;
            
            currentSession.status = 'in_progress';
            currentSession.updated_at = new Date().toISOString();
            saveSessionToStorage();
            updateUI();
            
            alert('✅ 评审已开始！');
        }

        function requestRevision() {
            const reason = prompt('请输入需要修改的原因:');
            if (!reason) return;

            if (!currentSession.comments) {
                currentSession.comments = [];
            }

            currentSession.comments.push({
                id: 'comment_' + Date.now(),
                session_id: reviewId,
                reviewer_id: 'system',
                reviewer_name: '系统',
                reviewer_role: 'system',
                comment_type: 'revision_request',
                content: '请求修改：' + reason,
                status: 'open',
                created_at: new Date().toISOString()
            });

            currentSession.status = 'revision_required';
            currentSession.updated_at = new Date().toISOString();
            saveSessionToStorage();
            updateUI();

            alert('✅ 已请求修改！');
        }

        function exportMarkdown() {
            if (!currentSession) return;

            let md = '# 前端技术方案评审报告\n\n';
            md += `**项目名称**: ${currentSession.project_name}\n`;
            md += `**评审 ID**: ${currentSession.id}\n`;
            md += `**当前状态**: ${getStatusText(currentSession.status)}\n`;
            md += `**创建时间**: ${currentSession.created_at}\n`;
            md += `**最后更新**: ${currentSession.updated_at}\n\n`;

            md += '## 需求描述\n\n';
            md += currentSession.requirement_text + '\n\n';

            md += '## 版本历史\n\n';
            currentSession.versions.forEach(v => {
                md += `### 版本 ${v.version_number}\n`;
                md += `- 变更摘要：${v.change_summary}\n`;
                md += `- 修改人：${v.changed_by}\n`;
                md += `- 修改时间：${v.changed_at}\n\n`;
            });

            md += '## 评审意见\n\n';
            if (currentSession.comments.length > 0) {
                currentSession.comments.forEach(c => {
                    md += `- **${c.reviewer_name}** (${c.reviewer_role}): ${c.content}\n`;
                });
            } else {
                md += '暂无评论\n';
            }
            md += '\n';

            md += '## 审批记录\n\n';
            if (currentSession.approvals.length > 0) {
                currentSession.approvals.forEach(a => {
                    md += `- **${a.reviewer_name}**: ${a.decision} - ${a.comments}\n`;
                });
            } else {
                md += '暂无审批记录\n';
            }

            // 下载文件
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `review_${currentSession.id}.md`;
            a.click();
            URL.revokeObjectURL(url);

            alert('✅ Markdown 报告已导出！');
        }

        // ==================== 工具函数 ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getRoleText(role) {
            const roleMap = {
                'ai_reviewer': 'AI 评审员',
                'human_reviewer': '人工评审员',
                'tech_lead': '技术负责人',
                'architect': '架构师',
                'project_manager': '项目经理'
            };
            return roleMap[role] || role;
        }
    </script>
</body>
</html>
