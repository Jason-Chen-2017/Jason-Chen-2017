<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级马里奥经典版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(255, 100, 100, 0.5);
        }

        #game-canvas {
            display: block;
            background: linear-gradient(180deg, #5c94fc 0%, #5c94fc 80%, #8b4513 80%, #8b4513 100%);
        }

        /* UI 覆盖层 */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }

        .ui-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ui-label {
            font-size: 12px;
            color: #ffcc00;
        }

        .ui-value {
            font-size: 18px;
            font-weight: bold;
        }

        /* 开始界面 */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #5c94fc 0%, #5c94fc 70%, #8b4513 70%, #8b4513 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-title {
            font-size: 48px;
            color: #e52521;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #fff;
            margin-bottom: 40px;
            animation: titleBounce 0.5s ease-in-out infinite alternate;
        }

        @keyframes titleBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .start-btn {
            padding: 20px 50px;
            font-size: 20px;
            font-family: inherit;
            background: #e52521;
            color: #fff;
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 6px 0 #8b0000, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            margin-bottom: 30px;
        }

        .start-btn:hover {
            background: #ff4444;
            transform: translateY(-2px);
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8b0000, 0 4px 10px rgba(0,0,0,0.5);
        }

        .controls-info {
            color: #fff;
            font-size: 14px;
            text-align: center;
            line-height: 2;
            text-shadow: 2px 2px 0 #000;
        }

        .key {
            display: inline-block;
            padding: 5px 12px;
            background: #fff;
            color: #000;
            border-radius: 5px;
            margin: 0 5px;
            font-weight: bold;
        }

        /* 游戏结束界面 */
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
        }

        .game-over-title {
            font-size: 48px;
            color: #e52521;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 30px;
        }

        .game-clear-title {
            font-size: 48px;
            color: #4ade80;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 30px;
        }

        .final-score {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-family: inherit;
            background: #4ade80;
            color: #000;
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: 1px 1px 0 #000;
            box-shadow: 0 4px 0 #166534, 0 8px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #86efac;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #166534, 0 3px 8px rgba(0,0,0,0.5);
        }

        /* 关卡提示 */
        .level-notify {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #ffcc00;
            text-shadow: 3px 3px 0 #000;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .level-notify.show {
            animation: levelNotify 2s ease-out;
        }

        @keyframes levelNotify {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        /* 音效开关 */
        .sound-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.2s ease;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            background: rgba(0, 0, 0, 0.7);
        }

        .sound-toggle.muted {
            opacity: 0.5;
        }

        /* 生命显示 */
        .lives-display {
            position: absolute;
            bottom: 15px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .life-icon {
            width: 30px;
            height: 30px;
            background: #e52521;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 2px 2px 0 #000;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        
        <!-- UI 覆盖层 -->
        <div class="ui-overlay">
            <div class="ui-item">
                <div class="ui-label">MARIO</div>
                <div class="ui-value" id="score">000000</div>
            </div>
            <div class="ui-item">
                <div class="ui-label">COINS</div>
                <div class="ui-value" id="coins">×00</div>
            </div>
            <div class="ui-item">
                <div class="ui-label">WORLD</div>
                <div class="ui-value" id="world">1-1</div>
            </div>
            <div class="ui-item">
                <div class="ui-label">TIME</div>
                <div class="ui-value" id="time">300</div>
            </div>
        </div>

        <!-- 音效开关 -->
        <button class="sound-toggle" id="soundToggle">🔊</button>

        <!-- 生命显示 -->
        <div class="lives-display" id="livesDisplay"></div>

        <!-- 关卡提示 -->
        <div class="level-notify" id="levelNotify"></div>

        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen">
            <div class="game-title">SUPER MARIO</div>
            <button class="start-btn" id="startBtn">START GAME</button>
            <div class="controls-info">
                <div><span class="key">←</span> <span class="key">→</span> 移动</div>
                <div><span class="key">SPACE</span> 跳跃（按住可跳更高）</div>
                <div><span class="key">SHIFT</span> 加速跑</div>
                <div>踩敌人 | 顶砖块 | 吃蘑菇变大</div>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-title" id="gameOverTitle">GAME OVER</div>
            <div class="final-score" id="finalScore">SCORE: 0</div>
            <button class="restart-btn" id="restartBtn">TRY AGAIN</button>
        </div>
    </div>

    <script>
        // ==================== 音效管理器 ====================
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
                this.masterGain = null;
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.connect(this.audioContext.destination);
                    this.masterGain.gain.value = 0.25;
                }
            }

            toggle() {
                this.enabled = !this.enabled;
                if (this.masterGain) {
                    this.masterGain.gain.value = this.enabled ? 0.25 : 0;
                }
                return this.enabled;
            }

            playTone(frequency, duration, type = 'square', startTime = 0) {
                if (!this.enabled || !this.audioContext) return;

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);

                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime + startTime);

                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime + startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + startTime + duration);

                oscillator.start(this.audioContext.currentTime + startTime);
                oscillator.stop(this.audioContext.currentTime + startTime + duration);
            }

            // 跳跃音效
            playJump() {
                this.playTone(400, 0.1, 'square', 0);
                this.playTone(600, 0.1, 'square', 0.1);
            }

            // 吃金币音效
            playCoin() {
                this.playTone(900, 0.1, 'square', 0);
                this.playTone(1200, 0.15, 'square', 0.1);
            }

            // 踩敌人音效
            playStomp() {
                this.playTone(200, 0.1, 'sawtooth', 0);
                this.playTone(150, 0.1, 'sawtooth', 0.1);
            }

            // 吃蘑菇音效
            playPowerup() {
                [400, 500, 600, 700, 800].forEach((freq, i) => {
                    this.playTone(freq, 0.1, 'square', i * 0.1);
                });
            }

            // 死亡音效
            playDeath() {
                [400, 350, 300, 250, 200].forEach((freq, i) => {
                    this.playTone(freq, 0.2, 'sawtooth', i * 0.15);
                });
            }

            // 过关音效
            playLevelClear() {
                [523, 659, 784, 1047, 784, 1047].forEach((freq, i) => {
                    this.playTone(freq, 0.15, 'square', i * 0.12);
                });
            }

            // 顶砖块音效
            playBump() {
                this.playTone(150, 0.08, 'square', 0);
            }

            // 砖块破碎音效
            playBreak() {
                this.playTone(100, 0.1, 'sawtooth', 0);
                this.playTone(80, 0.1, 'sawtooth', 0.05);
            }

            // 游戏开始音效
            playStart() {
                [523, 523, 0, 523, 0, 392, 0, 494, 0, 523].forEach((freq, i) => {
                    if (freq > 0) {
                        this.playTone(freq, 0.1, 'square', i * 0.1);
                    }
                });
            }

            // 背景音乐（简化版）
            playBackgroundMusic() {
                if (!this.enabled || !this.audioContext) return;
                // 简化的背景音乐循环
            }
        }

        // ==================== 游戏常量 ====================
        const TILE_SIZE = 40;
        const GRAVITY = 0.6;
        const FRICTION = 0.85;
        const MAX_SPEED = 6;
        const JUMP_FORCE = -14;

        // ==================== 关卡数据 ====================
        const levels = [
            // 关卡 1-1
            {
                world: '1-1',
                time: 300,
                map: [
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '      ?                                                                                             ',
                    '                                                                                                    ',
                    '                    ?#?#?                                                                           ',
                    '                                                                                                    ',
                    '                              ###                  ###                                              ',
                    '         G                    # #                  # #        F                                     ',
                    '       #####                  # #        G         # #      #####                                   ',
                    '                              # #                  # #                                              ',
                    'P        G       G     ?      # #  G      G   F    # #   F      F                                   ',
                    '#################  ##########  # ##########  ####### #  #########  ##################################',
                    '#################  ##########  # ##########  ####### #  #########  ##################################'
                ]
            },
            // 关卡 1-2
            {
                world: '1-2',
                time: 300,
                map: [
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                    ###    ###    ###                                                               ',
                    '                                                                                                    ',
                    '         ?  ?  ?   # #    # #    # #                                                                ',
                    '                                                                                                    ',
                    '                   # #    # #    # #         G                                                      ',
                    'P       G   G      # #    # #    # #       #####                                                    ',
                    '#################  # #    # #    # #  #################  ###########################################',
                    '#################  # #    # #    # #  #################  ###########################################',
                    '#################  # #    # #    # #  #################  ###########################################',
                    '#################  ###    ###    ###  #################  ###########################################'
                ]
            },
            // 关卡 1-3
            {
                world: '1-3',
                time: 400,
                map: [
                    '                                                                                                    ',
                    '                                                                                                    ',
                    '                    ?                                                                               ',
                    '                   ###                                                                              ',
                    '                                                                                                    ',
                    '              ?         ?                                                                           ',
                    '             ###       ###                                                                          ',
                    '                                                                                                    ',
                    '       ?                  ?     G                                                                   ',
                    '      ###                ###  #####                                                                 ',
                    'P                           #     #    G                                                           ',
                    '#####   G   ?   G   ?       #     #  #####                                                         ',
                    '#####  ### ### ### ###      #     #  #####                                                         ',
                    '#####              #        #     #  #####        F                                                 ',
                    '#####              #   G    #  G  #  #####      #####                                               ',
                    '####################################################################################################'
                ]
            }
        ];

        // ==================== 游戏类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.soundManager = new SoundManager();
                
                this.currentLevel = 0;
                this.score = 0;
                this.coins = 0;
                this.lives = 3;
                this.time = 300;
                this.gameRunning = false;
                this.gameOver = false;
                
                this.player = null;
                this.tiles = [];
                this.enemies = [];
                this.items = [];
                this.particles = [];
                this.camera = { x: 0, y: 0 };
                
                this.keys = {};
                this.setupControls();
                
                this.lastTime = 0;
                this.timeAccumulator = 0;
            }

            setupControls() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                        e.preventDefault();
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });

                document.getElementById('startBtn').addEventListener('click', () => {
                    this.soundManager.init();
                    this.soundManager.playStart();
                    this.startGame();
                });

                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.soundManager.playStart();
                    this.startGame();
                });

                document.getElementById('soundToggle').addEventListener('click', (e) => {
                    const enabled = this.soundManager.toggle();
                    e.target.textContent = enabled ? '🔊' : '🔇';
                    e.target.classList.toggle('muted');
                });
            }

            startGame() {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                
                this.currentLevel = 0;
                this.score = 0;
                this.coins = 0;
                this.lives = 3;
                this.gameRunning = true;
                this.gameOver = false;
                
                this.loadLevel(this.currentLevel);
                this.updateUI();
                this.gameLoop(0);
            }

            loadLevel(levelIndex) {
                const levelData = levels[levelIndex];
                this.time = levelData.time;
                
                // 解析地图
                this.tiles = [];
                this.enemies = [];
                this.items = [];
                this.particles = [];
                
                const map = levelData.map;
                for (let row = 0; row < map.length; row++) {
                    this.tiles[row] = [];
                    for (let col = 0; col < map[row].length; col++) {
                        const char = map[row][col];
                        let tile = null;
                        
                        switch (char) {
                            case '#':
                                tile = { type: 'ground', x: col * TILE_SIZE, y: row * TILE_SIZE, hit: false };
                                break;
                            case '?':
                                tile = { type: 'question', x: col * TILE_SIZE, y: row * TILE_SIZE, hit: false, item: 'coin' };
                                break;
                            case 'P':
                                this.player = {
                                    x: col * TILE_SIZE,
                                    y: row * TILE_SIZE,
                                    width: 30,
                                    height: 30,
                                    vx: 0,
                                    vy: 0,
                                    onGround: false,
                                    isBig: false,
                                    isInvincible: false,
                                    invincibleTime: 0,
                                    facing: 1
                                };
                                tile = null;
                                break;
                            case 'G':
                                this.enemies.push({
                                    x: col * TILE_SIZE,
                                    y: row * TILE_SIZE,
                                    width: 30,
                                    height: 30,
                                    vx: -1,
                                    vy: 0,
                                    type: 'goomba',
                                    dead: false,
                                    deadTime: 0
                                });
                                tile = null;
                                break;
                            case 'F':
                                tile = { type: 'flag', x: col * TILE_SIZE, y: row * TILE_SIZE };
                                break;
                            default:
                                tile = null;
                        }
                        
                        this.tiles[row][col] = tile;
                    }
                }
                
                this.camera.x = 0;
                this.camera.y = 0;
                
                // 显示关卡提示
                this.showLevelNotify(`WORLD ${levelData.world}`);
            }

            showLevelNotify(text) {
                const notify = document.getElementById('levelNotify');
                notify.textContent = text;
                notify.classList.add('show');
                setTimeout(() => notify.classList.remove('show'), 2000);
            }

            update(deltaTime) {
                if (!this.gameRunning || this.gameOver) return;
                
                // 更新时间
                this.timeAccumulator += deltaTime;
                if (this.timeAccumulator >= 1000) {
                    this.time--;
                    this.timeAccumulator = 0;
                    if (this.time <= 0) {
                        this.playerDie();
                    }
                }
                
                // 玩家输入
                this.handlePlayerInput();
                
                // 更新玩家
                this.updatePlayer();
                
                // 更新敌人
                this.updateEnemies();
                
                // 更新物品
                this.updateItems();
                
                // 更新粒子
                this.updateParticles();
                
                // 更新摄像机
                this.updateCamera();
                
                // 检查胜利条件
                this.checkWin();
                
                // 更新 UI
                this.updateUI();
            }

            handlePlayerInput() {
                if (!this.player) return;
                
                const speed = this.keys['ShiftLeft'] ? MAX_SPEED * 1.5 : MAX_SPEED;
                
                // 左右移动
                if (this.keys['ArrowLeft'] || this.keys['KeyA']) {
                    this.player.vx -= 0.5;
                    this.player.facing = -1;
                }
                if (this.keys['ArrowRight'] || this.keys['KeyD']) {
                    this.player.vx += 0.5;
                    this.player.facing = 1;
                }
                
                // 限制速度
                this.player.vx = Math.max(-speed, Math.min(speed, this.player.vx));
                
                // 摩擦力
                if (!this.keys['ArrowLeft'] && !this.keys['KeyA'] && !this.keys['ArrowRight'] && !this.keys['KeyD']) {
                    this.player.vx *= FRICTION;
                }
                
                // 跳跃
                if ((this.keys['Space'] || this.keys['ArrowUp'] || this.keys['KeyW']) && this.player.onGround) {
                    this.player.vy = JUMP_FORCE;
                    this.player.onGround = false;
                    this.soundManager.playJump();
                }
                
                // 可变高度跳跃
                if (!this.keys['Space'] && !this.keys['ArrowUp'] && !this.keys['KeyW'] && this.player.vy < -5) {
                    this.player.vy = -5;
                }
            }

            updatePlayer() {
                if (!this.player) return;
                
                // 应用重力
                this.player.vy += GRAVITY;
                
                // 更新位置
                this.player.x += this.player.vx;
                this.player.y += this.player.vy;
                
                // 边界检查
                if (this.player.x < 0) {
                    this.player.x = 0;
                    this.player.vx = 0;
                }
                
                // 掉落死亡
                if (this.player.y > this.canvas.height) {
                    this.playerDie();
                    return;
                }
                
                // 碰撞检测
                this.player.onGround = false;
                this.checkTileCollisions();
                
                // 无敌时间
                if (this.player.isInvincible) {
                    this.player.invincibleTime--;
                    if (this.player.invincibleTime <= 0) {
                        this.player.isInvincible = false;
                    }
                }
            }

            checkTileCollisions() {
                const player = this.player;
                const playerLeft = Math.floor(player.x / TILE_SIZE);
                const playerRight = Math.floor((player.x + player.width) / TILE_SIZE);
                const playerTop = Math.floor(player.y / TILE_SIZE);
                const playerBottom = Math.floor((player.y + player.height) / TILE_SIZE);
                
                for (let row = playerTop; row <= playerBottom; row++) {
                    for (let col = playerLeft; col <= playerRight; col++) {
                        if (row < 0 || row >= this.tiles.length || col < 0 || col >= (this.tiles[row]?.length || 0)) continue;
                        
                        const tile = this.tiles[row][col];
                        if (!tile) continue;
                        
                        if (tile.type === 'ground' || tile.type === 'question') {
                            const tileLeft = col * TILE_SIZE;
                            const tileRight = tileLeft + TILE_SIZE;
                            const tileTop = row * TILE_SIZE;
                            const tileBottom = tileTop + TILE_SIZE;
                            
                            // 检测碰撞
                            if (player.x < tileRight && player.x + player.width > tileLeft &&
                                player.y < tileBottom && player.y + player.height > tileTop) {
                                
                                // 从上方碰撞（站在上面）
                                if (player.vy > 0 && player.y + player.height - player.vy <= tileTop + 10) {
                                    player.y = tileTop - player.height;
                                    player.vy = 0;
                                    player.onGround = true;
                                }
                                // 从下方碰撞（顶到）
                                else if (player.vy < 0 && player.y - player.vy >= tileBottom - 10) {
                                    player.y = tileBottom;
                                    player.vy = 0;
                                    
                                    if (tile.type === 'question' && !tile.hit) {
                                        this.hitQuestionBlock(col, row);
                                    } else if (tile.type === 'ground') {
                                        this.soundManager.playBump();
                                    }
                                }
                                // 侧面碰撞
                                else {
                                    if (player.x + player.width / 2 < tileLeft + TILE_SIZE / 2) {
                                        player.x = tileLeft - player.width;
                                    } else {
                                        player.x = tileRight;
                                    }
                                    player.vx = 0;
                                }
                            }
                        } else if (tile.type === 'flag') {
                            // 到达终点
                            this.levelComplete();
                        }
                    }
                }
            }

            hitQuestionBlock(col, row) {
                const tile = this.tiles[row][col];
                tile.hit = true;
                this.soundManager.playBump();
                
                // 生成金币
                this.items.push({
                    x: col * TILE_SIZE,
                    y: row * TILE_SIZE - TILE_SIZE,
                    width: 30,
                    height: 30,
                    type: 'coin',
                    vy: -8,
                    collected: false
                });
                
                this.coins++;
                this.score += 200;
                this.soundManager.playCoin();
                
                // 生成粒子
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: col * TILE_SIZE + TILE_SIZE / 2,
                        y: row * TILE_SIZE,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 30,
                        color: '#ffd700'
                    });
                }
            }

            updateEnemies() {
                this.enemies.forEach(enemy => {
                    if (enemy.dead) {
                        enemy.deadTime--;
                        return;
                    }
                    
                    // 应用重力
                    enemy.vy += GRAVITY;
                    
                    // 更新位置
                    enemy.x += enemy.vx;
                    enemy.y += enemy.vy;
                    
                    // 简单碰撞检测
                    const enemyLeft = Math.floor(enemy.x / TILE_SIZE);
                    const enemyRight = Math.floor((enemy.x + enemy.width) / TILE_SIZE);
                    const enemyTop = Math.floor(enemy.y / TILE_SIZE);
                    const enemyBottom = Math.floor((enemy.y + enemy.height) / TILE_SIZE);
                    
                    for (let row = enemyTop; row <= enemyBottom; row++) {
                        for (let col = enemyLeft; col <= enemyRight; col++) {
                            if (row < 0 || row >= this.tiles.length || col < 0 || col >= (this.tiles[row]?.length || 0)) continue;
                            
                            const tile = this.tiles[row][col];
                            if (tile && (tile.type === 'ground' || tile.type === 'question')) {
                                const tileTop = row * TILE_SIZE;
                                const tileBottom = tileTop + TILE_SIZE;
                                const tileLeft = col * TILE_SIZE;
                                const tileRight = tileLeft + TILE_SIZE;
                                
                                if (enemy.x < tileRight && enemy.x + enemy.width > tileLeft &&
                                    enemy.y < tileBottom && enemy.y + enemy.height > tileTop) {
                                    
                                    if (enemy.vy > 0 && enemy.y + enemy.height - enemy.vy <= tileTop + 10) {
                                        enemy.y = tileTop - enemy.height;
                                        enemy.vy = 0;
                                    } else {
                                        enemy.vx *= -1;
                                    }
                                }
                            }
                        }
                    }
                    
                    // 与玩家碰撞
                    if (this.player && !enemy.dead && !this.player.isInvincible) {
                        if (this.checkCollision(this.player, enemy)) {
                            // 玩家从上方踩敌人
                            if (this.player.vy > 0 && this.player.y + this.player.height - this.player.vy <= enemy.y + enemy.height / 2) {
                                enemy.dead = true;
                                enemy.deadTime = 30;
                                this.player.vy = -8;
                                this.score += 100;
                                this.soundManager.playStomp();
                                
                                // 生成粒子
                                for (let i = 0; i < 8; i++) {
                                    this.particles.push({
                                        x: enemy.x + enemy.width / 2,
                                        y: enemy.y + enemy.height / 2,
                                        vx: (Math.random() - 0.5) * 8,
                                        vy: (Math.random() - 0.5) * 8,
                                        life: 20,
                                        color: '#8b4513'
                                    });
                                }
                            } else {
                                // 玩家受伤
                                this.playerHit();
                            }
                        }
                    }
                });
                
                // 移除死亡的敌人
                this.enemies = this.enemies.filter(e => !e.dead || e.deadTime > 0);
            }

            updateItems() {
                this.items.forEach(item => {
                    if (item.collected) return;
                    
                    item.vy += GRAVITY;
                    item.y += item.vy;
                    
                    // 与玩家碰撞
                    if (this.player && this.checkCollision(this.player, item)) {
                        item.collected = true;
                        if (item.type === 'coin') {
                            this.score += 200;
                            this.soundManager.playCoin();
                        }
                    }
                });
            }

            updateParticles() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += GRAVITY;
                    p.life--;
                });
                this.particles = this.particles.filter(p => p.life > 0);
            }

            updateCamera() {
                if (!this.player) return;
                
                const targetX = this.player.x - this.canvas.width / 2;
                this.camera.x += (targetX - this.camera.x) * 0.1;
                this.camera.x = Math.max(0, this.camera.x);
            }

            checkCollision(a, b) {
                return a.x < b.x + b.width &&
                       a.x + a.width > b.x &&
                       a.y < b.y + b.height &&
                       a.y + a.height > b.y;
            }

            playerHit() {
                if (this.player.isBig) {
                    this.player.isBig = false;
                    this.player.height = 30;
                    this.player.isInvincible = true;
                    this.player.invincibleTime = 120;
                    this.soundManager.playBump();
                } else {
                    this.playerDie();
                }
            }

            playerDie() {
                this.soundManager.playDeath();
                this.lives--;
                
                if (this.lives <= 0) {
                    this.gameOver = true;
                    this.showGameOver();
                } else {
                    this.loadLevel(this.currentLevel);
                }
                
                this.updateUI();
            }

            levelComplete() {
                this.soundManager.playLevelClear();
                this.score += this.time * 10;
                
                this.currentLevel++;
                if (this.currentLevel >= levels.length) {
                    this.gameOver = true;
                    this.showGameClear();
                } else {
                    this.loadLevel(this.currentLevel);
                }
                
                this.updateUI();
            }

            checkWin() {
                // 检查是否到达旗帜
                const playerCol = Math.floor((this.player.x + this.player.width / 2) / TILE_SIZE);
                const playerRow = Math.floor((this.player.y + this.player.height / 2) / TILE_SIZE);
                
                if (playerRow >= 0 && playerRow < this.tiles.length &&
                    playerCol >= 0 && playerCol < (this.tiles[playerRow]?.length || 0)) {
                    const tile = this.tiles[playerRow][playerCol];
                    if (tile && tile.type === 'flag') {
                        this.levelComplete();
                    }
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score.toString().padStart(6, '0');
                document.getElementById('coins').textContent = '×' + this.coins.toString().padStart(2, '0');
                document.getElementById('world').textContent = levels[this.currentLevel]?.world || '1-1';
                document.getElementById('time').textContent = this.time;
                
                // 更新生命显示
                const livesDisplay = document.getElementById('livesDisplay');
                livesDisplay.innerHTML = '';
                for (let i = 0; i < this.lives; i++) {
                    const life = document.createElement('div');
                    life.className = 'life-icon';
                    livesDisplay.appendChild(life);
                }
            }

            showGameOver() {
                document.getElementById('gameOverTitle').textContent = 'GAME OVER';
                document.getElementById('gameOverTitle').style.color = '#e52521';
                document.getElementById('finalScore').textContent = 'SCORE: ' + this.score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            showGameClear() {
                document.getElementById('gameOverTitle').textContent = 'YOU WIN!';
                document.getElementById('gameOverTitle').style.color = '#4ade80';
                document.getElementById('finalScore').textContent = 'FINAL SCORE: ' + this.score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#5c94fc';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.save();
                this.ctx.translate(-this.camera.x, -this.camera.y);
                
                // 绘制地图
                this.drawMap();
                
                // 绘制物品
                this.drawItems();
                
                // 绘制敌人
                this.drawEnemies();
                
                // 绘制玩家
                this.drawPlayer();
                
                // 绘制粒子
                this.drawParticles();
                
                this.ctx.restore();
            }

            drawMap() {
                const startCol = Math.floor(this.camera.x / TILE_SIZE);
                const endCol = startCol + Math.ceil(this.canvas.width / TILE_SIZE) + 1;
                
                for (let row = 0; row < this.tiles.length; row++) {
                    for (let col = startCol; col < endCol; col++) {
                        if (col < 0 || col >= (this.tiles[row]?.length || 0)) continue;
                        
                        const tile = this.tiles[row][col];
                        if (!tile) continue;
                        
                        const x = col * TILE_SIZE;
                        const y = row * TILE_SIZE;
                        
                        if (tile.type === 'ground') {
                            // 地面砖块
                            this.ctx.fillStyle = '#c84c0c';
                            this.ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            this.ctx.fillStyle = '#e09060';
                            this.ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            this.ctx.fillStyle = '#c84c0c';
                            this.ctx.fillRect(x + 5, y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                        } else if (tile.type === 'question') {
                            if (tile.hit) {
                                // 已使用的问号砖
                                this.ctx.fillStyle = '#9c4a00';
                                this.ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            } else {
                                // 问号砖
                                this.ctx.fillStyle = '#fc9838';
                                this.ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                                this.ctx.fillStyle = '#000';
                                this.ctx.font = 'bold 24px Arial';
                                this.ctx.textAlign = 'center';
                                this.ctx.fillText('?', x + TILE_SIZE / 2, y + TILE_SIZE - 10);
                            }
                        } else if (tile.type === 'flag') {
                            // 旗杆
                            this.ctx.fillStyle = '#00ff00';
                            this.ctx.fillRect(x + TILE_SIZE / 2 - 3, y, 6, TILE_SIZE);
                            this.ctx.fillStyle = '#00ff00';
                            this.ctx.beginPath();
                            this.ctx.moveTo(x + TILE_SIZE / 2 + 3, y);
                            this.ctx.lineTo(x + TILE_SIZE / 2 + 25, y + 10);
                            this.ctx.lineTo(x + TILE_SIZE / 2 + 3, y + 20);
                            this.ctx.fill();
                        }
                    }
                }
            }

            drawItems() {
                this.items.forEach(item => {
                    if (item.collected) return;
                    
                    if (item.type === 'coin') {
                        // 金币
                        this.ctx.fillStyle = '#ffd700';
                        this.ctx.beginPath();
                        this.ctx.ellipse(item.x + item.width / 2, item.y + item.height / 2, 10, 14, 0, 0, Math.PI * 2);
                        this.ctx.fill();
                        this.ctx.fillStyle = '#ffec8b';
                        this.ctx.beginPath();
                        this.ctx.ellipse(item.x + item.width / 2 - 3, item.y + item.height / 2 - 3, 4, 6, 0, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                });
            }

            drawEnemies() {
                this.enemies.forEach(enemy => {
                    if (enemy.dead && enemy.deadTime < 15) return;
                    
                    const x = enemy.x;
                    const y = enemy.dead ? enemy.y + 15 : enemy.y;
                    const h = enemy.dead ? 15 : enemy.height;
                    
                    if (enemy.type === 'goomba') {
                        // Goomba 敌人
                        this.ctx.fillStyle = '#ab5236';
                        this.ctx.beginPath();
                        this.ctx.arc(x + enemy.width / 2, y + h / 2, 15, 0, Math.PI * 2);
                        this.ctx.fill();
                        
                        // 脚
                        this.ctx.fillStyle = '#000';
                        const footOffset = Math.sin(Date.now() / 100) * 3;
                        this.ctx.fillRect(x + 5 - footOffset, y + h - 8, 10, 8);
                        this.ctx.fillRect(x + enemy.width - 15 + footOffset, y + h - 8, 10, 8);
                        
                        // 眼睛
                        this.ctx.fillStyle = '#fff';
                        this.ctx.fillRect(x + 8, y + 8, 6, 8);
                        this.ctx.fillRect(x + enemy.width - 14, y + 8, 6, 8);
                        this.ctx.fillStyle = '#000';
                        this.ctx.fillRect(x + 10, y + 10, 3, 5);
                        this.ctx.fillRect(x + enemy.width - 12, y + 10, 3, 5);
                        
                        // 眉毛
                        this.ctx.fillStyle = '#000';
                        this.ctx.fillRect(x + 6, y + 5, 10, 3);
                        this.ctx.fillRect(x + enemy.width - 16, y + 5, 10, 3);
                    }
                });
            }

            drawPlayer() {
                if (!this.player) return;
                
                // 无敌闪烁
                if (this.player.isInvincible && Math.floor(Date.now() / 50) % 2 === 0) return;
                
                const x = this.player.x;
                const y = this.player.y;
                const w = this.player.width;
                const h = this.player.height;
                
                // 身体（红色）
                this.ctx.fillStyle = '#e52521';
                this.ctx.fillRect(x + 5, y + 10, w - 10, h - 10);
                
                // 头部（肤色）
                this.ctx.fillStyle = '#ffcc99';
                this.ctx.fillRect(x + 5, y, w - 10, 12);
                
                // 帽子（红色）
                this.ctx.fillStyle = '#e52521';
                this.ctx.fillRect(x + 3, y, w - 6, 6);
                this.ctx.fillRect(x + (this.player.facing === 1 ? w - 10 : 0), y + 3, 12, 3);
                
                // 眼睛
                this.ctx.fillStyle = '#000';
                const eyeX = this.player.facing === 1 ? x + w - 12 : x + 8;
                this.ctx.fillRect(eyeX, y + 4, 4, 5);
                
                // 胡子
                this.ctx.fillStyle = '#000';
                const mustacheX = this.player.facing === 1 ? x + w - 14 : x + 6;
                this.ctx.fillRect(mustacheX, y + 9, 10, 3);
                
                // 背带裤（蓝色）
                this.ctx.fillStyle = '#0066cc';
                this.ctx.fillRect(x + 5, y + h - 12, w - 10, 12);
                
                // 背带
                this.ctx.fillRect(x + 8, y + h - 18, 4, 8);
                this.ctx.fillRect(x + w - 12, y + h - 18, 4, 8);
                
                // 纽扣
                this.ctx.fillStyle = '#ffcc00';
                this.ctx.fillRect(x + 10, y + h - 10, 3, 3);
                this.ctx.fillRect(x + w - 13, y + h - 10, 3, 3);
            }

            drawParticles() {
                this.particles.forEach(p => {
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life / 30;
                    this.ctx.fillRect(p.x, p.y, 6, 6);
                    this.ctx.globalAlpha = 1;
                });
            }

            gameLoop(timestamp) {
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;
                
                this.update(deltaTime);
                this.draw();
                
                requestAnimationFrame((t) => this.gameLoop(t));
            }
        }

        // ==================== 初始化游戏 ====================
        window.addEventListener('load', () => {
            const game = new Game();
        });
    </script>
