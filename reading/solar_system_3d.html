<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 太阳系模拟系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            max-width: 300px;
            z-index: 100;
        }

        #info-panel h2 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 24px;
        }

        #info-panel p {
            margin: 5px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            z-index: 100;
        }

        #control-panel h3 {
            color: #4fc3f7;
            margin-bottom: 15px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 200px;
            cursor: pointer;
        }

        .control-group button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }

        .control-group button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
        }

        #planet-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            min-width: 250px;
            z-index: 100;
            display: none;
        }

        #planet-info h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        #planet-info .info-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        #planet-info .info-label {
            color: #aaa;
        }

        #planet-info .info-value {
            color: #4fc3f7;
            font-weight: bold;
        }

        #audio-control {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            z-index: 100;
            cursor: pointer;
        }

        #audio-control:hover {
            background: rgba(100, 200, 255, 0.2);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .planet-label {
            color: #fff;
            font-size: 12px;
            text-shadow: 0 0 5px #000;
            pointer-events: none;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #start-screen h1 {
            font-size: 48px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #start-screen p {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 30px;
        }

        #start-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        #start-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.8);
        }

        .instructions {
            margin-top: 30px;
            text-align: left;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }

        .instructions h4 {
            color: #4fc3f7;
            margin-bottom: 10px;
        }

        .instructions ul {
            list-style: none;
            color: #ccc;
        }

        .instructions li {
            margin: 5px 0;
            padding-left: 20px;
            position: relative;
        }

        .instructions li:before {
            content: "🌟";
            position: absolute;
            left: 0;
        }
    </style>
</head>
<body>
    <!-- 开始屏幕 -->
    <div id="start-screen">
        <h1>🌌 3D 太阳系模拟系统</h1>
        <p>探索我们神奇的太阳系</p>
        <button id="start-button">开始探索</button>
        <div class="instructions">
            <h4>操作说明：</h4>
            <ul>
                <li>鼠标左键拖拽 - 旋转视角</li>
                <li>鼠标滚轮 - 缩放</li>
                <li>鼠标右键拖拽 - 平移</li>
                <li>点击行星 - 查看详细信息</li>
                <li>控制面板 - 调整运行速度</li>
            </ul>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="loading" id="loading" style="display: none;">
        <div class="loading-spinner"></div>
        <p>正在加载太阳系...</p>
    </div>

    <!-- 3D 画布容器 -->
    <div id="canvas-container"></div>

    <!-- 信息面板 -->
    <div id="info-panel">
        <h2>🌌 太阳系</h2>
        <p>包含太阳和八大行星</p>
        <p>当前行星：<span id="current-planet" style="color: #ffd700;">-</span></p>
        <p>运行速度：<span id="speed-display">1x</span></p>
    </div>

    <!-- 行星详细信息 -->
    <div id="planet-info">
        <h3 id="planet-name">行星名称</h3>
        <div class="info-row">
            <span class="info-label">直径：</span>
            <span class="info-value" id="planet-diameter">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">距离太阳：</span>
            <span class="info-value" id="planet-distance">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">公转周期：</span>
            <span class="info-value" id="planet-orbit">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">自转周期：</span>
            <span class="info-value" id="planet-rotation">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">表面温度：</span>
            <span class="info-value" id="planet-temp">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">卫星数量：</span>
            <span class="info-value" id="planet-moons">-</span>
        </div>
    </div>

    <!-- 控制面板 -->
    <div id="control-panel">
        <h3>🎮 控制面板</h3>
        <div class="control-group">
            <label>运行速度：<span id="speed-value">1x</span></label>
            <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
        </div>
        <div class="control-group">
            <button id="pause-btn">⏸️ 暂停</button>
            <button id="reset-btn">🔄 重置</button>
        </div>
        <div class="control-group">
            <button id="orbit-toggle">🔵 显示轨道</button>
            <button id="label-toggle">🏷️ 显示标签</button>
        </div>
    </div>

    <!-- 音频控制 -->
    <div id="audio-control">
        🔊 音效：<span id="audio-status">开启</span>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let sun, planets = [], orbits = [], labels = [];
        let isPaused = false;
        let speed = 1;
        let audioEnabled = true;
        let audioContext, backgroundMusic, hoverSound, clickSound;
        let selectedPlanet = null;
        let showOrbits = true;
        let showLabels = true;

        // 行星数据
        const planetData = [
            {
                name: "水星",
                nameEn: "Mercury",
                color: 0xb5b5b5,
                size: 0.4,
                distance: 10,
                orbitSpeed: 0.04,
                rotationSpeed: 0.005,
                diameter: "4,879 km",
                distanceFromSun: "5,790 万 km",
                orbitPeriod: "88 天",
                rotationPeriod: "59 天",
                temperature: "-173°C ~ 427°C",
                moons: 0
            },
            {
                name: "金星",
                nameEn: "Venus",
                color: 0xffc649,
                size: 0.9,
                distance: 15,
                orbitSpeed: 0.015,
                rotationSpeed: 0.002,
                diameter: "12,104 km",
                distanceFromSun: "1.08 亿 km",
                orbitPeriod: "225 天",
                rotationPeriod: "243 天",
                temperature: "462°C",
                moons: 0
            },
            {
                name: "地球",
                nameEn: "Earth",
                color: 0x6b93d6,
                size: 1,
                distance: 20,
                orbitSpeed: 0.01,
                rotationSpeed: 0.02,
                diameter: "12,742 km",
                distanceFromSun: "1.5 亿 km",
                orbitPeriod: "365 天",
                rotationPeriod: "24 小时",
                temperature: "-88°C ~ 58°C",
                moons: 1
            },
            {
                name: "火星",
                nameEn: "Mars",
                color: 0xc1440e,
                size: 0.5,
                distance: 25,
                orbitSpeed: 0.008,
                rotationSpeed: 0.018,
                diameter: "6,779 km",
                distanceFromSun: "2.28 亿 km",
                orbitPeriod: "687 天",
                rotationPeriod: "24.6 小时",
                temperature: "-87°C ~ -5°C",
                moons: 2
            },
            {
                name: "木星",
                nameEn: "Jupiter",
                color: 0xd8ca9d,
                size: 3.5,
                distance: 35,
                orbitSpeed: 0.002,
                rotationSpeed: 0.04,
                diameter: "139,820 km",
                distanceFromSun: "7.78 亿 km",
                orbitPeriod: "12 年",
                rotationPeriod: "9.9 小时",
                temperature: "-108°C",
                moons: 79
            },
            {
                name: "土星",
                nameEn: "Saturn",
                color: 0xead6b8,
                size: 3,
                distance: 45,
                orbitSpeed: 0.0009,
                rotationSpeed: 0.038,
                diameter: "116,460 km",
                distanceFromSun: "14.3 亿 km",
                orbitPeriod: "29 年",
                rotationPeriod: "10.7 小时",
                temperature: "-139°C",
                moons: 82,
                hasRings: true
            },
            {
                name: "天王星",
                nameEn: "Uranus",
                color: 0xd1e7e7,
                size: 2,
                distance: 55,
                orbitSpeed: 0.0004,
                rotationSpeed: 0.03,
                diameter: "50,724 km",
                distanceFromSun: "28.7 亿 km",
                orbitPeriod: "84 年",
                rotationPeriod: "17.2 小时",
                temperature: "-197°C",
                moons: 27
            },
            {
                name: "海王星",
                nameEn: "Neptune",
                color: 0x5b5ddf,
                size: 1.9,
                distance: 65,
                orbitSpeed: 0.0001,
                rotationSpeed: 0.032,
                diameter: "49,244 km",
                distanceFromSun: "45 亿 km",
                orbitPeriod: "165 年",
                rotationPeriod: "16.1 小时",
                temperature: "-201°C",
                moons: 14
            }
        ];

        // 初始化音频系统
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // 创建背景音乐（太空氛围音）
                createBackgroundMusic();
                
                // 创建交互音效
                createHoverSound();
                createClickSound();
            } catch (e) {
                console.log("Web Audio API 不支持");
                audioEnabled = false;
            }
        }

        // 创建背景音乐
        function createBackgroundMusic() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
            
            // 创建太空氛围音
            const lfo = audioContext.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.setValueAtTime(0.1, audioContext.currentTime);
            
            const lfoGain = audioContext.createGain();
            lfoGain.gain.setValueAtTime(50, audioContext.currentTime);
            
            lfo.connect(lfoGain);
            lfoGain.connect(oscillator.frequency);
            
            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.start();
            lfo.start();
            
            backgroundMusic = { oscillator, gainNode, lfo };
        }

        // 创建悬停音效
        function createHoverSound() {
            hoverSound = () => {
                if (!audioEnabled) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(600, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.1);
            };
        }

        // 创建点击音效
        function createClickSound() {
            clickSound = () => {
                if (!audioEnabled) return;
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.2);
            };
        }

        // 播放音效
        function playSound(type) {
            if (type === 'hover' && hoverSound) hoverSound();
            if (type === 'click' && clickSound) clickSound();
        }

        // 初始化场景
        function initScene() {
            // 创建场景
            scene = new THREE.Scene();
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 60);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // 创建轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 200;
            
            // 创建星空背景
            createStarfield();
            
            // 创建太阳
            createSun();
            
            // 创建行星
            createPlanets();
            
            // 添加光源
            addLights();
            
            // 事件监听
            addEventListeners();
        }

        // 创建星空背景
        function createStarfield() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.5,
                transparent: true,
                opacity: 0.8
            });
            
            const starsVertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                starsVertices.push(x, y, z);
            }
            
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        // 创建太阳
        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(5, 32, 32);
            const sunMaterial = new THREE.MeshBasicMaterial({
                color: 0xffdd00,
                transparent: true,
                opacity: 1
            });
            
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);
            
            // 太阳光晕
            const glowGeometry = new THREE.SphereGeometry(6, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.3
            });
            
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            scene.add(glow);
            
            // 添加太阳标签
            createLabel(sun, "太阳", 0, 7, 0);
        }

        // 创建行星
        function createPlanets() {
            planetData.forEach((data, index) => {
                // 行星几何体
                const geometry = new THREE.SphereGeometry(data.size, 32, 32);
                const material = new THREE.MeshStandardMaterial({
                    color: data.color,
                    roughness: 0.8,
                    metalness: 0.2
                });
                
                const planet = new THREE.Mesh(geometry, material);
                planet.userData = { ...data, index };
                
                // 创建轨道组（用于公转）
                const orbitGroup = new THREE.Group();
                orbitGroup.add(planet);
                planet.position.x = data.distance;
                
                scene.add(orbitGroup);
                planets.push({ mesh: planet, group: orbitGroup, data });
                
                // 创建轨道线
                createOrbit(data.distance);
                
                // 创建标签
                createLabel(planet, data.name, 0, data.size + 1, 0);
                
                // 如果是土星，添加光环
                if (data.hasRings) {
                    createSaturnRings(planet);
                }
                
                // 如果是地球，添加月球
                if (data.name === "地球") {
                    createMoon(planet);
                }
            });
        }

        // 创建轨道线
        function createOrbit(radius) {
            const orbitGeometry = new THREE.RingGeometry(radius - 0.1, radius + 0.1, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0x444444,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
            orbits.push(orbit);
        }

        // 创建土星光环
        function createSaturnRings(planet) {
            const innerRadius = 3.5;
            const outerRadius = 6;
            const segments = 64;
            
            const ringGeometry = new THREE.RingGeometry(innerRadius, outerRadius, segments);
            const ringMaterial = new THREE.MeshStandardMaterial({
                color: 0xc9b896,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.7
            });
            
            const rings = new THREE.Mesh(ringGeometry, ringMaterial);
            rings.rotation.x = Math.PI / 2;
            rings.rotation.y = Math.PI / 8;
            planet.add(rings);
        }

        // 创建月球
        function createMoon(earth) {
            const moonGeometry = new THREE.SphereGeometry(0.27, 16, 16);
            const moonMaterial = new THREE.MeshStandardMaterial({
                color: 0x888888,
                roughness: 0.9
            });
            
            const moon = new THREE.Mesh(moonGeometry, moonMaterial);
            moon.position.x = 2;
            
            const moonGroup = new THREE.Group();
            moonGroup.add(moon);
            earth.add(moonGroup);
            
            // 存储月球用于动画
            earth.userData.moon = { mesh: moon, group: moonGroup, speed: 0.05 };
        }

        // 创建标签
        function createLabel(object, text, x, y, z) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            
            context.fillStyle = 'rgba(0, 0, 0, 0.5)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            context.fillStyle = '#ffffff';
            context.font = 'Bold 24px Arial';
            context.textAlign = 'center';
            context.fillText(text, canvas.width / 2, canvas.height / 2 + 8);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            
            sprite.position.set(x, y, z);
            sprite.scale.set(4, 1, 1);
            
            object.add(sprite);
            labels.push(sprite);
        }

        // 添加光源
        function addLights() {
            // 点光源（太阳）
            const pointLight = new THREE.PointLight(0xffffff, 2, 300);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);
            
            // 环境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
        }

        // 添加事件监听
        function addEventListeners() {
            // 窗口大小变化
            window.addEventListener('resize', onWindowResize);
            
            // 鼠标悬停
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            
            // 鼠标点击
            renderer.domElement.addEventListener('click', onMouseClick);
            
            // 控制面板事件
            document.getElementById('speed-slider').addEventListener('input', onSpeedChange);
            document.getElementById('pause-btn').addEventListener('click', togglePause);
            document.getElementById('reset-btn').addEventListener('click', resetView);
            document.getElementById('orbit-toggle').addEventListener('click', toggleOrbits);
            document.getElementById('label-toggle').addEventListener('click', toggleLabels);
            document.getElementById('audio-control').addEventListener('click', toggleAudio);
            
            // 开始按钮
            document.getElementById('start-button').addEventListener('click', startExperience);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 鼠标移动处理
        function onMouseMove(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const planetMeshes = planets.map(p => p.mesh);
            const intersects = raycaster.intersectObjects([...planetMeshes, sun]);
            
            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
                if (intersects[0].object !== selectedPlanet) {
                    playSound('hover');
                }
            } else {
                document.body.style.cursor = 'default';
            }
        }

        // 鼠标点击处理
        function onMouseClick(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const planetMeshes = planets.map(p => p.mesh);
            const intersects = raycaster.intersectObjects([...planetMeshes, sun]);
            
            if (intersects.length > 0) {
                playSound('click');
                const object = intersects[0].object;
                selectedPlanet = object;
                
                if (object === sun) {
                    showPlanetInfo({
                        name: "太阳",
                        diameter: "1,392,700 km",
                        distanceFromSun: "0 km",
                        orbitPeriod: "-",
                        rotationPeriod: "25 天",
                        temperature: "5,500°C (表面)",
                        moons: 0
                    });
                } else {
                    showPlanetInfo(object.userData);
                }
                
                document.getElementById('current-planet').textContent = object.userData.name || "太阳";
            }
        }

        // 显示行星信息
        function showPlanetInfo(data) {
            const infoPanel = document.getElementById('planet-info');
            infoPanel.style.display = 'block';
            
            document.getElementById('planet-name').textContent = data.name;
            document.getElementById('planet-diameter').textContent = data.diameter;
            document.getElementById('planet-distance').textContent = data.distanceFromSun;
            document.getElementById('planet-orbit').textContent = data.orbitPeriod;
            document.getElementById('planet-rotation').textContent = data.rotationPeriod;
            document.getElementById('planet-temp').textContent = data.temperature;
            document.getElementById('planet-moons').textContent = data.moons;
        }

        // 速度控制
        function onSpeedChange(event) {
            speed = parseFloat(event.target.value);
            document.getElementById('speed-value').textContent = speed.toFixed(1) + 'x';
            document.getElementById('speed-display').textContent = speed.toFixed(1) + 'x';
        }

        // 暂停/继续
        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pause-btn');
            btn.textContent = isPaused ? '▶️ 继续' : '⏸️ 暂停';
            playSound('click');
        }

        // 重置视角
        function resetView() {
            camera.position.set(0, 30, 60);
            controls.target.set(0, 0, 0);
            controls.update();
            playSound('click');
        }

        // 切换轨道显示
        function toggleOrbits() {
            showOrbits = !showOrbits;
            orbits.forEach(orbit => orbit.visible = showOrbits);
            playSound('click');
        }

        // 切换标签显示
        function toggleLabels() {
            showLabels = !showLabels;
            labels.forEach(label => label.visible = showLabels);
            playSound('click');
        }

        // 切换音频
        function toggleAudio() {
            audioEnabled = !audioEnabled;
            const status = document.getElementById('audio-status');
            status.textContent = audioEnabled ? '开启' : '关闭';
            
            if (backgroundMusic) {
                backgroundMusic.gainNode.gain.setValueAtTime(
                    audioEnabled ? 0.05 : 0,
                    audioContext.currentTime
                );
            }
            
            playSound('click');
        }

        // 开始体验
        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            initAudio();
            initScene();
            
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                animate();
            }, 1000);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            if (!isPaused) {
                // 太阳自转
                sun.rotation.y += 0.002 * speed;
                
                // 行星公转和自转
                planets.forEach(planet => {
                    // 公转
                    planet.group.rotation.y += planet.data.orbitSpeed * speed;
                    
                    // 自转
                    planet.mesh.rotation.y += planet.data.rotationSpeed * speed;
                    
                    // 月球公转（如果是地球）
                    if (planet.data.name === "地球" && planet.mesh.userData.moon) {
                        planet.mesh.userData.moon.group.rotation.y += planet.mesh.userData.moon.speed * speed;
                    }
                });
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            // 等待用户点击开始按钮
        });
    </script>
</body>
</html>
