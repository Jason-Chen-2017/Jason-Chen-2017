<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人机协同审核中心 - R&D Automation System</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --glow-blue: rgba(99, 102, 241, 0.5);
            --glow-green: rgba(16, 185, 129, 0.5);
            --glow-red: rgba(239, 68, 68, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 30px var(--glow-blue);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .sidebar {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            height: fit-content;
        }

        .stats-card {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .stats-number {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stats-label {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--glow-blue);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 1.5em;
            color: var(--text-primary);
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-running {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid var(--primary-color);
        }

        .status-paused {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid var(--warning-color);
        }

        .status-awaiting-review {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid var(--warning-color);
        }

        .status-approved {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid var(--success-color);
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid var(--danger-color);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .task-item:hover {
            border-color: var(--primary-color);
            transform: translateX(5px);
        }

        .task-item.selected {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.1);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-name {
            font-weight: 600;
            font-size: 1.1em;
        }

        .task-node {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .task-meta {
            display: flex;
            gap: 20px;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .review-panel {
            display: none;
        }

        .review-panel.active {
            display: block;
        }

        .review-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 15px var(--glow-blue);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 0 15px var(--glow-green);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            box-shadow: 0 0 15px var(--glow-red);
        }

        .btn-warning {
            background: var(--warning-color);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1em;
            font-family: inherit;
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--glow-blue);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
            margin: 20px 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-hover);
            border-radius: 8px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 2px solid var(--bg-card);
        }

        .timeline-item.approved::before {
            background: var(--success-color);
        }

        .timeline-item.rejected::before {
            background: var(--danger-color);
        }

        .timeline-time {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .timeline-content {
            color: var(--text-primary);
        }

        .checkpoint-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .checkpoint-card {
            background: var(--bg-hover);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .checkpoint-node {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .checkpoint-time {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 40px var(--glow-blue);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), #a855f7);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 人机协同审核中心</h1>
            <p class="subtitle">基于 OpenClaw + Claude Code 的端到端研发自动化系统</p>
        </header>

        <div class="dashboard">
            <!-- Sidebar with statistics -->
            <aside class="sidebar">
                <div class="stats-card">
                    <div class="stats-number" id="totalTasks">0</div>
                    <div class="stats-label">总任务数</div>
                </div>
                <div class="stats-card">
                    <div class="stats-number" id="pendingReviews">0</div>
                    <div class="stats-label">待审核</div>
                </div>
                <div class="stats-card">
                    <div class="stats-number" id="runningTasks">0</div>
                    <div class="stats-label">运行中</div>
                </div>
                <div class="stats-card">
                    <div class="stats-number" id="pausedTasks">0</div>
                    <div class="stats-label">已暂停</div>
                </div>

                <div style="margin-top: 30px;">
                    <button class="btn btn-primary" style="width: 100%;" onclick="showCreateTaskModal()">
                        ➕ 创建新任务
                    </button>
                </div>
            </aside>

            <!-- Main content area -->
            <main class="main-content">
                <!-- Task list card -->
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">任务列表</h2>
                        <div style="display: flex; gap: 10px;">
                            <select class="form-input" style="width: auto;" id="statusFilter" onchange="filterTasks()">
                                <option value="">全部状态</option>
                                <option value="running">运行中</option>
                                <option value="paused">已暂停</option>
                                <option value="awaiting_review">待审核</option>
                                <option value="completed">已完成</option>
                            </select>
                        </div>
                    </div>
                    <div class="task-list" id="taskList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>暂无任务，点击"创建新任务"开始</p>
                        </div>
                    </div>
                </div>

                <!-- Review panel -->
                <div class="card review-panel" id="reviewPanel">
                    <div class="card-header">
                        <h2 class="card-title">任务详情与审核</h2>
                        <span class="status-badge" id="detailStatus">-</span>
                    </div>
                    
                    <div id="taskDetail">
                        <div class="form-group">
                            <label class="form-label">任务名称</label>
                            <div class="form-input" id="detailName">-</div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">当前节点</label>
                            <div class="form-input" id="detailNode">-</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">任务描述</label>
                            <div class="form-textarea" id="detailDescription" readonly>-</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">进度</label>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                            </div>
                        </div>

                        <!-- Review actions -->
                        <div class="review-actions" id="reviewActions">
                            <button class="btn btn-success" onclick="submitReview('approve')">
                                ✓ 审核通过
                            </button>
                            <button class="btn btn-danger" onclick="submitReview('reject')">
                                ✗ 拒绝
                            </button>
                            <button class="btn btn-warning" onclick="submitReview('request_changes')">
                                ↺ 要求修改
                            </button>
                        </div>

                        <div class="form-group" style="margin-top: 20px;">
                            <label class="form-label">审核意见</label>
                            <textarea class="form-textarea" id="reviewComments" placeholder="请输入审核意见..."></textarea>
                        </div>

                        <!-- Restart actions -->
                        <div class="review-actions" id="restartActions" style="display: none;">
                            <button class="btn btn-primary" onclick="showRestartModal()">
                                🔄 重启流程
                            </button>
                            <button class="btn btn-secondary" onclick="resumeTask()">
                                ▶️ 继续执行
                            </button>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <div style="margin-top: 30px;">
                        <h3 style="margin-bottom: 15px;">审核历史</h3>
                        <div class="timeline" id="reviewTimeline">
                            <!-- Timeline items will be inserted here -->
                        </div>
                    </div>

                    <!-- Checkpoints -->
                    <div style="margin-top: 30px;">
                        <h3 style="margin-bottom: 15px;">检查点</h3>
                        <div class="checkpoint-list" id="checkpointList">
                            <!-- Checkpoint cards will be inserted here -->
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal" id="createTaskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">创建新任务</h3>
            </div>
            <div class="form-group">
                <label class="form-label">任务名称</label>
                <input type="text" class="form-input" id="newTaskName" placeholder="输入任务名称">
            </div>
            <div class="form-group">
                <label class="form-label">任务描述</label>
                <textarea class="form-textarea" id="newTaskDescription" placeholder="输入任务描述"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">起始节点</label>
                <select class="form-input" id="newTaskNode">
                    <option value="requirement_analysis">需求分析</option>
                    <option value="prd_design">PRD 设计</option>
                    <option value="backend_tech_design">后端技术方案</option>
                    <option value="frontend_tech_design">前端技术方案</option>
                    <option value="api_protocol_design">API 接口协议设计</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeCreateTaskModal()">取消</button>
                <button class="btn btn-primary" onclick="createTask()">创建</button>
            </div>
        </div>
    </div>

    <!-- Restart Modal -->
    <div class="modal" id="restartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">重启任务流程</h3>
            </div>
            <div class="form-group">
                <label class="form-label">重启方式</label>
                <select class="form-input" id="restartType" onchange="toggleRestartOptions()">
                    <option value="checkpoint">从检查点恢复</option>
                    <option value="node">从指定节点开始</option>
                </select>
            </div>
            <div class="form-group" id="checkpointOption">
                <label class="form-label">选择检查点</label>
                <select class="form-input" id="restartCheckpoint">
                    <!-- Options will be populated dynamically -->
                </select>
            </div>
            <div class="form-group" id="nodeOption" style="display: none;">
                <label class="form-label">选择节点</label>
                <select class="form-input" id="restartNode">
                    <option value="requirement_analysis">需求分析</option>
                    <option value="prd_design">PRD 设计</option>
                    <option value="backend_tech_design">后端技术方案</option>
                    <option value="frontend_tech_design">前端技术方案</option>
                    <option value="api_protocol_design">API 接口协议设计</option>
                    <option value="ai_coding_backend">AI 后端开发</option>
                    <option value="ai_coding_frontend">AI 前端开发</option>
                    <option value="unit_test">单元测试</option>
                    <option value="integration_test">集成测试</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeRestartModal()">取消</button>
                <button class="btn btn-primary" onclick="restartTask()">重启</button>
            </div>
        </div>
    </div>

    <script>
        // API Base URL (change to your server URL)
        const API_BASE = 'http://localhost:5000/api';
        
        // State
        let tasks = [];
        let selectedTaskId = null;
        let currentReviewerId = 'reviewer_001'; // In production, get from auth

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            setInterval(loadTasks, 30000); // Refresh every 30 seconds
        });

        // Load tasks from API
        async function loadTasks() {
            try {
                const response = await fetch(`${API_BASE}/tasks`);
                const data = await response.json();
                
                if (data.success) {
                    tasks = data.tasks;
                    renderTaskList();
                    updateStatistics();
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
                // For demo, use mock data if API is not available
                loadMockData();
            }
        }

        // Mock data for demonstration
        function loadMockData() {
            tasks = [
                {
                    task_id: 'demo-001',
                    name: '电商平台用户中心开发',
                    description: '开发完整的用户中心模块，包括注册、登录、个人中心等功能',
                    current_node: 'prd_design',
                    status: 'awaiting_review',
                    created_at: new Date().toISOString(),
                    checkpoints: [
                        { node: 'requirement_analysis', timestamp: new Date().toISOString() }
                    ],
                    review_history: []
                },
                {
                    task_id: 'demo-002',
                    name: '支付网关集成',
                    description: '集成支付宝和微信支付网关',
                    current_node: 'ai_coding_backend',
                    status: 'running',
                    created_at: new Date().toISOString(),
                    checkpoints: [],
                    review_history: []
                }
            ];
            renderTaskList();
            updateStatistics();
        }

        // Render task list
        function renderTaskList() {
            const taskList = document.getElementById('taskList');
            const filter = document.getElementById('statusFilter').value;
            
            const filteredTasks = filter 
                ? tasks.filter(t => t.status === filter)
                : tasks;
            
            if (filteredTasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>暂无任务</p>
                    </div>
                `;
                return;
            }
            
            taskList.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${selectedTaskId === task.task_id ? 'selected' : ''}" 
                     onclick="selectTask('${task.task_id}')">
                    <div class="task-header">
                        <div class="task-name">${escapeHtml(task.name)}</div>
                        <span class="status-badge status-${task.status}">${translateStatus(task.status)}</span>
                    </div>
                    <div class="task-node">📍 ${translateNode(task.current_node)}</div>
                    <div class="task-meta">
                        <span>🕐 ${formatDate(task.created_at)}</span>
                        <span>ID: ${task.task_id.substring(0, 8)}...</span>
                    </div>
                </div>
            `).join('');
        }

        // Select task
        async function selectTask(taskId) {
            selectedTaskId = taskId;
            renderTaskList();
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${taskId}`);
                const data = await response.json();
                
                if (data.success) {
                    showTaskDetail(data.task);
                }
            } catch (error) {
                console.error('Error loading task detail:', error);
                // Find from local tasks
                const task = tasks.find(t => t.task_id === taskId);
                if (task) {
                    showTaskDetail(task);
                }
            }
        }

        // Show task detail
        function showTaskDetail(task) {
            document.getElementById('reviewPanel').classList.add('active');
            
            document.getElementById('detailStatus').textContent = translateStatus(task.status);
            document.getElementById('detailStatus').className = `status-badge status-${task.status}`;
            
            document.getElementById('detailName').textContent = task.name;
            document.getElementById('detailNode').textContent = translateNode(task.current_node);
            document.getElementById('detailDescription').textContent = task.description || '-';
            
            // Update progress (mock calculation)
            const nodes = Object.keys(nodeMap);
            const currentIndex = nodes.indexOf(task.current_node);
            const progress = ((currentIndex + 1) / nodes.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            
            // Show/hide action buttons based on status
            const reviewActions = document.getElementById('reviewActions');
            const restartActions = document.getElementById('restartActions');
            
            if (task.status === 'awaiting_review') {
                reviewActions.style.display = 'flex';
                restartActions.style.display = 'none';
            } else if (['paused', 'review_rejected', 'failed'].includes(task.status)) {
                reviewActions.style.display = 'none';
                restartActions.style.display = 'flex';
            } else {
                reviewActions.style.display = 'none';
                restartActions.style.display = 'none';
            }
            
            // Render timeline
            renderTimeline(task.review_history || []);
            
            // Render checkpoints
            renderCheckpoints(task.checkpoints || []);
        }

        // Render review timeline
        function renderTimeline(history) {
            const timeline = document.getElementById('reviewTimeline');
            
            if (history.length === 0) {
                timeline.innerHTML = '<p style="color: var(--text-secondary);">暂无审核记录</p>';
                return;
            }
            
            timeline.innerHTML = history.map(item => `
                <div class="timeline-item ${item.decision}">
                    <div class="timeline-time">${formatDate(item.timestamp)}</div>
                    <div class="timeline-content">
                        <strong>${item.decision === 'approve' ? '✓ 审核通过' : item.decision === 'reject' ? '✗ 拒绝' : '↺ 要求修改'}</strong>
                        <br>
                        审核人：${item.reviewer_id}
                        ${item.comments ? `<br><br>意见：${escapeHtml(item.comments)}` : ''}
                    </div>
                </div>
            `).join('');
        }

        // Render checkpoints
        function renderCheckpoints(checkpoints) {
            const checkpointList = document.getElementById('checkpointList');
            
            if (checkpoints.length === 0) {
                checkpointList.innerHTML = '<p style="color: var(--text-secondary);">暂无检查点</p>';
                return;
            }
            
            checkpointList.innerHTML = checkpoints.map((cp, index) => `
                <div class="checkpoint-card">
                    <div class="checkpoint-node">📍 ${translateNode(cp.node)}</div>
                    <div class="checkpoint-time">🕐 ${formatDate(cp.timestamp)}</div>
                    <div style="margin-top: 8px; font-size: 0.85em; color: var(--text-secondary);">
                        状态：${translateStatus(cp.status)}
                    </div>
                </div>
            `).join('');
        }

        // Submit review
        async function submitReview(decision) {
            const comments = document.getElementById('reviewComments').value;
            
            if (!selectedTaskId) {
                alert('请先选择任务');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${selectedTaskId}/review/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        reviewer_id: currentReviewerId,
                        decision: decision,
                        comments: comments
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`审核${decision === 'approve' ? '通过' : decision === 'reject' ? '拒绝' : '已要求修改'}成功！`);
                    document.getElementById('reviewComments').value = '';
                    loadTasks();
                    selectTask(selectedTaskId);
                } else {
                    alert('提交失败：' + data.error);
                }
            } catch (error) {
                console.error('Error submitting review:', error);
                alert('提交失败，请重试');
            }
        }

        // Resume task
        async function resumeTask() {
            if (!selectedTaskId) return;
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${selectedTaskId}/resume`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('任务已恢复执行');
                    loadTasks();
                    selectTask(selectedTaskId);
                } else {
                    alert('恢复失败：' + data.error);
                }
            } catch (error) {
                console.error('Error resuming task:', error);
                alert('恢复失败，请重试');
            }
        }

        // Show restart modal
        function showRestartModal() {
            const task = tasks.find(t => t.task_id === selectedTaskId);
            if (!task) return;
            
            const checkpointSelect = document.getElementById('restartCheckpoint');
            checkpointSelect.innerHTML = task.checkpoints.map((cp, index) => `
                <option value="${index}">${translateNode(cp.node)} - ${formatDate(cp.timestamp)}</option>
            `).join('');
            
            document.getElementById('restartModal').classList.add('active');
        }

        // Close restart modal
        function closeRestartModal() {
            document.getElementById('restartModal').classList.remove('active');
        }

        // Toggle restart options
        function toggleRestartOptions() {
            const type = document.getElementById('restartType').value;
            document.getElementById('checkpointOption').style.display = type === 'checkpoint' ? 'block' : 'none';
            document.getElementById('nodeOption').style.display = type === 'node' ? 'block' : 'none';
        }

        // Restart task
        async function restartTask() {
            const type = document.getElementById('restartType').value;
            
            const payload = {};
            if (type === 'checkpoint') {
                payload.from_checkpoint = parseInt(document.getElementById('restartCheckpoint').value);
            } else {
                payload.target_node = document.getElementById('restartNode').value;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tasks/${selectedTaskId}/restart`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('任务已重启');
                    closeRestartModal();
                    loadTasks();
                    selectTask(selectedTaskId);
                } else {
                    alert('重启失败：' + data.error);
                }
            } catch (error) {
                console.error('Error restarting task:', error);
                alert('重启失败，请重试');
            }
        }

        // Show create task modal
        function showCreateTaskModal() {
            document.getElementById('createTaskModal').classList.add('active');
        }

        // Close create task modal
        function closeCreateTaskModal() {
            document.getElementById('createTaskModal').classList.remove('active');
        }

        // Create task
        async function createTask() {
            const name = document.getElementById('newTaskName').value;
            const description = document.getElementById('newTaskDescription').value;
            const startNode = document.getElementById('newTaskNode').value;
            
            if (!name) {
                alert('请输入任务名称');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        description: description,
                        start_node: startNode
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('任务创建成功');
                    closeCreateTaskModal();
                    document.getElementById('newTaskName').value = '';
                    document.getElementById('newTaskDescription').value = '';
                    loadTasks();
                } else {
                    alert('创建失败：' + data.error);
                }
            } catch (error) {
                console.error('Error creating task:', error);
                alert('创建失败，请重试');
            }
        }

        // Update statistics
        function updateStatistics() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('pendingReviews').textContent = 
                tasks.filter(t => t.status === 'awaiting_review').length;
            document.getElementById('runningTasks').textContent = 
                tasks.filter(t => t.status === 'running').length;
            document.getElementById('pausedTasks').textContent = 
                tasks.filter(t => t.status === 'paused').length;
        }

        // Filter tasks
        function filterTasks() {
            renderTaskList();
        }

        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        function translateStatus(status) {
            const map = {
                'pending': '待执行',
                'running': '运行中',
                'paused': '已暂停',
                'awaiting_review': '待审核',
                'review_approved': '审核通过',
                'review_rejected': '审核拒绝',
                'restarting': '重启中',
                'completed': '已完成',
                'failed': '失败',
                'cancelled': '已取消'
            };
            return map[status] || status;
        }

        const nodeMap = {
            'requirement_analysis': '需求分析',
            'prd_design': 'PRD 设计',
            'backend_tech_design': '后端技术方案',
            'frontend_tech_design': '前端技术方案',
            'api_protocol_design': 'API 接口协议设计',
            'ai_coding_backend': 'AI 后端开发',
            'ai_coding_frontend': 'AI 前端开发',
            'unit_test': '单元测试',
            'integration_test': '集成测试',
            'ci_jenkins': 'CI/Jenkins',
            'docker_k8s_deploy': 'Docker+K8S 部署',
            'ui_automation_test': 'UI 自动化测试',
            'acceptance': '验收'
        };

        function translateNode(node) {
            return nodeMap[node] || node;
        }
    </script>
</body>
</html>
