<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹俄罗斯方块</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f7ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bf00ff;
            --neon-green: #00ff88;
            --neon-yellow: #ffff00;
            --neon-orange: #ff8800;
            --neon-blue: #0088ff;
            --bg-dark: #0a0a15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(191, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 247, 255, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a15 0%, #050510 100%);
            z-index: -2;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 247, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 247, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 247, 255, 0.5);
            letter-spacing: 4px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-wrapper {
            position: relative;
            padding: 3px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            border-radius: 8px;
            box-shadow: 
                0 0 30px rgba(0, 247, 255, 0.3),
                0 0 60px rgba(255, 0, 255, 0.2);
        }

        canvas {
            display: block;
            background: rgba(10, 10, 21, 0.95);
            border-radius: 5px;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 150px;
        }

        .score-box, .level-box, .lines-box {
            background: rgba(10, 10, 21, 0.9);
            border: 1px solid rgba(0, 247, 255, 0.3);
            padding: 15px 20px;
            border-radius: 8px;
        }

        .score-box h3, .level-box h3, .lines-box h3 {
            color: var(--neon-cyan);
            font-size: 12px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .score-box .value, .level-box .value, .lines-box .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 11px;
            line-height: 1.8;
        }

        .controls kbd {
            background: rgba(0, 247, 255, 0.2);
            border: 1px solid var(--neon-cyan);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--neon-cyan);
        }

        .btn {
            margin-top: 15px;
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        .btn:hover {
            background: rgba(0, 247, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.4);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 21, 0.95);
            padding: 30px 50px;
            border: 2px solid var(--neon-pink);
            text-align: center;
            display: none;
            z-index: 10;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            border-radius: 8px;
        }

        .game-over h2 {
            color: var(--neon-pink);
            font-size: 28px;
            margin-bottom: 15px;
        }

        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            background: rgba(10, 10, 21, 0.8);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            border-radius: 4px;
        }

        .sound-toggle:hover {
            background: rgba(0, 247, 255, 0.2);
        }

        @media (max-width: 600px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }
            h1 { font-size: 28px; }
            canvas { width: 250px; height: 400px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="grid-bg"></div>

    <h1>TETRIS</h1>

    <div class="game-container">
        <div class="game-wrapper">
            <canvas id="game" width="300" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>GAME OVER</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button class="btn" onclick="restart()">RESTART</button>
            </div>
        </div>

        <div class="info-panel">
            <div class="score-box">
                <h3>SCORE</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="level-box">
                <h3>LEVEL</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="lines-box">
                <h3>LINES</h3>
                <div class="value" id="lines">0</div>
            </div>

            <div class="controls">
                <kbd>←</kbd> <kbd>→</kbd> Move<br>
                <kbd>↓</kbd> Soft Drop<br>
                <kbd>↑</kbd> Rotate<br>
                <kbd>Space</kbd> Hard Drop
            </div>

            <button class="btn" onclick="restart()">NEW GAME</button>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle">🔊 Sound ON</button>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        
        const COLORS = [
            null,
            '#00f7ff',  // I - cyan
            '#ff00ff',  // O - magenta
            '#bf00ff',  // T - purple
            '#00ff88',  // S - green
            '#ffff00',  // Z - yellow
            '#ff8800',  // L - orange
            '#0088ff',  // J - blue
        ];
        
        const SHAPES = [
            [],
            [[1,1,1,1]],  // I
            [[2,2],[2,2]],  // O
            [[0,3,0],[3,3,3]],  // T
            [[0,4,4],[4,4,0]],  // S
            [[5,5,0],[0,5,5]],  // Z
            [[0,0,6],[6,6,6]],  // L
            [[7,0,0],[7,7,7]],  // J
        ];
        
        let board = [];
        let currentPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let soundEnabled = true;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        
        // Audio Context
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }
        
        function playSound(type) {
            if (!soundEnabled || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'move') {
                osc.frequency.value = 220;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'rotate') {
                osc.frequency.value = 330;
                osc.type = 'triangle';
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'drop') {
                osc.frequency.value = 150;
                osc.type = 'square';
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'clear') {
                osc.frequency.value = 440;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'gameover') {
                osc.frequency.value = 200;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }
        
        function resetBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board.push(new Array(COLS).fill(0));
            }
        }
        
        function spawnPiece() {
            const type = Math.floor(Math.random() * 7) + 1;
            currentPiece = {
                shape: SHAPES[type],
                color: type,
                x: Math.floor(COLS / 2) - 1,
                y: 0
            };
            
            if (collide(board, currentPiece)) {
                gameOver = true;
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').innerText = score;
                playSound('gameover');
            }
        }
        
        function collide(arena, player) {
            const m = player.shape;
            const o = player.x;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                        (arena[y + player.y] &&
                        arena[y + player.y][x + o]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        function merge(arena, player) {
            player.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.y][x + player.x] = player.color;
                    }
                });
            });
        }
        
        function rotate(matrix) {
            const N = matrix.length;
            const result = matrix.map((row, i) =>
                row.map((val, j) => matrix[N - 1 - j][i])
            );
            return result;
        }
        
        function playerRotate() {
            const pos = currentPiece.x;
            let offset = 1;
            const prev = currentPiece.shape;
            currentPiece.shape = rotate(currentPiece.shape);
            
            while (collide(board, currentPiece)) {
                currentPiece.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > currentPiece.shape[0].length) {
                    currentPiece.shape = prev;
                    currentPiece.x = pos;
                    return;
                }
            }
            playSound('rotate');
        }
        
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y > 0; --y) {
                for (let x = 0; x < board[y].length; x++) {
                    if (board[y][x] === 0) {
                        continue outer;
                    }
                }
                
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;
                
                score += rowCount * 10;
                lines++;
                rowCount *= 2;
                
                if (lines % 10 === 0) {
                    level++;
                    dropInterval = Math.max(100, 1000 - (level * 50));
                }
                
                playSound('clear');
            }
        }
        
        function playerDrop() {
            currentPiece.y++;
            if (collide(board, currentPiece)) {
                currentPiece.y--;
                merge(board, currentPiece);
                spawnPiece();
                arenaSweep();
                updateScore();
                playSound('drop');
            }
            dropCounter = 0;
        }
        
        function playerMove(dir) {
            currentPiece.x += dir;
            if (collide(board, currentPiece)) {
                currentPiece.x -= dir;
            } else {
                playSound('move');
            }
        }
        
        function updateScore() {
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
            document.getElementById('lines').innerText = lines;
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 21, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            board.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = COLORS[value];
                        ctx.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                        
                        // Glow effect
                        ctx.shadowColor = COLORS[value];
                        ctx.shadowBlur = 10;
                        ctx.fillRect(x * BLOCK_SIZE + 2, y * BLOCK_SIZE + 2, BLOCK_SIZE - 6, BLOCK_SIZE - 6);
                        ctx.shadowBlur = 0;
                    }
                });
            });
            
            if (currentPiece) {
                currentPiece.shape.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            ctx.fillStyle = COLORS[currentPiece.color];
                            ctx.shadowColor = COLORS[currentPiece.color];
                            ctx.shadowBlur = 15;
                            ctx.fillRect((x + currentPiece.x) * BLOCK_SIZE, (y + currentPiece.y) * BLOCK_SIZE, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                            ctx.shadowBlur = 0;
                        }
                    });
                });
            }
        }
        
        function update(time = 0) {
            if (gameOver) return;
            
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            
            draw();
            requestAnimationFrame(update);
        }
        
        function restart() {
            resetBoard();
            score = 0;
            level = 1;
            lines = 0;
            dropInterval = 1000;
            gameOver = false;
            document.getElementById('gameOver').style.display = 'none';
            updateScore();
            spawnPiece();
            update();
        }
        
        document.addEventListener('keydown', event => {
            initAudio();
            
            if (event.keyCode === 37) {
                playerMove(-1);
            } else if (event.keyCode === 39) {
                playerMove(1);
            } else if (event.keyCode === 40) {
                playerDrop();
            } else if (event.keyCode === 38) {
                playerRotate();
            } else if (event.keyCode === 32) {
                // Hard drop
                while (!collide(board, currentPiece)) {
                    currentPiece.y++;
                }
                currentPiece.y--;
                playerDrop();
            }
        });
        
        // Sound toggle
        document.getElementById('soundToggle').addEventListener('click', function() {
            soundEnabled = !soundEnabled;
            this.innerText = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
            initAudio();
        });
        
        // Start
        resetBoard();
        spawnPiece();
        update();
    </script>
</body>
</html>
