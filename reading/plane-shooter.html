<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>经典打飞机 - 微信小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 100%);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
        }

        /* 游戏画布 */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI 层 */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 顶部信息栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
        }

        .score-display {
            color: #00ff88;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .level-display {
            color: #00ccff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
        }

        .lives-display {
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
        }

        /* 开始界面 */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        .game-title {
            font-size: 42px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8), 0 0 40px rgba(0, 255, 136, 0.4);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-btn {
            padding: 18px 60px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .instructions {
            color: #aaa;
            font-size: 14px;
            text-align: center;
            line-height: 2;
            padding: 0 30px;
        }

        .instructions span {
            color: #00ccff;
            font-weight: bold;
        }

        /* 游戏结束界面 */
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 28px;
            color: #00ff88;
            margin-bottom: 10px;
        }

        .high-score {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00ccff 0%, #0099cc 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 204, 255, 0.4);
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 204, 255, 0.6);
        }

        /* 暂停按钮 */
        .pause-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
            pointer-events: auto;
        }

        .pause-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 道具提示 */
        .powerup-notify {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .powerup-notify.show {
            opacity: 1;
            animation: floatUp 1s ease-out;
        }

        @keyframes floatUp {
            0% { transform: translate(-50%, -50%); opacity: 1; }
            100% { transform: translate(-50%, -150%); opacity: 0; }
        }

        /* 星星背景 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 星星背景 -->
        <div class="stars" id="stars"></div>
        
        <!-- 游戏画布 -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI 层 -->
        <div class="ui-layer">
            <div class="top-bar">
                <div class="score-display">得分：<span id="score">0</span></div>
                <div class="level-display">等级：<span id="level">1</span></div>
                <div class="lives-display">生命：<span id="lives">❤️❤️❤️</span></div>
            </div>
            
            <button class="pause-btn" id="pauseBtn">⏸️</button>
            
            <div class="powerup-notify" id="powerupNotify"></div>
        </div>
        
        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen">
            <div class="game-title">🛩️ 打飞机</div>
            <button class="start-btn" id="startBtn">开始游戏</button>
            <div class="instructions">
                <span>🖱️ 鼠标</span> 或 <span>👆 触摸</span> 控制飞机移动<br>
                <span>自动射击</span> 消灭敌机<br>
                <span>🎁 道具</span> 增强火力<br>
                <span>⚠️ 躲避</span> 敌机和子弹
            </div>
        </div>
        
        <!-- 游戏结束界面 -->
        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-title">💥 游戏结束</div>
            <div class="final-score">最终得分：<span id="finalScore">0</span></div>
            <div class="high-score">最高记录：<span id="highScore">0</span></div>
            <button class="restart-btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        // ==================== 音效系统 ====================
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            playShoot() {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(200, this.audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.1);
            }

            playExplosion() {
                if (!this.enabled || !this.audioContext) return;
                
                const bufferSize = this.audioContext.sampleRate * 0.3;
                const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = this.audioContext.createBufferSource();
                noise.buffer = buffer;
                
                const gainNode = this.audioContext.createGain();
                const filter = this.audioContext.createBiquadFilter();
                
                filter.type = 'lowpass';
                filter.frequency.value = 1000;
                
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                gainNode.gain.setValueAtTime(0.5, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);
                
                noise.start(this.audioContext.currentTime);
            }

            playPowerup() {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                oscillator.frequency.linearRampToValueAtTime(800, this.audioContext.currentTime + 0.1);
                oscillator.frequency.linearRampToValueAtTime(1200, this.audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, this.audioContext.currentTime + 0.3);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.3);
            }

            playHit() {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.setValueAtTime(200, this.audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 0.2);
                
                gainNode.gain.setValueAtTime(0.4, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.2);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.2);
            }

            playGameOver() {
                if (!this.enabled || !this.audioContext) return;
                
                const notes = [400, 350, 300, 250, 200];
                notes.forEach((freq, i) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.value = freq;
                    gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime + i * 0.15);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + i * 0.15 + 0.3);
                    
                    oscillator.start(this.audioContext.currentTime + i * 0.15);
                    oscillator.stop(this.audioContext.currentTime + i * 0.15 + 0.3);
                });
            }

            playStart() {
                if (!this.enabled || !this.audioContext) return;
                
                const notes = [523, 659, 784, 1047];
                notes.forEach((freq, i) => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.type = 'sine';
                    oscillator.frequency.value = freq;
                    gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime + i * 0.1);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + i * 0.1 + 0.2);
                    
                    oscillator.start(this.audioContext.currentTime + i * 0.1);
                    oscillator.stop(this.audioContext.currentTime + i * 0.1 + 0.2);
                });
            }
        }

        // ==================== 游戏类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.soundManager = new SoundManager();
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.player = null;
                this.bullets = [];
                this.enemies = [];
                this.particles = [];
                this.powerups = [];
                this.enemyBullets = [];
                
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.gameRunning = false;
                this.gamePaused = false;
                this.highScore = localStorage.getItem('planeHighScore') || 0;
                
                this.lastShot = 0;
                this.shootInterval = 200;
                this.lastEnemySpawn = 0;
                this.enemySpawnInterval = 1500;
                
                this.setupControls();
                this.createStars();
                this.updateUI();
            }

            resize() {
                const container = this.canvas.parentElement;
                this.canvas.width = container.clientWidth;
                this.canvas.height = container.clientHeight;
            }

            createStars() {
                const starsContainer = document.getElementById('stars');
                starsContainer.innerHTML = '';
                
                for (let i = 0; i < 50; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.width = Math.random() * 3 + 1 + 'px';
                    star.style.height = star.style.width;
                    star.style.animationDelay = Math.random() * 2 + 's';
                    starsContainer.appendChild(star);
                }
            }

            setupControls() {
                // 鼠标控制
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.gameRunning && !this.gamePaused && this.player) {
                        const rect = this.canvas.getBoundingClientRect();
                        this.player.x = e.clientX - rect.left;
                        this.player.y = e.clientY - rect.top;
                    }
                });

                // 触摸控制
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (this.gameRunning && !this.gamePaused && this.player) {
                        const rect = this.canvas.getBoundingClientRect();
                        const touch = e.touches[0];
                        this.player.x = touch.clientX - rect.left;
                        this.player.y = touch.clientY - rect.top;
                    }
                }, { passive: false });

                // 开始按钮
                document.getElementById('startBtn').addEventListener('click', () => {
                    this.soundManager.init();
                    this.soundManager.playStart();
                    this.startGame();
                });

                // 重新开始按钮
                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.soundManager.playStart();
                    this.startGame();
                });

                // 暂停按钮
                document.getElementById('pauseBtn').addEventListener('click', () => {
                    this.togglePause();
                });
            }

            startGame() {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'flex';
                
                this.player = {
                    x: this.canvas.width / 2,
                    y: this.canvas.height - 100,
                    width: 50,
                    height: 60,
                    speed: 8,
                    powerLevel: 1,
                    invincible: false,
                    invincibleTime: 0
                };
                
                this.bullets = [];
                this.enemies = [];
                this.particles = [];
                this.powerups = [];
                this.enemyBullets = [];
                
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.gameRunning = true;
                this.gamePaused = false;
                this.shootInterval = 200;
                this.enemySpawnInterval = 1500;
                
                this.updateUI();
                this.gameLoop();
            }

            togglePause() {
                if (!this.gameRunning) return;
                
                this.gamePaused = !this.gamePaused;
                document.getElementById('pauseBtn').textContent = this.gamePaused ? '▶️' : '⏸️';
                
                if (!this.gamePaused) {
                    this.gameLoop();
                }
            }

            gameOver() {
                this.gameRunning = false;
                this.soundManager.playGameOver();
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('planeHighScore', this.highScore);
                }
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('highScore').textContent = this.highScore;
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('pauseBtn').style.display = 'none';
            }

            spawnEnemy() {
                const types = [
                    { width: 40, height: 40, health: 1, speed: 3, score: 10, color: '#ff6b6b' },
                    { width: 50, height: 50, health: 3, speed: 2, score: 30, color: '#ffd700' },
                    { width: 60, height: 60, health: 5, speed: 1.5, score: 50, color: '#ff6b6b' }
                ];
                
                const type = types[Math.min(Math.floor(this.level / 3), types.length - 1)];
                
                this.enemies.push({
                    x: Math.random() * (this.canvas.width - type.width),
                    y: -type.height,
                    width: type.width,
                    height: type.height,
                    health: type.health,
                    speed: type.speed + this.level * 0.2,
                    score: type.score,
                    color: type.color,
                    shootChance: 0.001 * this.level
                });
            }

            spawnPowerup(x, y) {
                if (Math.random() > 0.1) return;
                
                const types = ['spread', 'speed', 'life'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                this.powerups.push({
                    x: x,
                    y: y,
                    width: 30,
                    height: 30,
                    type: type,
                    speed: 2
                });
            }

            createExplosion(x, y, color, count = 15) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1,
                        color: color,
                        size: Math.random() * 4 + 2
                    });
                }
            }

            shoot() {
                const now = Date.now();
                if (now - this.lastShot < this.shootInterval) return;
                
                this.lastShot = now;
                this.soundManager.playShoot();
                
                if (this.player.powerLevel === 1) {
                    this.bullets.push({
                        x: this.player.x,
                        y: this.player.y - 20,
                        width: 6,
                        height: 15,
                        speed: 12,
                        color: '#00ff88'
                    });
                } else if (this.player.powerLevel >= 2) {
                    this.bullets.push({
                        x: this.player.x - 15,
                        y: this.player.y - 10,
                        width: 6,
                        height: 15,
                        speed: 12,
                        color: '#00ff88'
                    });
                    this.bullets.push({
                        x: this.player.x + 15,
                        y: this.player.y - 10,
                        width: 6,
                        height: 15,
                        speed: 12,
                        color: '#00ff88'
                    });
                }
                
                if (this.player.powerLevel >= 3) {
                    this.bullets.push({
                        x: this.player.x - 25,
                        y: this.player.y,
                        width: 5,
                        height: 12,
                        speed: 10,
                        color: '#00ccff',
                        vx: -2
                    });
                    this.bullets.push({
                        x: this.player.x + 25,
                        y: this.player.y,
                        width: 5,
                        height: 12,
                        speed: 10,
                        color: '#00ccff',
                        vx: 2
                    });
                }
            }

            update() {
                if (this.gamePaused) return;
                
                // 玩家无敌时间
                if (this.player.invincible) {
                    this.player.invincibleTime--;
                    if (this.player.invincibleTime <= 0) {
                        this.player.invincible = false;
                    }
                }
                
                // 射击
                this.shoot();
                
                // 生成敌机
                const now = Date.now();
                if (now - this.lastEnemySpawn > this.enemySpawnInterval) {
                    this.lastEnemySpawn = now;
                    this.spawnEnemy();
                }
                
                // 更新子弹
                this.bullets = this.bullets.filter(bullet => {
                    bullet.y -= bullet.speed;
                    if (bullet.vx) bullet.x += bullet.vx;
                    return bullet.y > -20 && bullet.x > 0 && bullet.x < this.canvas.width;
                });
                
                // 更新敌机
                this.enemies = this.enemies.filter(enemy => {
                    enemy.y += enemy.speed;
                    
                    // 敌机射击
                    if (Math.random() < enemy.shootChance) {
                        this.enemyBullets.push({
                            x: enemy.x + enemy.width / 2,
                            y: enemy.y + enemy.height,
                            width: 8,
                            height: 15,
                            speed: 5,
                            color: '#ff4444'
                        });
                    }
                    
                    return enemy.y < this.canvas.height + 50;
                });
                
                // 更新敌机子弹
                this.enemyBullets = this.enemyBullets.filter(bullet => {
                    bullet.y += bullet.speed;
                    return bullet.y < this.canvas.height + 20;
                });
                
                // 更新道具
                this.powerups = this.powerups.filter(powerup => {
                    powerup.y += powerup.speed;
                    return powerup.y < this.canvas.height + 30;
                });
                
                // 更新粒子
                this.particles = this.particles.filter(particle => {
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.life -= 0.02;
                    particle.vy += 0.2;
                    return particle.life > 0;
                });
                
                // 碰撞检测 - 子弹击中敌机
                this.bullets.forEach((bullet, bi) => {
                    this.enemies.forEach((enemy, ei) => {
                        if (this.checkCollision(bullet, enemy)) {
                            this.bullets.splice(bi, 1);
                            enemy.health--;
                            
                            if (enemy.health <= 0) {
                                this.score += enemy.score;
                                this.createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color);
                                this.soundManager.playExplosion();
                                this.spawnPowerup(enemy.x + enemy.width/2, enemy.y + enemy.height/2);
                                this.enemies.splice(ei, 1);
                                
                                // 升级
                                if (this.score >= this.level * 500) {
                                    this.level++;
                                    this.shootInterval = Math.max(100, this.shootInterval - 20);
                                    this.enemySpawnInterval = Math.max(500, this.enemySpawnInterval - 100);
                                    this.showPowerupNotify('升级！');
                                }
                                
                                this.updateUI();
                            } else {
                                this.createExplosion(bullet.x, bullet.y, '#fff', 5);
                            }
                        }
                    });
                });
                
                // 碰撞检测 - 敌机撞击玩家
                if (!this.player.invincible) {
                    this.enemies.forEach((enemy, ei) => {
                        if (this.checkCollision(this.player, enemy)) {
                            this.enemies.splice(ei, 1);
                            this.createExplosion(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color);
                            this.soundManager.playHit();
                            this.loseLife();
                        }
                    });
                }
                
                // 碰撞检测 - 敌机子弹击中玩家
                if (!this.player.invincible) {
                    this.enemyBullets.forEach((bullet, bi) => {
                        if (this.checkCollision(this.player, bullet)) {
                            this.enemyBullets.splice(bi, 1);
                            this.soundManager.playHit();
                            this.loseLife();
                        }
                    });
                }
                
                // 碰撞检测 - 道具
                this.powerups.forEach((powerup, pi) => {
                    if (this.checkCollision(this.player, powerup)) {
                        this.powerups.splice(pi, 1);
                        this.applyPowerup(powerup.type);
                        this.soundManager.playPowerup();
                    }
                });
            }

            checkCollision(a, b) {
                return a.x - a.width/2 < b.x + b.width/2 &&
                       a.x + a.width/2 > b.x - b.width/2 &&
                       a.y - a.height/2 < b.y + b.height/2 &&
                       a.y + a.height/2 > b.y - b.height/2;
            }

            loseLife() {
                this.lives--;
                this.updateUI();
                
                if (this.lives <= 0) {
                    this.createExplosion(this.player.x, this.player.y, '#00ff88', 30);
                    this.gameOver();
                } else {
                    this.player.invincible = true;
                    this.player.invincibleTime = 120;
                }
            }

            applyPowerup(type) {
                switch(type) {
                    case 'spread':
                        this.player.powerLevel = Math.min(3, this.player.powerLevel + 1);
                        this.showPowerupNotify('火力增强！');
                        break;
                    case 'speed':
                        this.shootInterval = Math.max(80, this.shootInterval - 30);
                        this.showPowerupNotify('射速提升！');
                        break;
                    case 'life':
                        this.lives = Math.min(5, this.lives + 1);
                        this.showPowerupNotify('生命 +1！');
                        break;
                }
                this.updateUI();
            }

            showPowerupNotify(text) {
                const notify = document.getElementById('powerupNotify');
                notify.textContent = text;
                notify.classList.add('show');
                setTimeout(() => notify.classList.remove('show'), 1000);
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lives').textContent = '❤️'.repeat(this.lives);
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制玩家飞机
                if (this.gameRunning && this.player) {
                    if (!this.player.invincible || Math.floor(Date.now() / 100) % 2 === 0) {
                        this.drawPlayer(this.player.x, this.player.y);
                    }
                }
                
                // 绘制子弹
                this.bullets.forEach(bullet => {
                    this.ctx.fillStyle = bullet.color;
                    this.ctx.shadowColor = bullet.color;
                    this.ctx.shadowBlur = 10;
                    this.ctx.fillRect(bullet.x - bullet.width/2, bullet.y - bullet.height/2, bullet.width, bullet.height);
                    this.ctx.shadowBlur = 0;
                });
                
                // 绘制敌机
                this.enemies.forEach(enemy => {
                    this.drawEnemy(enemy);
                });
                
                // 绘制敌机子弹
                this.enemyBullets.forEach(bullet => {
                    this.ctx.fillStyle = bullet.color;
                    this.ctx.shadowColor = bullet.color;
                    this.ctx.shadowBlur = 8;
                    this.ctx.beginPath();
                    this.ctx.arc(bullet.x, bullet.y, bullet.width/2, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.shadowBlur = 0;
                });
                
                // 绘制道具
                this.powerups.forEach(powerup => {
                    this.drawPowerup(powerup);
                });
                
                // 绘制粒子
                this.particles.forEach(particle => {
                    this.ctx.fillStyle = particle.color;
                    this.ctx.globalAlpha = particle.life;
                    this.ctx.beginPath();
                    this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                });
            }

            drawPlayer(x, y) {
                const ctx = this.ctx;
                
                // 飞机主体
                ctx.fillStyle = '#00ccff';
                ctx.beginPath();
                ctx.moveTo(x, y - 30);
                ctx.lineTo(x - 25, y + 20);
                ctx.lineTo(x - 15, y + 15);
                ctx.lineTo(x - 15, y + 30);
                ctx.lineTo(x + 15, y + 30);
                ctx.lineTo(x + 15, y + 15);
                ctx.lineTo(x + 25, y + 20);
                ctx.closePath();
                ctx.fill();
                
                // 机翼装饰
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.moveTo(x - 20, y);
                ctx.lineTo(x - 30, y + 10);
                ctx.lineTo(x - 20, y + 10);
                ctx.closePath();
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(x + 20, y);
                ctx.lineTo(x + 30, y + 10);
                ctx.lineTo(x + 20, y + 10);
                ctx.closePath();
                ctx.fill();
                
                // 驾驶舱
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(x, y - 5, 8, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 引擎火焰
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(x - 10, y + 30);
                ctx.lineTo(x, y + 45 + Math.random() * 10);
                ctx.lineTo(x + 10, y + 30);
                ctx.closePath();
                ctx.fill();
            }

            drawEnemy(enemy) {
                const ctx = this.ctx;
                const x = enemy.x + enemy.width / 2;
                const y = enemy.y + enemy.height / 2;
                
                // 敌机主体
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.moveTo(x, y + enemy.height/2);
                ctx.lineTo(x - enemy.width/2, y - enemy.height/2);
                ctx.lineTo(x, y - enemy.height/2 + 10);
                ctx.lineTo(x + enemy.width/2, y - enemy.height/2);
                ctx.closePath();
                ctx.fill();
                
                // 敌机装饰
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.moveTo(x, y + enemy.height/2 - 10);
                ctx.lineTo(x - enemy.width/4, y - enemy.height/4);
                ctx.lineTo(x + enemy.width/4, y - enemy.height/4);
                ctx.closePath();
                ctx.fill();
            }

            drawPowerup(powerup) {
                const ctx = this.ctx;
                const x = powerup.x;
                const y = powerup.y;
                
                // 道具外框
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 道具图标
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let icon = '🎁';
                if (powerup.type === 'spread') icon = '🔫';
                else if (powerup.type === 'speed') icon = '⚡';
                else if (powerup.type === 'life') icon = '❤️';
                
                ctx.fillText(icon, x, y);
            }

            gameLoop() {
                if (!this.gameRunning || this.gamePaused) return;
                
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // ==================== 初始化游戏 ====================
        window.addEventListener('load', () => {
            const game = new Game();
        });
    </script>
</body>
