<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级多 Agent 协同系统 - 演示平台</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --glow: rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 头部 */
        header {
            background: linear-gradient(135deg, var(--bg-card), #2d3748);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--glow);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.4em;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 5px;
        }

        /* 列表 */
        .entity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .entity-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg-hover);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .entity-item:hover {
            background: var(--bg-card);
            transform: translateX(5px);
        }

        .entity-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .entity-info {
            flex: 1;
        }

        .entity-name {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .entity-detail {
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .entity-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
        }

        .badge-human {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .badge-assistant {
            background: rgba(16, 185, 129, 0.2);
            color: var(--secondary);
        }

        .badge-agent {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent);
        }

        /* 任务卡片 */
        .task-item {
            background: var(--bg-hover);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-title {
            font-weight: bold;
            font-size: 1.1em;
        }

        .task-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--accent); }
        .status-assigned { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .status-in_progress { background: rgba(16, 185, 129, 0.2); color: var(--secondary); }
        .status-completed { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        .task-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        /* 聊天界面 */
        .chat-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-message {
            display: flex;
            margin: 15px 0;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-message.human { flex-direction: row; }
        .chat-message.agent { flex-direction: row-reverse; }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
            flex-shrink: 0;
        }

        .message-content {
            max-width: 70%;
            margin: 0 15px;
        }

        .message-bubble {
            background: var(--bg-hover);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 5px;
        }

        .message-sender {
            font-size: 0.8em;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .chat-input input {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.95em;
        }

        .chat-input input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-input button {
            margin-left: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-input button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px var(--glow);
        }

        /* 按钮 */
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--glow);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), #059669);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #d97706);
        }

        /* 进度条 */
        .progress-bar {
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* 标签 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.75em;
            margin: 2px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 企业级多 Agent 协同系统</h1>
            <p class="subtitle">员工真人 + 数字助理 + 部门 Agent 多角色协同 | 任务规划拆解与分派执行 | 群聊协作</p>
        </header>

        <!-- 系统概览 -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="stat-users">3</div>
                <div class="stat-label">员工</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-assistants">3</div>
                <div class="stat-label">数字助理</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-agents">4</div>
                <div class="stat-label">部门 Agent</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-tasks">12</div>
                <div class="stat-label">任务总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-chats">2</div>
                <div class="stat-label">群聊数</div>
            </div>
        </div>

        <div class="grid">
            <!-- 员工列表 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">👥 员工与数字助理</h2>
                    <button class="btn" onclick="addUser()">+ 添加</button>
                </div>
                <div class="entity-list" id="users-list">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 部门 Agent -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🏢 部门岗位 Agent</h2>
                    <button class="btn btn-accent" onclick="addAgent()">+ 添加</button>
                </div>
                <div class="entity-list" id="agents-list">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="card" style="grid-column: span 2;">
                <div class="card-header">
                    <h2 class="card-title">📋 任务管理</h2>
                    <div>
                        <button class="btn" onclick="createTask()">+ 创建任务</button>
                        <button class="btn btn-secondary" onclick="assignTasks()">自动分派</button>
                    </div>
                </div>
                <div id="tasks-list">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 群聊 -->
            <div class="card" style="grid-column: span 2;">
                <div class="card-header">
                    <h2 class="card-title">💬 项目群聊</h2>
                    <button class="btn" onclick="createGroup()">+ 创建群组</button>
                </div>
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <!-- 消息 -->
                    </div>
                    <div class="chat-input">
                        <input type="text" id="message-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                        <button onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据
        const users = [
            { id: 'u1', name: '张三', department: '技术部', position: '高级工程师', skills: ['Python', 'Java'], avatar: '张' },
            { id: 'u2', name: '李四', department: '市场部', position: '市场经理', skills: ['推广', '品牌'], avatar: '李' },
            { id: 'u3', name: '王五', department: '人力部', position: 'HR 总监', skills: ['招聘', '培训'], avatar: '王' }
        ];

        const assistants = [
            { id: 'a1', userId: 'u1', name: '张三的助理', capabilities: ['任务管理', '日程'], avatar: '助' },
            { id: 'a2', userId: 'u2', name: '李四的助理', capabilities: ['数据分析', '报告'], avatar: '助' },
            { id: 'a3', userId: 'u3', name: '王五的助理', capabilities: ['招聘', '面试'], avatar: '助' }
        ];

        const agents = [
            { id: 'ag1', department: '技术部', role: '开发组长', name: '技术开发 Agent', skills: ['Python', '架构'], avatar: '技' },
            { id: 'ag2', department: '市场部', role: '推广专员', name: '市场推广 Agent', skills: ['广告', 'SEO'], avatar: '市' },
            { id: 'ag3', department: '人力部', role: '招聘专员', name: '人力资源 Agent', skills: ['招聘', '面试'], avatar: '人' },
            { id: 'ag4', department: '财务部', role: '财务分析', name: '财务 Agent', skills: ['分析', '报表'], avatar: '财' }
        ];

        const tasks = [
            { id: 't1', title: '开发 CRM 系统', description: '客户关系管理系统', status: 'in_progress', priority: 'high', assignee: 'ag1', subTasks: 5 },
            { id: 't2', title: '市场推广活动', description: 'Q2 产品推广', status: 'assigned', priority: 'high', assignee: 'ag2', subTasks: 4 },
            { id: 't3', title: '招聘高级工程师', description: '技术部招聘', status: 'pending', priority: 'medium', assignee: null, subTasks: 3 },
            { id: 't4', title: '财务报表分析', description: 'Q1 财务分析', status: 'completed', priority: 'medium', assignee: 'ag4', subTasks: 2 }
        ];

        const messages = [
            { sender: '张三', type: 'human', content: '大家好，CRM 项目正式启动了！', time: '10:30' },
            { sender: '技术开发 Agent', type: 'agent', content: '收到！技术部已准备好开始开发工作。', time: '10:31' },
            { sender: '李四', type: 'human', content: '市场部会配合做好推广准备', time: '10:32' },
            { sender: '张三的助理', type: 'assistant', content: '已创建项目任务看板，请查看', time: '10:33' }
        ];

        // 渲染函数
        function renderUsers() {
            const container = document.getElementById('users-list');
            container.innerHTML = '';
            
            users.forEach(user => {
                const assistant = assistants.find(a => a.userId === user.id);
                container.innerHTML += `
                    <div class="entity-item">
                        <div class="entity-avatar">${user.avatar}</div>
                        <div class="entity-info">
                            <div class="entity-name">${user.name} 
                                <span class="entity-badge badge-human">${user.position}</span>
                            </div>
                            <div class="entity-detail">${user.department} | 技能：${user.skills.join(', ')}</div>
                        </div>
                    </div>
                `;
                
                if (assistant) {
                    container.innerHTML += `
                        <div class="entity-item" style="margin-left: 40px; opacity: 0.8;">
                            <div class="entity-avatar" style="background: linear-gradient(135deg, #10b981, #059669);">${assistant.avatar}</div>
                            <div class="entity-info">
                                <div class="entity-name">${assistant.name} 
                                    <span class="entity-badge badge-assistant">数字助理</span>
                                </div>
                                <div class="entity-detail">能力：${assistant.capabilities.join(', ')}</div>
                            </div>
                        </div>
                    `;
                }
            });
        }

        function renderAgents() {
            const container = document.getElementById('agents-list');
            container.innerHTML = '';
            
            agents.forEach(agent => {
                container.innerHTML += `
                    <div class="entity-item">
                        <div class="entity-avatar" style="background: linear-gradient(135deg, #f59e0b, #d97706);">${agent.avatar}</div>
                        <div class="entity-info">
                            <div class="entity-name">${agent.name} 
                                <span class="entity-badge badge-agent">${agent.role}</span>
                            </div>
                            <div class="entity-detail">${agent.department} | 技能：${agent.skills.join(', ')}</div>
                        </div>
                    </div>
                `;
            });
        }

        function renderTasks() {
            const container = document.getElementById('tasks-list');
            container.innerHTML = '';
            
            tasks.forEach(task => {
                const statusClass = `status-${task.status}`;
                const statusText = {
                    'pending': '待处理',
                    'assigned': '已分派',
                    'in_progress': '执行中',
                    'completed': '已完成'
                }[task.status];
                
                container.innerHTML += `
                    <div class="task-item">
                        <div class="task-header">
                            <div class="task-title">${task.title}</div>
                            <span class="task-status ${statusClass}">${statusText}</span>
                        </div>
                        <div style="color: var(--text-secondary); font-size: 0.9em;">${task.description}</div>
                        <div class="task-meta">
                            <span>🎯 优先级：${task.priority}</span>
                            <span>📝 子任务：${task.subTasks}个</span>
                            <span>👤 执行者：${task.assignee || '待分派'}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${task.status === 'completed' ? 100 : task.status === 'in_progress' ? 60 : task.status === 'assigned' ? 30 : 0}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function renderMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            
            messages.forEach(msg => {
                const isHuman = msg.type === 'human' || msg.type === 'assistant';
                container.innerHTML += `
                    <div class="chat-message ${msg.type}">
                        <div class="message-avatar" style="background: ${msg.type === 'agent' ? 'linear-gradient(135deg, #f59e0b, #d97706)' : 'linear-gradient(135deg, #6366f1, #4f46e5)'}">
                            ${msg.sender[0]}
                        </div>
                        <div class="message-content">
                            <div class="message-sender">${msg.sender} · ${msg.time}</div>
                            <div class="message-bubble">${msg.content}</div>
                        </div>
                    </div>
                `;
            });
            
            container.scrollTop = container.scrollHeight;
        }

        // 交互函数
        function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            
            if (content) {
                messages.push({
                    sender: '我',
                    type: 'human',
                    content: content,
                    time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})
                });
                
                input.value = '';
                renderMessages();
                
                // 模拟回复
                setTimeout(() => {
                    messages.push({
                        sender: '技术开发 Agent',
                        type: 'agent',
                        content: '收到！我会处理这个任务。',
                        time: new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})
                    });
                    renderMessages();
                }, 1000);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function createTask() {
            alert('创建任务功能：弹出表单填写任务信息，自动拆解为子任务');
        }

        function assignTasks() {
            alert('自动分派任务：根据技能匹配、负载情况智能分派给最合适的执行者');
        }

        function addUser() {
            alert('添加员工功能');
        }

        function addAgent() {
            alert('添加部门 Agent 功能');
        }

        function createGroup() {
            alert('创建群组功能：选择成员（员工、助理、Agent）创建项目群聊');
        }

        // 初始化
        renderUsers();
        renderAgents();
        renderTasks();
        renderMessages();
    </script>
</body>
</html>
