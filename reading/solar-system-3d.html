<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 太阳系模拟系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #000011;
            color: #ffffff;
            overflow: hidden;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        /* 控制面板 */
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            z-index: 100;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0, 100, 255, 0.3);
        }

        .panel-title {
            font-size: 20px;
            font-weight: bold;
            color: #64b5ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '🌌';
            font-size: 24px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            font-size: 14px;
            color: #a0b0c0;
            margin-bottom: 8px;
            display: block;
        }

        .control-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(100, 150, 255, 0.3);
            border-radius: 3px;
            outline: none;
        }

        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #64b5ff, #3b82f6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(100, 181, 255, 0.5);
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64b5ff, #3b82f6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 181, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(100, 150, 255, 0.2);
            color: #64b5ff;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(100, 150, 255, 0.3);
        }

        .btn.active {
            background: linear-gradient(135deg, #f72585, #b5179e);
            color: white;
        }

        /* 行星信息面板 */
        .planet-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            z-index: 100;
            min-width: 300px;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 100, 255, 0.3);
        }

        .planet-info.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .planet-name {
            font-size: 24px;
            font-weight: bold;
            color: #64b5ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .planet-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64b5ff, #3b82f6);
        }

        .planet-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(100, 150, 255, 0.2);
        }

        .planet-stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #a0b0c0;
            font-size: 14px;
        }

        .stat-value {
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
        }

        .planet-desc {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 150, 255, 0.2);
            color: #b0c0d0;
            font-size: 13px;
            line-height: 1.6;
        }

        /* 底部提示 */
        .tips {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid rgba(100, 150, 255, 0.3);
            z-index: 100;
            display: flex;
            gap: 30px;
            font-size: 13px;
            color: #a0b0c0;
        }

        .tip-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tip-icon {
            font-size: 16px;
        }

        /* 加载界面 */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000011;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #64b5ff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }

        .loading-bar {
            width: 300px;
            height: 6px;
            background: rgba(100, 150, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #64b5ff, #3b82f6);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 20px rgba(100, 181, 255, 0.5);
        }

        .loading-text {
            margin-top: 20px;
            color: #64b5ff;
            font-size: 14px;
        }

        /* 音效开关 */
        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(10, 20, 40, 0.9);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(100, 181, 255, 0.3);
        }

        .sound-toggle.muted {
            opacity: 0.5;
        }

        /* 行星选择器 */
        .planet-selector {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .planet-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(100, 150, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .planet-btn:hover {
            transform: scale(1.2);
            border-color: #64b5ff;
            box-shadow: 0 0 20px rgba(100, 181, 255, 0.5);
        }

        .planet-btn.active {
            border-color: #64b5ff;
            box-shadow: 0 0 25px rgba(100, 181, 255, 0.8);
        }

        .planet-btn-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 40, 0.95);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        .planet-btn:hover .planet-btn-tooltip {
            opacity: 1;
        }
    </style>
</head>
<body>

    <script>
        // ==================== 音效管理器 ====================
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
                this.masterGain = null;
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.connect(this.audioContext.destination);
                    this.masterGain.gain.value = 0.3;
                }
            }

            toggle() {
                this.enabled = !this.enabled;
                if (this.masterGain) {
                    this.masterGain.gain.value = this.enabled ? 0.3 : 0;
                }
                return this.enabled;
            }

            playTone(frequency, duration, type = 'sine', startTime = 0) {
                if (!this.enabled || !this.audioContext) return;

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);

                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime + startTime);

                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime + startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + startTime + duration);

                oscillator.start(this.audioContext.currentTime + startTime);
                oscillator.stop(this.audioContext.currentTime + startTime + duration);
            }

            playHover() {
                this.playTone(800, 0.1, 'sine');
            }

            playClick() {
                this.playTone(600, 0.15, 'square');
            }

            playSelect() {
                this.playTone(400, 0.1, 'sine', 0);
                this.playTone(600, 0.1, 'sine', 0.1);
                this.playTone(800, 0.2, 'sine', 0.2);
            }

            playAmbient() {
                if (!this.enabled || !this.audioContext) return;

                // 创建环境音
                const bufferSize = this.audioContext.sampleRate * 2;
                const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.audioContext.createBufferSource();
                noise.buffer = buffer;
                noise.loop = true;

                const filter = this.audioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 200;

                const gainNode = this.audioContext.createGain();
                gainNode.gain.value = 0.05;

                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(this.masterGain);

                noise.start();
            }
        }

        // ==================== 太阳系模拟系统 ====================
        class SolarSystem {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.soundManager = new SoundManager();
                
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                
                this.planets = {};
                this.orbits = [];
                this.trails = {};
                
                this.speedMultiplier = 1;
                this.paused = false;
                this.autoRotate = false;
                this.showOrbits = true;
                this.showLabels = true;
                this.showTrails = false;
                
                this.selectedPlanet = null;
                this.mouse = new THREE.Vector2();
                this.raycaster = new THREE.Raycaster();
                
                this.init();
            }

            init() {
                // 创建场景
                this.scene = new THREE.Scene();
                
                // 创建相机
                this.camera = new THREE.PerspectiveCamera(
                    60,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    2000
                );
                this.camera.position.set(0, 200, 400);
                
                // 创建渲染器
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.container.appendChild(this.renderer.domElement);
                
                // 添加光源
                this.addLights();
                
                // 创建星空背景
                this.createStarfield();
                
                // 创建太阳
                this.createSun();
                
                // 创建行星
                this.createPlanets();
                
                // 创建轨道
                this.createOrbits();
                
                // 设置控制器
                this.setupControls();
                
                // 创建行星选择器
                this.createPlanetSelector();
                
                // 设置事件监听
                this.setupEventListeners();
                
                // 播放环境音
                this.soundManager.playAmbient();
                
                // 开始动画
                this.animate();
                
                // 隐藏加载界面
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                }, 2000);
            }

            addLights() {
                // 点光源（太阳）
                const pointLight = new THREE.PointLight(0xffffff, 2, 1000);
                pointLight.position.set(0, 0, 0);
                this.scene.add(pointLight);

                // 环境光
                const ambientLight = new THREE.AmbientLight(0x333333);
                this.scene.add(ambientLight);
            }

            createStarfield() {
                const geometry = new THREE.BufferGeometry();
                const vertices = [];

                for (let i = 0; i < 10000; i++) {
                    vertices.push(
                        (Math.random() - 0.5) * 2000,
                        (Math.random() - 0.5) * 2000,
                        (Math.random() - 0.5) * 2000
                    );
                }

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

                const material = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.7,
                    transparent: true,
                    opacity: 0.8
                });

                const stars = new THREE.Points(geometry, material);
                this.scene.add(stars);
            }

            createSun() {
                const geometry = new THREE.SphereGeometry(planetData.sun.size, 64, 64);
                const material = new THREE.MeshBasicMaterial({
                    color: planetData.sun.color,
                    transparent: true,
                    opacity: 1
                });

                const sun = new THREE.Mesh(geometry, material);
                sun.userData = { type: 'sun', key: 'sun' };
                this.scene.add(sun);
                this.planets.sun = { mesh: sun, angle: 0 };

                // 太阳光晕
                const glowGeometry = new THREE.SphereGeometry(planetData.sun.size * 1.5, 32, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffaa00,
                    transparent: true,
                    opacity: 0.3,
                    side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                this.scene.add(glow);
            }

            createPlanets() {
                Object.keys(planetData).forEach(key => {
                    if (key === 'sun') return;

                    const data = planetData[key];
                    
                    // 创建行星
                    const geometry = new THREE.SphereGeometry(data.size, 32, 32);
                    const material = new THREE.MeshStandardMaterial({
                        color: data.color,
                        roughness: 0.8,
                        metalness: 0.2
                    });

                    const planet = new THREE.Mesh(geometry, material);
                    planet.userData = { type: 'planet', key: key };
                    
                    // 设置初始位置
                    const angle = Math.random() * Math.PI * 2;
                    planet.position.x = Math.cos(angle) * data.orbitRadius;
                    planet.position.z = Math.sin(angle) * data.orbitRadius;

                    this.scene.add(planet);
                    this.planets[key] = {
                        mesh: planet,
                        angle: angle,
                        orbitRadius: data.orbitRadius,
                        speed: data.speed
                    };

                    // 创建土星环
                    if (data.hasRings) {
                        this.createSaturnRings(planet, data.size);
                    }

                    // 初始化轨迹
                    this.trails[key] = [];
                });
            }

            createSaturnRings(planet, planetSize) {
                const innerRadius = planetSize * 1.4;
                const outerRadius = planetSize * 2.2;
                const geometry = new THREE.RingGeometry(innerRadius, outerRadius, 64);
                const material = new THREE.MeshBasicMaterial({
                    color: 0xc9b896,
                    transparent: true,
                    opacity: 0.7,
                    side: THREE.DoubleSide
                });

                const rings = new THREE.Mesh(geometry, material);
                rings.rotation.x = Math.PI / 2;
                planet.add(rings);
            }

            createOrbits() {
                Object.keys(planetData).forEach(key => {
                    if (key === 'sun') return;

                    const data = planetData[key];
                    const geometry = new THREE.RingGeometry(
                        data.orbitRadius - 0.5,
                        data.orbitRadius + 0.5,
                        128
                    );
                    const material = new THREE.MeshBasicMaterial({
                        color: 0x64b5ff,
                        transparent: true,
                        opacity: 0.2,
                        side: THREE.DoubleSide
                    });

                    const orbit = new THREE.Mesh(geometry, material);
                    orbit.rotation.x = Math.PI / 2;
                    this.scene.add(orbit);
                    this.orbits.push(orbit);
                });
            }

            createPlanetSelector() {
                const selector = document.getElementById('planetSelector');
                
                Object.keys(planetData).forEach(key => {
                    const data = planetData[key];
                    const btn = document.createElement('div');
                    btn.className = 'planet-btn';
                    btn.style.background = `linear-gradient(135deg, #${data.color.toString(16).padStart(6, '0')}, #${data.color.toString(16).padStart(6, '0')})`;
                    btn.innerHTML = `<div class="planet-btn-tooltip">${data.name}</div>`;
                    btn.dataset.key = key;
                    
                    btn.addEventListener('click', () => {
                        this.soundManager.playSelect();
                        this.focusOnPlanet(key);
                    });
                    
                    btn.addEventListener('mouseenter', () => {
                        this.soundManager.playHover();
                    });
                    
                    selector.appendChild(btn);
                });
            }

            setupControls() {
                let isDragging = false;
                let isRightDragging = false;
                let previousMousePosition = { x: 0, y: 0 };
                let spherical = { theta: 0, phi: Math.PI / 3, radius: 400 };

                const updateCamera = () => {
                    this.camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
                    this.camera.position.y = spherical.radius * Math.cos(spherical.phi);
                    this.camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
                    this.camera.lookAt(0, 0, 0);
                };

                updateCamera();

                this.container.addEventListener('mousedown', (e) => {
                    if (e.button === 0) {
                        isDragging = true;
                        this.soundManager.init();
                    } else if (e.button === 2) {
                        isRightDragging = true;
                    }
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });

                this.container.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const deltaX = e.clientX - previousMousePosition.x;
                        const deltaY = e.clientY - previousMousePosition.y;

                        spherical.theta -= deltaX * 0.005;
                        spherical.phi -= deltaY * 0.005;
                        spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));

                        updateCamera();
                        previousMousePosition = { x: e.clientX, y: e.clientY };
                    }

                    if (isRightDragging) {
                        const deltaX = e.clientX - previousMousePosition.x;
                        const deltaY = e.clientY - previousMousePosition.y;

                        this.camera.position.x -= deltaX * 0.5;
                        this.camera.position.y += deltaY * 0.5;
                        this.camera.lookAt(0, 0, 0);

                        previousMousePosition = { x: e.clientX, y: e.clientY };
                    }
                });

                this.container.addEventListener('mouseup', () => {
                    isDragging = false;
                    isRightDragging = false;
                });

                this.container.addEventListener('mouseleave', () => {
                    isDragging = false;
                    isRightDragging = false;
                });

                this.container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    spherical.radius += e.deltaY * 0.5;
                    spherical.radius = Math.max(100, Math.min(1000, spherical.radius));
                    updateCamera();
                }, { passive: false });

                this.container.addEventListener('contextmenu', (e) => e.preventDefault());

                // 点击检测
                this.container.addEventListener('click', (e) => {
                    this.mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                    this.raycaster.setFromCamera(this.mouse, this.camera);

                    const meshes = Object.values(this.planets).map(p => p.mesh);
                    const intersects = this.raycaster.intersectObjects(meshes);

                    if (intersects.length > 0) {
                        const selected = intersects[0].object;
                        const key = selected.userData.key;
                        this.soundManager.playSelect();
                        this.focusOnPlanet(key);
                        this.showPlanetInfo(key);
                    }
                });
            }

            setupEventListeners() {
                // 速度滑块
                document.getElementById('speedSlider').addEventListener('input', (e) => {
                    this.speedMultiplier = parseFloat(e.target.value);
                });

                // 缩放滑块
                document.getElementById('zoomSlider').addEventListener('input', (e) => {
                    const distance = parseFloat(e.target.value);
                    this.camera.position.set(0, distance * 0.5, distance);
                    this.camera.lookAt(0, 0, 0);
                });

                // 轨道显示
                document.getElementById('orbitToggle').addEventListener('click', (e) => {
                    this.soundManager.playClick();
                    this.showOrbits = !this.showOrbits;
                    this.orbits.forEach(orbit => orbit.visible = this.showOrbits);
                    e.target.classList.toggle('active');
                });

                // 标签显示
                document.getElementById('labelToggle').addEventListener('click', (e) => {
                    this.soundManager.playClick();
                    this.showLabels = !this.showLabels;
                    e.target.classList.toggle('active');
                });

                // 轨迹显示
                document.getElementById('trailsToggle').addEventListener('click', (e) => {
                    this.soundManager.playClick();
                    this.showTrails = !this.showTrails;
                    e.target.classList.toggle('active');
                });

                // 暂停
                document.getElementById('pauseBtn').addEventListener('click', (e) => {
                    this.soundManager.playClick();
                    this.paused = !this.paused;
                    e.target.textContent = this.paused ? '▶️ 继续' : '⏸️ 暂停';
                    e.target.classList.toggle('active');
                });

                // 重置
                document.getElementById('resetBtn').addEventListener('click', () => {
                    this.soundManager.playClick();
                    this.camera.position.set(0, 200, 400);
                    this.camera.lookAt(0, 0, 0);
                    this.speedMultiplier = 1;
                    document.getElementById('speedSlider').value = 1;
                    document.getElementById('zoomSlider').value = 400;
                });

                // 自动旋转
                document.getElementById('autoRotateBtn').addEventListener('click', (e) => {
                    this.soundManager.playClick();
                    this.autoRotate = !this.autoRotate;
                    e.target.classList.toggle('active');
                });

                // 音效开关
                document.getElementById('soundToggle').addEventListener('click', (e) => {
                    const enabled = this.soundManager.toggle();
                    e.target.textContent = enabled ? '🔊' : '🔇';
                    e.target.classList.toggle('muted');
                });

                // 窗口大小调整
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            focusOnPlanet(key) {
                const planet = this.planets[key];
                if (!planet) return;

                // 更新选择器按钮状态
                document.querySelectorAll('.planet-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.key === key);
                });

                this.selectedPlanet = key;
            }

            showPlanetInfo(key) {
                const data = planetData[key];
                const infoPanel = document.getElementById('planetInfo');

                document.getElementById('infoName').textContent = data.name;
                document.getElementById('infoIcon').style.background = `linear-gradient(135deg, #${data.color.toString(16).padStart(6, '0')}, #${data.color.toString(16).padStart(6, '0')})`;
                document.getElementById('infoDiameter').textContent = data.diameter;
                document.getElementById('infoDistance').textContent = data.distance;
                document.getElementById('infoOrbit').textContent = data.orbit;
                document.getElementById('infoTemp').textContent = data.temp;
                document.getElementById('infoDesc').textContent = data.desc;

                infoPanel.classList.add('active');
            }

            updatePlanets() {
                if (this.paused) return;

                Object.keys(this.planets).forEach(key => {
                    if (key === 'sun') return;

                    const planet = this.planets[key];
                    planet.angle += planet.speed * this.speedMultiplier;

                    planet.mesh.position.x = Math.cos(planet.angle) * planet.orbitRadius;
                    planet.mesh.position.z = Math.sin(planet.angle) * planet.orbitRadius;

                    // 自转
                    planet.mesh.rotation.y += 0.01 * this.speedMultiplier;

                    // 更新轨迹
                    if (this.showTrails) {
                        this.trails[key].push({
                            x: planet.mesh.position.x,
                            z: planet.mesh.position.z
                        });
                        if (this.trails[key].length > 100) {
                            this.trails[key].shift();
                        }
                    }
                });

                // 太阳自转
                this.planets.sun.mesh.rotation.y += 0.005 * this.speedMultiplier;
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                this.updatePlanets();

                // 自动旋转
                if (this.autoRotate && !this.paused) {
                    const time = Date.now() * 0.0001;
                    this.camera.position.x = Math.sin(time) * 400;
                    this.camera.position.z = Math.cos(time) * 400;
                    this.camera.lookAt(0, 0, 0);
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ==================== 初始化 ====================
        window.addEventListener('load', () => {
            const loadingProgress = document.getElementById('loadingProgress');
            const loadingText = document.getElementById('loadingText');
            
            let progress = 0;
            const loadingInterval = setInterval(() => {
                progress += 5;
                loadingProgress.style.width = progress + '%';
                
                if (progress < 30) {
                    loadingText.textContent = '正在加载资源...';
                } else if (progress < 60) {
                    loadingText.textContent = '正在创建 3D 场景...';
                } else if (progress < 90) {
                    loadingText.textContent = '正在初始化行星系统...';
                } else {
                    loadingText.textContent = '准备就绪...';
                }
                
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                }
            }, 100);

            const solarSystem = new SolarSystem();
        });
    </script>
</body>
</html>
