<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典暴力摩托 - 网页版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 900px;
            height: 650px;
            background: #2d5016;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 100, 0.3);
            border: 4px solid #4a4a4a;
        }

        #game-canvas {
            display: block;
        }

        /* UI 覆盖层 */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 10;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff6600;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
        }

        .stat-label {
            font-size: 12px;
            color: #ffcc00;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
        }

        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.3s ease;
        }

        /* 武器选择 */
        .weapon-select {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .weapon-slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #666;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .weapon-slot.active {
            border-color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
        }

        .weapon-slot .icon {
            font-size: 24px;
        }

        .weapon-slot .ammo {
            font-size: 12px;
            color: #ffcc00;
        }

        /* 开始界面 */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(20,20,40,0.95) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-title {
            font-size: 64px;
            font-weight: bold;
            color: #ff6600;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #ffcc00;
            margin-bottom: 20px;
            letter-spacing: 5px;
            animation: titlePulse 1s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .game-subtitle {
            font-size: 24px;
            color: #ffcc00;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0 #000;
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 28px;
            font-family: inherit;
            background: linear-gradient(180deg, #ff6600 0%, #cc4400 100%);
            color: #fff;
            border: 4px solid #ffcc00;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 8px 0 #883300, 0 15px 30px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            margin-bottom: 30px;
        }

        .start-btn:hover {
            background: linear-gradient(180deg, #ff7700 0%, #dd5500 100%);
            transform: translateY(-3px);
        }

        .start-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #883300, 0 6px 15px rgba(0,0,0,0.5);
        }

        .controls-info {
            color: #fff;
            font-size: 14px;
            text-align: center;
            line-height: 2;
            background: rgba(0,0,0,0.5);
            padding: 20px 30px;
            border-radius: 10px;
            border: 2px solid #666;
        }

        .key {
            display: inline-block;
            padding: 5px 12px;
            background: #fff;
            color: #000;
            border-radius: 5px;
            margin: 0 3px;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        /* 游戏结束界面 */
        .game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
        }

        .game-over-title {
            font-size: 56px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 20px;
        }

        .game-clear-title {
            font-size: 56px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 20px;
        }

        .final-stats {
            font-size: 20px;
            margin: 10px 0;
            color: #ffcc00;
        }

        .restart-btn {
            padding: 15px 50px;
            font-size: 22px;
            font-family: inherit;
            background: linear-gradient(180deg, #00cc66 0%, #009944 100%);
            color: #fff;
            border: 4px solid #00ff88;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 6px 0 #006633, 0 12px 20px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            margin-top: 30px;
        }

        .restart-btn:hover {
            background: linear-gradient(180deg, #00dd77 0%, #00aa55 100%);
        }

        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #006633, 0 5px 10px rgba(0,0,0,0.5);
        }

        /* 音效开关 */
        .sound-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s ease;
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            border-color: #ffcc00;
        }

        .sound-toggle.muted {
            opacity: 0.5;
        }

        /* 小地图 */
        .minimap {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 180px;
            height: 120px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffcc00;
            border-radius: 8px;
            z-index: 10;
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
        }

        /* 伤害提示 */
        .damage-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 3px 3px 0 #000;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .damage-indicator.show {
            animation: damageFlash 0.5s ease-out;
        }

        @keyframes damageFlash {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 道具提示 */
        .powerup-notify {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        .powerup-notify.show {
            animation: powerupFloat 1.5s ease-out;
        }

        @keyframes powerupFloat {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
        }

        /* 排名显示 */
        .position-display {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffcc00;
            border-radius: 8px;
            padding: 15px 25px;
            z-index: 10;
        }

        .position-number {
            font-size: 48px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #000;
        }

        .position-label {
            font-size: 14px;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="900" height="650"></canvas>
        
        <!-- UI 覆盖层 -->
        <div class="ui-overlay">
            <div class="stat-box">
                <div class="stat-label">Health</div>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                </div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Speed</div>
                <div class="stat-value"><span id="speedValue">0</span> km/h</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Lap</div>
                <div class="stat-value"><span id="lapValue">1</span>/3</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time</div>
                <div class="stat-value" id="timeValue">0:00</div>
            </div>
        </div>

        <!-- 小地图 -->
        <div class="minimap">
            <canvas id="minimap-canvas" width="180" height="120"></canvas>
        </div>

        <!-- 排名显示 -->
        <div class="position-display">
            <div class="position-number" id="positionNumber">1</div>
            <div class="position-label">POSITION</div>
        </div>

        <!-- 武器选择 -->
        <div class="weapon-select">
            <div class="weapon-slot active" data-weapon="fist">
                <div class="icon">👊</div>
                <div class="ammo">∞</div>
            </div>
            <div class="weapon-slot" data-weapon="bat">
                <div class="icon">🏏</div>
                <div class="ammo">∞</div>
            </div>
            <div class="weapon-slot" data-weapon="knife">
                <div class="icon">🔪</div>
                <div class="ammo">∞</div>
            </div>
            <div class="weapon-slot" data-weapon="bomb">
                <div class="icon">💣</div>
                <div class="ammo" id="bombAmmo">3</div>
            </div>
        </div>

        <!-- 伤害提示 -->
        <div class="damage-indicator" id="damageIndicator">💥</div>

        <!-- 道具提示 -->
        <div class="powerup-notify" id="powerupNotify"></div>

        <!-- 音效开关 -->
        <button class="sound-toggle" id="soundToggle">🔊</button>

        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen">
            <div class="game-title">🏍️ 暴力摩托</div>
            <div class="game-subtitle">ROAD RASH CLASSIC</div>
            <button class="start-btn" id="startBtn">开始游戏</button>
            <div class="controls-info">
                <div><span class="key">↑</span> 加速 <span class="key">↓</span> 刹车 <span class="key">←</span><span class="key">→</span> 转向</div>
                <div><span class="key">Z</span> 攻击 <span class="key">X</span> 切换武器 <span class="key">C</span> 使用道具</div>
                <div><span class="key">N</span> 氮气加速 <span class="key">R</span> 重新开始</div>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div class="game-over-screen" id="gameOverScreen">
            <div class="game-over-title" id="gameOverTitle">GAME OVER</div>
            <div class="final-stats">最终排名：<span id="finalPosition">0</span></div>
            <div class="final-stats">完成时间：<span id="finalTime">0:00</span></div>
            <button class="restart-btn" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        // ==================== 音效管理器 ====================
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
                this.masterGain = null;
            }

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.connect(this.audioContext.destination);
                    this.masterGain.gain.value = 0.3;
                }
            }

            toggle() {
                this.enabled = !this.enabled;
                if (this.masterGain) {
                    this.masterGain.gain.value = this.enabled ? 0.3 : 0;
                }
                return this.enabled;
            }

            playTone(frequency, duration, type = 'square', startTime = 0) {
                if (!this.enabled || !this.audioContext) return;

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);

                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime + startTime);

                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime + startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + startTime + duration);

                oscillator.start(this.audioContext.currentTime + startTime);
                oscillator.stop(this.audioContext.currentTime + startTime + duration);
            }

            // 引擎音效
            playEngine(pitch = 1) {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(100 * pitch, this.audioContext.currentTime);
                
                gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.1);
            }

            // 攻击音效
            playHit() {
                this.playTone(150, 0.15, 'sawtooth', 0);
                this.playTone(100, 0.15, 'sawtooth', 0.05);
            }

            // 爆炸音效
            playExplosion() {
                if (!this.enabled || !this.audioContext) return;
                
                const bufferSize = this.audioContext.sampleRate * 0.5;
                const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = this.audioContext.createBufferSource();
                noise.buffer = buffer;
                
                const filter = this.audioContext.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 500;
                
                const gainNode = this.audioContext.createGain();
                
                noise.connect(filter);
                filter.connect(gainNode);
                gainNode.connect(this.masterGain);
                
                gainNode.gain.setValueAtTime(0.5, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.5);
                
                noise.start(this.audioContext.currentTime);
            }

            // 道具音效
            playPowerup() {
                [400, 600, 800, 1000].forEach((freq, i) => {
                    this.playTone(freq, 0.1, 'sine', i * 0.08);
                });
            }

            // 碰撞音效
            playCrash() {
                this.playTone(200, 0.2, 'sawtooth', 0);
                this.playTone(150, 0.2, 'sawtooth', 0.1);
            }

            // 游戏开始音效
            playStart() {
                [523, 659, 784, 1047].forEach((freq, i) => {
                    this.playTone(freq, 0.15, 'square', i * 0.1);
                });
            }

            // 游戏结束音效
            playGameOver() {
                [400, 350, 300, 250, 200].forEach((freq, i) => {
                    this.playTone(freq, 0.2, 'sawtooth', i * 0.15);
                });
            }

            // 过关音效
            playLevelComplete() {
                [523, 659, 784, 1047, 784, 1047].forEach((freq, i) => {
                    this.playTone(freq, 0.15, 'square', i * 0.12);
                });
            }
        }

        // ==================== 游戏类 ====================
        class RoadRashGame {
            constructor() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.minimapCanvas = document.getElementById('minimap-canvas');
                this.minimapCtx = this.minimapCanvas.getContext('2d');
                this.soundManager = new SoundManager();
                
                // 游戏状态
                this.gameRunning = false;
                this.gameOver = false;
                this.paused = false;
                
                // 玩家
                this.player = {
                    x: 450,
                    y: 500,
                    width: 40,
                    height: 70,
                    speed: 0,
                    maxSpeed: 12,
                    acceleration: 0.15,
                    friction: 0.98,
                    health: 100,
                    maxHealth: 100,
                    weapon: 'fist',
                    bombs: 3,
                    nitro: 100,
                    angle: 0
                };
                
                // 对手
                this.opponents = [];
                this.projectiles = [];
                this.powerups = [];
                this.particles = [];
                
                // 赛道
                this.track = {
                    width: 200,
                    checkpoints: [],
                    lap: 1,
                    maxLaps: 3,
                    nextCheckpoint: 0
                };
                
                // 游戏时间
                this.startTime = 0;
                this.elapsedTime = 0;
                
                // 输入
                this.keys = {};
                
                this.setupControls();
                this.createTrack();
                this.createOpponents();
            }

            setupControls() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.code] = true;
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                        e.preventDefault();
                    }
                });

                document.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });

                document.getElementById('startBtn').addEventListener('click', () => {
                    this.soundManager.init();
                    this.soundManager.playStart();
                    this.startGame();
                });

                document.getElementById('restartBtn').addEventListener('click', () => {
                    this.soundManager.playStart();
                    this.startGame();
                });

                document.getElementById('soundToggle').addEventListener('click', (e) => {
                    const enabled = this.soundManager.toggle();
                    e.target.textContent = enabled ? '🔊' : '🔇';
                    e.target.classList.toggle('muted');
                });

                // 武器选择
                document.querySelectorAll('.weapon-slot').forEach(slot => {
                    slot.addEventListener('click', () => {
                        document.querySelectorAll('.weapon-slot').forEach(s => s.classList.remove('active'));
                        slot.classList.add('active');
                        this.player.weapon = slot.dataset.weapon;
                        this.soundManager.playTone(600, 0.1, 'sine');
                    });
                });

                // 键盘切换武器
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'KeyX') {
                        const weapons = ['fist', 'bat', 'knife', 'bomb'];
                        const currentIndex = weapons.indexOf(this.player.weapon);
                        const nextIndex = (currentIndex + 1) % weapons.length;
                        this.player.weapon = weapons[nextIndex];
                        
                        document.querySelectorAll('.weapon-slot').forEach(s => s.classList.remove('active'));
                        document.querySelector(`[data-weapon="${weapons[nextIndex]}"]`).classList.add('active');
                        this.soundManager.playTone(600, 0.1, 'sine');
                    }

                    if (e.code === 'KeyZ') {
                        this.attack();
                    }

                    if (e.code === 'KeyC') {
                        this.usePowerup();
                    }

                    if (e.code === 'KeyN') {
                        this.useNitro();
                    }

                    if (e.code === 'KeyR') {
                        this.startGame();
                    }
                });
            }

            createTrack() {
                // 创建环形赛道检查点
                const centerX = 450;
                const centerY = 325;
                const radiusX = 350;
                const radiusY = 250;
                
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    this.track.checkpoints.push({
                        x: centerX + Math.cos(angle) * radiusX,
                        y: centerY + Math.sin(angle) * radiusY,
                        passed: false
                    });
                }
            }

            createOpponents() {
                this.opponents = [];
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
                const names = ['Tank', 'Viper', 'Blaze', 'Storm', 'Raven'];
                
                for (let i = 0; i < 5; i++) {
                    const angle = (i / 5) * Math.PI * 2;
                    const centerX = 450;
                    const centerY = 325;
                    
                    this.opponents.push({
                        x: centerX + Math.cos(angle) * 350,
                        y: centerY + Math.sin(angle) * 250,
                        width: 40,
                        height: 70,
                        speed: 5 + Math.random() * 3,
                        health: 100,
                        color: colors[i],
                        name: names[i],
                        angle: angle + Math.PI / 2,
                        lap: 1,
                        nextCheckpoint: i + 1
                    });
                }
            }

            startGame() {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                
                // 重置玩家
                this.player.x = 450;
                this.player.y = 500;
                this.player.speed = 0;
                this.player.health = 100;
                this.player.bombs = 3;
                this.player.nitro = 100;
                this.player.angle = 0;
                
                // 重置赛道
                this.track.lap = 1;
                this.track.nextCheckpoint = 0;
                this.track.checkpoints.forEach(cp => cp.passed = false);
                
                // 重置对手
                this.createOpponents();
                
                // 重置其他
                this.projectiles = [];
                this.powerups = [];
                this.particles = [];
                this.gameRunning = true;
                this.gameOver = false;
                this.startTime = Date.now();
                
                this.spawnPowerups();
                this.gameLoop();
            }

            spawnPowerups() {
                const types = ['health', 'nitro', 'bomb', 'speed'];
                for (let i = 0; i < 8; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const centerX = 450;
                    const centerY = 325;
                    
                    this.powerups.push({
                        x: centerX + Math.cos(angle) * 300,
                        y: centerY + Math.sin(angle) * 200,
                        width: 30,
                        height: 30,
                        type: types[Math.floor(Math.random() * types.length)],
                        collected: false
                    });
                }
            }

            attack() {
                if (this.player.weapon === 'bomb' && this.player.bombs > 0) {
                    this.projectiles.push({
                        x: this.player.x,
                        y: this.player.y,
                        vx: Math.sin(this.player.angle) * 8,
                        vy: -Math.cos(this.player.angle) * 8,
                        width: 20,
                        height: 20,
                        type: 'bomb',
                        owner: 'player'
                    });
                    this.player.bombs--;
                    document.getElementById('bombAmmo').textContent = this.player.bombs;
                    this.soundManager.playExplosion();
                } else if (['fist', 'bat', 'knife'].includes(this.player.weapon)) {
                    // 近战攻击
                    const range = this.player.weapon === 'fist' ? 60 : 
                                  this.player.weapon === 'bat' ? 80 : 50;
                    const damage = this.player.weapon === 'fist' ? 10 : 
                                   this.player.weapon === 'bat' ? 25 : 15;
                    
                    this.opponents.forEach(opp => {
                        const dx = opp.x - this.player.x;
                        const dy = opp.y - this.player.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < range) {
                            opp.health -= damage;
                            this.createParticles(opp.x, opp.y, opp.color, 10);
                            this.soundManager.playHit();
                            this.showDamageIndicator();
                        }
                    });
                }
            }

            usePowerup() {
                // 使用收集到的道具
                this.soundManager.playPowerup();
            }

            useNitro() {
                if (this.player.nitro > 0) {
                    this.player.speed += 5;
                    this.player.nitro -= 20;
                    this.createParticles(this.player.x, this.player.y + 35, '#00ffff', 15);
                }
            }

            createParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 30,
                        color: color,
                        size: Math.random() * 5 + 3
                    });
                }
            }

            showDamageIndicator() {
                const indicator = document.getElementById('damageIndicator');
                indicator.classList.add('show');
                setTimeout(() => indicator.classList.remove('show'), 500);
            }

            showPowerupNotify(text) {
                const notify = document.getElementById('powerupNotify');
                notify.textContent = text;
                notify.classList.add('show');
                setTimeout(() => notify.classList.remove('show'), 1500);
            }

            update() {
                if (!this.gameRunning || this.gameOver) return;
                
                // 更新时间
                this.elapsedTime = (Date.now() - this.startTime) / 1000;
                
                // 玩家控制
                if (this.keys['ArrowUp'] || this.keys['KeyW']) {
                    this.player.speed += this.player.acceleration;
                }
                if (this.keys['ArrowDown'] || this.keys['KeyS']) {
                    this.player.speed -= this.player.acceleration * 2;
                }
                if (this.keys['ArrowLeft'] || this.keys['KeyA']) {
                    this.player.angle -= 0.05;
                }
                if (this.keys['ArrowRight'] || this.keys['KeyD']) {
                    this.player.angle += 0.05;
                }
                
                // 限制速度
                this.player.speed = Math.max(0, Math.min(this.player.maxSpeed, this.player.speed));
                
                // 应用摩擦
                this.player.speed *= this.player.friction;
                
                // 更新位置
                this.player.x += Math.sin(this.player.angle) * this.player.speed;
                this.player.y -= Math.cos(this.player.angle) * this.player.speed;
                
                // 赛道边界
                this.keepOnTrack(this.player);
                
                // 更新对手 AI
                this.updateOpponents();
                
                // 更新投射物
                this.updateProjectiles();
                
                // 更新道具
                this.updatePowerups();
                
                // 更新粒子
                this.updateParticles();
                
                // 检查检查点
                this.checkCheckpoints();
                
                // 更新 UI
                this.updateUI();
                
                // 播放引擎音效
                if (this.player.speed > 1) {
                    this.soundManager.playEngine(0.5 + this.player.speed / this.player.maxSpeed);
                }
            }

            keepOnTrack(obj) {
                const centerX = 450;
                const centerY = 325;
                const radiusX = 350;
                const radiusY = 250;
                const trackWidth = this.track.width;
                
                // 计算到中心的归一化距离
                const dx = obj.x - centerX;
                const dy = obj.y - centerY;
                const normalizedX = dx / radiusX;
                const normalizedY = dy / radiusY;
                const distance = Math.sqrt(normalizedX * normalizedX + normalizedY * normalizedY);
                
                // 如果在赛道外，推回赛道
                if (distance > 1 + trackWidth / 400) {
                    const angle = Math.atan2(dy, dx);
                    obj.x = centerX + Math.cos(angle) * (radiusX * (1 + trackWidth / 400 - 0.1));
                    obj.y = centerY + Math.sin(angle) * (radiusY * (1 + trackWidth / 400 - 0.1));
                    obj.speed *= 0.5;
                }
                if (distance < 1 - trackWidth / 400) {
                    const angle = Math.atan2(dy, dx);
                    obj.x = centerX + Math.cos(angle) * (radiusX * (1 - trackWidth / 400 + 0.1));
                    obj.y = centerY + Math.sin(angle) * (radiusY * (1 - trackWidth / 400 + 0.1));
                    obj.speed *= 0.5;
                }
            }

            updateOpponents() {
                this.opponents.forEach(opp => {
                    if (opp.health <= 0) return;
                    
                    // AI 跟随赛道
                    const nextCp = this.track.checkpoints[opp.nextCheckpoint % this.track.checkpoints.length];
                    const dx = nextCp.x - opp.x;
                    const dy = nextCp.y - opp.y;
                    const targetAngle = Math.atan2(dx, -dy);
                    
                    // 平滑转向
                    let angleDiff = targetAngle - opp.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    opp.angle += angleDiff * 0.05;
                    
                    // 移动
                    opp.x += Math.sin(opp.angle) * opp.speed;
                    opp.y -= Math.cos(opp.angle) * opp.speed;
                    
                    // 检查检查点
                    const distToCp = Math.sqrt(dx * dx + dy * dy);
                    if (distToCp < 50) {
                        opp.nextCheckpoint++;
                        if (opp.nextCheckpoint >= this.track.checkpoints.length) {
                            opp.nextCheckpoint = 0;
                            opp.lap++;
                        }
                    }
                    
                    // 保持赛道内
                    this.keepOnTrack(opp);
                    
                    // 与玩家碰撞
                    const pdx = this.player.x - opp.x;
                    const pdy = this.player.y - opp.y;
                    const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
                    
                    if (pDist < 50 && this.player.speed > 3) {
                        this.player.health -= 10;
                        this.player.speed *= 0.5;
                        this.createParticles(this.player.x, this.player.y, '#ff0000', 10);
                        this.soundManager.playCrash();
                        this.showDamageIndicator();
                    }
                });
            }

            updateProjectiles() {
                this.projectiles = this.projectiles.filter(proj => {
                    proj.x += proj.vx;
                    proj.y += proj.vy;
                    
                    // 检查与对手碰撞
                    if (proj.owner === 'player') {
                        this.opponents.forEach(opp => {
                            if (opp.health <= 0) return;
                            
                            const dx = proj.x - opp.x;
                            const dy = proj.y - opp.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist < 30) {
                                opp.health -= 30;
                                this.createParticles(opp.x, opp.y, opp.color, 15);
                                this.soundManager.playExplosion();
                                return false;
                            }
                        });
                    }
                    
                    return proj.x > 0 && proj.x < 900 && proj.y > 0 && proj.y < 650;
                });
            }

            updatePowerups() {
                this.powerups.forEach(pu => {
                    if (pu.collected) return;
                    
                    const dx = this.player.x - pu.x;
                    const dy = this.player.y - pu.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 40) {
                        pu.collected = true;
                        this.collectPowerup(pu.type);
                    }
                });
            }

            collectPowerup(type) {
                switch(type) {
                    case 'health':
                        this.player.health = Math.min(this.player.maxHealth, this.player.health + 30);
                        this.showPowerupNotify('+30 Health');
                        break;
                    case 'nitro':
                        this.player.nitro = Math.min(100, this.player.nitro + 50);
                        this.showPowerupNotify('+50 Nitro');
                        break;
                    case 'bomb':
                        this.player.bombs += 3;
                        document.getElementById('bombAmmo').textContent = this.player.bombs;
                        this.showPowerupNotify('+3 Bombs');
                        break;
                    case 'speed':
                        this.player.maxSpeed += 2;
                        setTimeout(() => this.player.maxSpeed -= 2, 10000);
                        this.showPowerupNotify('Speed Boost!');
                        break;
                }
                this.soundManager.playPowerup();
            }

            updateParticles() {
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3;
                    p.life--;
                    return p.life > 0;
                });
            }

            checkCheckpoints() {
                const nextCp = this.track.checkpoints[this.track.nextCheckpoint];
                const dx = this.player.x - nextCp.x;
                const dy = this.player.y - nextCp.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 60) {
                    this.track.nextCheckpoint++;
                    if (this.track.nextCheckpoint >= this.track.checkpoints.length) {
                        this.track.nextCheckpoint = 0;
                        this.track.lap++;
                        
                        if (this.track.lap > this.track.maxLaps) {
                            this.gameComplete();
                        } else {
                            this.soundManager.playLevelComplete();
                        }
                    }
                }
            }

            updateUI() {
                document.getElementById('speedValue').textContent = Math.floor(this.player.speed * 20);
                document.getElementById('lapValue').textContent = Math.min(this.track.lap, this.track.maxLaps);
                
                const minutes = Math.floor(this.elapsedTime / 60);
                const seconds = Math.floor(this.elapsedTime % 60);
                document.getElementById('timeValue').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                const healthPercent = (this.player.health / this.player.maxHealth) * 100;
                document.getElementById('healthFill').style.width = healthPercent + '%';
                
                // 计算排名
                let position = 1;
                this.opponents.forEach(opp => {
                    if (opp.lap > this.track.lap || 
                        (opp.lap === this.track.lap && opp.nextCheckpoint > this.track.nextCheckpoint)) {
                        position++;
                    }
                });
                document.getElementById('positionNumber').textContent = position;
                
                // 检查游戏结束
                if (this.player.health <= 0) {
                    this.gameOver = true;
                    this.soundManager.playGameOver();
                    document.getElementById('gameOverTitle').textContent = 'GAME OVER';
                    document.getElementById('gameOverTitle').style.color = '#ff0000';
                    document.getElementById('finalPosition').textContent = position;
                    document.getElementById('finalTime').textContent = document.getElementById('timeValue').textContent;
                    document.getElementById('gameOverScreen').style.display = 'flex';
                }
            }

            gameComplete() {
                this.gameRunning = false;
                this.soundManager.playLevelComplete();
                
                let position = 1;
                this.opponents.forEach(opp => {
                    if (opp.lap > this.track.lap || 
                        (opp.lap === this.track.lap && opp.nextCheckpoint > this.track.nextCheckpoint)) {
                        position++;
                    }
                });
                
                document.getElementById('gameOverTitle').textContent = position === 1 ? '🏆 VICTORY!' : 'FINISHED';
                document.getElementById('gameOverTitle').style.color = position === 1 ? '#00ff00' : '#ffcc00';
                document.getElementById('finalPosition').textContent = position;
                document.getElementById('finalTime').textContent = document.getElementById('timeValue').textContent;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            draw() {
                // 清空画布
                this.ctx.fillStyle = '#2d5016';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制赛道
                this.drawTrack();
                
                // 绘制道具
                this.drawPowerups();
                
                // 绘制对手
                this.drawOpponents();
                
                // 绘制玩家
                this.drawPlayer();
                
                // 绘制投射物
                this.drawProjectiles();
                
                // 绘制粒子
                this.drawParticles();
                
                // 绘制小地图
                this.drawMinimap();
            }

            drawTrack() {
                const centerX = 450;
                const centerY = 325;
                const radiusX = 350;
                const radiusY = 250;
                const trackWidth = this.track.width;
                
                // 赛道地面
                this.ctx.strokeStyle = '#4a4a4a';
                this.ctx.lineWidth = trackWidth;
                this.ctx.lineCap = 'round';
                this.ctx.beginPath();
                this.ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, Math.PI * 2);
                this.ctx.stroke();
                
                // 赛道边界
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 4;
                this.ctx.setLineDash([20, 20]);
                this.ctx.beginPath();
                this.ctx.ellipse(centerX, centerY, radiusX - trackWidth/2, radiusY - trackWidth/2, 0, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.ellipse(centerX, centerY, radiusX + trackWidth/2, radiusY + trackWidth/2, 0, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.setLineDash([]);
                
                // 起点线
                this.ctx.fillStyle = '#fff';
                this.ctx.fillRect(centerX - 10, centerY + radiusY - trackWidth/2, 20, trackWidth);
            }

            drawPlayer() {
                this.ctx.save();
                this.ctx.translate(this.player.x, this.player.y);
                this.ctx.rotate(this.player.angle);
                
                // 摩托车车身
                this.ctx.fillStyle = '#00ccff';
                this.ctx.fillRect(-15, -35, 30, 70);
                
                // 车轮
                this.ctx.fillStyle = '#333';
                this.ctx.fillRect(-18, -35, 8, 20);
                this.ctx.fillRect(10, -35, 8, 20);
                this.ctx.fillRect(-18, 15, 8, 20);
                this.ctx.fillRect(10, 15, 8, 20);
                
                // 骑手
                this.ctx.fillStyle = '#ff6600';
                this.ctx.beginPath();
                this.ctx.arc(0, -10, 12, 0, Math.PI * 2);
                this.ctx.fill();
                
                // 武器
                if (this.player.weapon === 'bat') {
                    this.ctx.fillStyle = '#8b4513';
                    this.ctx.fillRect(15, -20, 5, 40);
                } else if (this.player.weapon === 'knife') {
                    this.ctx.fillStyle = '#ccc';
                    this.ctx.fillRect(15, -15, 3, 25);
                }
                
                this.ctx.restore();
            }

            drawOpponents() {
                this.opponents.forEach(opp => {
                    if (opp.health <= 0) return;
                    
                    this.ctx.save();
                    this.ctx.translate(opp.x, opp.y);
                    this.ctx.rotate(opp.angle);
                    
                    // 摩托车
                    this.ctx.fillStyle = opp.color;
                    this.ctx.fillRect(-15, -35, 30, 70);
                    
                    // 车轮
                    this.ctx.fillStyle = '#333';
                    this.ctx.fillRect(-18, -35, 8, 20);
                    this.ctx.fillRect(10, -35, 8, 20);
                    this.ctx.fillRect(-18, 15, 8, 20);
                    this.ctx.fillRect(10, 15, 8, 20);
                    
                    // 骑手
                    this.ctx.fillStyle = '#fff';
                    this.ctx.beginPath();
                    this.ctx.arc(0, -10, 12, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // 血条
                    this.ctx.fillStyle = '#333';
                    this.ctx.fillRect(-20, -50, 40, 6);
                    this.ctx.fillStyle = '#00ff00';
                    this.ctx.fillRect(-20, -50, 40 * (opp.health / 100), 6);
                    
                    this.ctx.restore();
                });
            }

            drawProjectiles() {
                this.projectiles.forEach(proj => {
                    this.ctx.fillStyle = proj.type === 'bomb' ? '#333' : '#ff0000';
                    this.ctx.beginPath();
                    this.ctx.arc(proj.x, proj.y, proj.width / 2, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // 尾焰
                    this.ctx.fillStyle = '#ff6600';
                    this.ctx.beginPath();
                    this.ctx.arc(proj.x - proj.vx * 0.5, proj.y - proj.vy * 0.5, proj.width / 3, 0, Math.PI * 2);
                    this.ctx.fill();
                });
            }

            drawPowerups() {
                this.powerups.forEach(pu => {
                    if (pu.collected) return;
                    
                    let color, icon;
                    switch(pu.type) {
                        case 'health': color = '#00ff00'; icon = '❤️'; break;
                        case 'nitro': color = '#00ffff'; icon = '⚡'; break;
                        case 'bomb': color = '#ff6600'; icon = '💣'; break;
                        case 'speed': color = '#ff00ff'; icon = '🚀'; break;
                    }
                    
                    this.ctx.fillStyle = color;
                    this.ctx.beginPath();
                    this.ctx.arc(pu.x, pu.y, 15, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    this.ctx.font = '20px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(icon, pu.x, pu.y);
                    
                    // 发光效果
                    this.ctx.strokeStyle = color;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(pu.x, pu.y, 20 + Math.sin(Date.now() / 200) * 3, 0, Math.PI * 2);
                    this.ctx.stroke();
                });
            }

            drawParticles() {
                this.particles.forEach(p => {
                    this.ctx.fillStyle = p.color;
                    this.ctx.globalAlpha = p.life / 30;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                });
            }

            drawMinimap() {
                const ctx = this.minimapCtx;
                const width = this.minimapCanvas.width;
                const height = this.minimapCanvas.height;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, width, height);
                
                // 赛道
                ctx.strokeStyle = '#666';
                ctx.lineWidth = 8;
                ctx.beginPath();
                ctx.ellipse(width/2, height/2, width/2 - 10, height/2 - 10, 0, 0, Math.PI * 2);
                ctx.stroke();
                
                // 玩家
                const playerMapX = width/2 + (this.player.x - 450) / 4;
                const playerMapY = height/2 + (this.player.y - 325) / 4;
                ctx.fillStyle = '#00ccff';
                ctx.beginPath();
                ctx.arc(playerMapX, playerMapY, 5, 0, Math.PI * 2);
                ctx.fill();
                
                // 对手
                this.opponents.forEach(opp => {
                    if (opp.health <= 0) return;
                    const oppMapX = width/2 + (opp.x - 450) / 4;
                    const oppMapY = height/2 + (opp.y - 325) / 4;
                    ctx.fillStyle = opp.color;
                    ctx.beginPath();
                    ctx.arc(oppMapX, oppMapY, 4, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            gameLoop() {
                if (!this.gameRunning) return;
                
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // ==================== 初始化游戏 ====================
        window.addEventListener('load', () => {
            const game = new RoadRashGame();
        });
    </script>
</body>
